# config/policies.yaml — AlfredOS low-blast operator policy knobs.
#
# mtime-polled hot-reload landed in PR-S4-4 (ADR-0023, issue #159): the
# PolicyWatcher (src/alfred/policies/watcher.py) picks up low-blast edits to
# the PoliciesV1 schema (src/alfred/policies/model.py) on its next poll — no
# restart needed — and refuses malformed, oversize, or high-blast edits with a
# loud CONFIG_RELOAD_REJECTED audit row. See the operator runbook at
# docs/runbooks/slice-4-policy-hot-reload.md.
#
# NOTE (schema reconciliation, tracked follow-up): the keys below are the
# Slice-3 `alfred config` low-blast knobs (read/written by src/alfred/cli/
# config.py). The PoliciesV1 hot-reload schema is the forward shape;
# reconciling this deployed file format + the daemon-boot probe into PoliciesV1
# is owned by the `alfred config` / daemon-boot path, not PR-S4-4.
#
# These knobs narrow or tune within the existing trust surface — they cannot
# widen it. Widening actions (domain allowlist additions, plugin grants,
# quarantined-provider changes) require state.git reviewer-gate approval
# (spec §11.1).

web_fetch:
  # User-Agent header sent with every web.fetch request (spec §16 Fork 4).
  # Default: AlfredOS/<version> — operators may customise but should
  # retain an identifiable UA string.
  user_agent: "AlfredOS/dev"

  # Per-domain rate-limit overrides. Keys are domain names; values are
  # requests/minute (int). Omitting a domain uses the system default (10/min).
  # Example: rate_limits: {api.example.com: 60}
  rate_limits: {}

  # Per-user daily fetch budget. "user" tier = non-operator users.
  # Operator-tier default: unlimited (null). Override per-user with
  # 'alfred config web-fetch-budget <user> <n>' (writes to this file).
  user_daily_budget: 100
  operator_daily_budget: null  # unlimited

  # Per-user concurrent ContentHandle cap (slice-3 spec §7.10 —
  # docs/superpowers/specs/2026-06-02-handle-cap-design.md).
  # A sixth web.fetch call from the same user while 5 handles are live
  # receives WebFetchRateLimited.
  #
  # Note: this knob is reserved for the planned policies-loader
  # (issue #159). The default (5) applies until the loader lands;
  # edits to this value have no current effect — the host instantiates
  # HandleCapConfig() with its built-in default regardless of what
  # appears here. See docs/runbooks/handle-cap-exceeded.md for the
  # operator-facing notice and the SQL / redis-cli inspection
  # examples that work against the in-effect cap (5 today).
  max_concurrent_handles_per_user: 5

  # Maximum response body size in bytes (spec §16 Fork 4). Default: 5MB.
  max_response_body_bytes: 5242880

  # TLS verification — ONLY honoured when ALFRED_ENV=development.
  # Production deployments with skip_tls_verify=true emit a loud startup
  # warning + supervisor.config_insecure audit row (spec §7.11).
  skip_tls_verify: false

quarantine:
  # Maximum retries for prompt-embedded fallback extraction (spec §6.3).
  # After this many failures, QuarantinedExtractor returns TypedRefusal.
  extraction_max_retries: 2

orchestrator:
  # Per-action deadline in seconds (spec §10.5).
  # asyncio.timeout wraps the entire handle_user_message turn.
  # Configurable here; default 30s matches spec §10.5.
  action_deadline_seconds: 30
