# AlfredOS default configuration. Override via environment variables prefixed
# with ALFRED_ (see .env.example).
[provider]
primary = "deepseek"
fallback = "anthropic"

[provider.deepseek]
model = "deepseek-chat"
base_url = "https://api.deepseek.com/v1"

[provider.anthropic]
# Source of truth for valid Anthropic model IDs: https://docs.anthropic.com/en/docs/about-claude/models
# Mirrors the default in src/alfred/config/settings.py (Settings.anthropic_model).
# Bump together when migrating model families.
model = "claude-sonnet-4-6"

[budget]
daily_usd = 1.0
per_call_max_usd = 0.10

[i18n]
# Default operator language. Override via ALFRED_OPERATOR_LANGUAGE.
operator_language = "en-US"
