# CodeRabbit configuration for AlfredOS
# Docs: https://docs.coderabbit.ai/guides/configure-coderabbit

language: en-US
early_access: false

reviews:
  profile: assertive
  # Auto-submit a GitHub "APPROVED" review once all CodeRabbit-flagged threads
  # are resolved and pre-merge checks pass. CodeRabbit acts as a meaningful
  # second set of eyes whose green ✓ signals "this PR is clean from my pass."
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  tools:
    ast-grep:
      essential_rules: true

  path_filters:
    - "!LICENSE"
    - "!**/*.lock"
    - "!**/*.svg"
    - "!**/*.png"

  path_instructions:
    - path: "src/alfred/security/**"
      instructions: |
        This is the trust-boundary layer. Apply highest scrutiny.
        - Verify trust-tier tagging at every ingestion boundary (T0..T3 per PRD §7.1).
        - Flag any T3 content reaching the privileged orchestrator without going through the quarantined LLM.
        - Verify the capability gate is never bypassed in tests; tests must use fixture grants, not "always allow" stubs.
        - Verify outbound DLP runs on every outbound path; flag any disable-DLP usage without a manifest declaration AND a corresponding test.
        - Require 100% line and branch coverage on changes; flag PRs that lower coverage on this path.
        - Verify the secret broker is used; flag any direct env-var secret reads.
    - path: "tests/adversarial/**"
      instructions: |
        Adversarial test corpus. Verify the conventions in
        .rulesync/skills/alfred-adversarial-corpus/SKILL.md.
        Each payload must have a unique id, an ingestion_path, a threat
        statement, provenance, and an expected_outcome. Never commit a
        payload that demonstrates a live exploit; open a private security
        advisory first.
    - path: ".rulesync/**"
      instructions: |
        AI-tool source configuration. Changes here must be paired with
        running `rulesync generate` and committing the regenerated CLAUDE.md.
        Verify the regeneration was performed by checking that .rulesync/rules/CLAUDE.md and CLAUDE.md
        have the same body content.
    - path: "PRD.md"
      instructions: |
        Product Requirements Document. Architecture-level changes here
        should be accompanied by an ADR under docs/adr/. Flag PRD edits
        without a corresponding ADR when they touch §5 invariants.
    - path: "CLAUDE.md"
      instructions: |
        Operating manual for AI agents. This is generated by rulesync from
        .rulesync/rules/CLAUDE.md. Direct edits should be rare; verify the
        source file (.rulesync/rules/CLAUDE.md) was edited too.
    - path: ".github/workflows/**"
      instructions: |
        CI workflows. Verify hashFiles() guards remain so workflows no-op
        cleanly while subsystems land. Verify secrets are read from GitHub
        Actions secrets (never inline). Verify permissions are minimal (least privilege).

chat:
  auto_reply: true

# tone_instructions has a 250-char schema limit. Substantive guidance lives in
# `reviews.path_instructions` (above) and CLAUDE.md; this field is only a tone nudge.
tone_instructions: |
  AlfredOS is security-focused (Apache-2.0). Be direct and specific. Cite PRD
  section names (e.g. "PRD §7.1") for drift and CLAUDE.md hard-rule numbers for
  violations. Distinguish "must fix" from "follow-up". Conventional Commits in
  titles.
