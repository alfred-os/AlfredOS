id: sbx-2026-018
category: sandbox_escape
threat: >-
  A launcher sandbox_refused stderr row whose field values carry JSON-injection
  bytes must not forge a second sandbox_refused audit event nor smuggle an
  out-of-vocab reason past the parser into the audit stream.
ingestion_path: launcher_refusal_stderr
payload:
  attack: launcher_refusal_row_injection
  forge_variants: # each: embedded escaped-JSON in a value must NOT forge a 2nd row
    - '{"event":"supervisor.plugin.sandbox_refused","plugin_id":"x\", \"event\": \"forged","reason":"sandbox_block_missing","environment":"development","host_os":"linux"}'
    - '{"event":"supervisor.plugin.sandbox_refused","plugin_id":"x","reason":"sandbox_block_missing","environment":"development","host_os":"linux\n{\"event\":\"forged\"}"}'
  out_of_vocab_reason_variants: # each: an out-of-vocab reason must be DROPPED (0 rows)
    - '{"event":"supervisor.plugin.sandbox_refused","plugin_id":"x","reason":"__forged__","environment":"development","host_os":"linux"}'
    - '{"event":"supervisor.plugin.sandbox_refused","plugin_id":"x","reason":"x\";DROP","environment":"development","host_os":"linux"}'
expected_outcome: refused
provenance: >-
  #433. parse_launcher_refusal_rows is line-oriented: it splits raw stderr
  bytes into physical lines via splitlines() BEFORE any json.loads call, so an
  attacker-controlled field value that itself contains escaped JSON (a
  forged `"event": "forged"` fragment, or a JSON-escaped `\n` that decodes to a
  literal embedded newline) stays exactly what it is — a single string field
  inside the one row that physical line represents. json.loads never re-parses
  a value it has already produced, so no forge_variant can manufacture a
  second supervisor.plugin.sandbox_refused row; each parses to exactly one row
  whose reason is the genuine sandbox_block_missing the launcher emitted, and
  the forged bytes ride inertly inside plugin_id/host_os. Separately, `reason`
  is validated against the closed SANDBOX_REFUSED_REASONS vocabulary
  (audit_row_schemas.py) and every key against the closed SANDBOX_REFUSED_FIELDS
  set; a row with an out-of-vocab reason (an attacker-chosen sentinel, or a
  charset-injection string) is dropped loudly (structlog warning), never
  admitted. The canonicalization step also means an admitted row carries
  exactly the 5 declared fields — no accreted extras. This is NOT
  kernel-observable: the containment is the pure host-side parser (no I/O,
  no bwrap involvement) refusing to construct a SandboxRefusalRow from a
  malformed or out-of-vocab candidate. Distinct from sbx-2026-008 (fd-3
  partial-write framing) and sbx-2026-017 (policy_ref charset guard at the
  manifest/launcher-producer layer, upstream of this parser) — this entry
  covers the HOST-SIDE stderr-to-audit-row parser that Task 1-3 of #433
  introduced. Asserted by
  test_sbx_2026_018_launcher_refusal_row_injection_contained, which iterates
  the YAML's own forge_variants/out_of_vocab_reason_variants lists (no second
  hardcoded copy, per the #428 lesson).
references:
  - "src/alfred/audit/launcher_refusal.py"
  - "src/alfred/audit/audit_row_schemas.py (SANDBOX_REFUSED_REASONS, SANDBOX_REFUSED_FIELDS)"
  - "docs/adr/0051-launcher-to-core-sandbox-refusal-audit-path.md"
  - "docs/superpowers/specs/2026-07-15-433-launcher-refusal-audit-design.md"
