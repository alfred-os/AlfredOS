id: sbx-2026-024
category: sandbox_escape
threat: >-
  The quarantined-LLM child's boot path (fd-3 key read -> emit hello ->
  _build_provider -> emit ready) must perform no external network IO --
  defence-in-depth over the empty net-namespace policy
  (config/sandbox/quarantined-llm.linux.bwrap.policy's --unshare-net) that
  already forecloses egress at the kernel for the deterministic-echo cut.
ingestion_path: stdio_fd3_key_delivery
payload:
  attack: child_boot_performs_no_external_io
  boot_sequence:
    - fd3_read_provider_key
    - emit_hello_frame
    - build_provider
    - emit_ready_frame
  expected_provider_type: _DeterministicProvider
note: >-
  DEFENSE IN DEPTH, explicitly not the load-bearing guard. The
  kernel-enforced containment is the shipped bwrap policy's
  --unshare-net (asserted directly against the REAL policy bytes by
  sbx-2026-005 / test_sbx_2026_005_outbound_network_egress_contained):
  even if the child's Python-level boot path tried to open a socket, the
  empty network namespace would refuse it at the kernel before any bytes
  left the sandbox. This entry exists because the #443 boot handshake
  adds a NEW step to the boot sequence (_build_provider, invoked between
  the hello and ready frames) that a future PR-S4-11c-2c "swap the
  deterministic echo for a real Anthropic/DeepSeek client" cutover will
  change -- pinning "boot performs no external IO" here as a Python-level
  behavioural assertion gives that future PR an early, host-side signal
  (this test would need conscious updating) alongside the kernel-level
  one, rather than relying on the netns policy as the only tripwire.
expected_outcome: neutralized
provenance: >-
  alfred.security.quarantine_child.__main__._build_provider (called from
  main() between emit_hello() and the asyncio-stream setup that precedes
  _write_boot_ready()) is, in the current PR-S4-11c-2b deterministic-echo
  cut, a pure sentinel constructor: it consumes the fd-3-delivered
  provider key (`del key` -- typed str, so a future implementer cannot
  silently drop it) and returns a bare _DeterministicProvider() with no
  network client, no httpx import, and no socket call anywhere in its
  body. test_quarantine_child_import_closure.py already pins that
  importing the child's entry module pulls in no privileged HOST module
  (alfred.audit / alfred.core / alfred.memory / the secret broker); this
  entry is the sibling assertion at the BEHAVIOURAL layer, not the import
  layer -- it exercises _build_provider directly with socket.socket
  monkeypatched to raise, and asserts (a) no socket construction was
  attempted and (b) the returned object is a _DeterministicProvider
  instance, matching the payload's expected_provider_type. ingestion_path
  is stdio_fd3_key_delivery (the existing #237 provider-key fd-3 framing
  member, reused per rev-004 rather than adding a new IngestionPath member
  for this entry -- the boot sequence this threat covers begins at the
  same fd-3 read the existing member names). The asserting test
  (test_sbx_2026_024_child_boot_performs_no_external_io,
  tests/adversarial/sandbox_escape/test_sbx_boot_handshake.py) is
  deliberately lightweight (a monkeypatched-socket assertion over a direct
  function call, not a full subprocess/bwrap drive) -- the kernel-observable
  proof already lives in sbx-2026-005; this entry's job is only to catch a
  FUTURE regression at the Python level before it ever reaches the kernel
  boundary, which is what "defence in depth" means here.
references:
  - "src/alfred/security/quarantine_child/__main__.py (_build_provider, _DeterministicProvider, main)"
  - "src/alfred/security/quarantine_child/_handshake.py (emit_hello, _write_boot_ready equivalent boot-frame emission)"
  - "config/sandbox/quarantined-llm.linux.bwrap.policy (the load-bearing --unshare-net kernel containment)"
  - "tests/adversarial/sandbox_escape/sbx_2026_005_outbound_network_unrestricted.yaml (the kernel-observable --unshare-net proof this entry supplements)"
  - "tests/unit/security/test_quarantine_child_import_closure.py (the sibling import-layer bound this entry complements at the behavioural layer)"
