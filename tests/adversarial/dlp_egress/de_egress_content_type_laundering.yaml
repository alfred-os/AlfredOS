# de-2026-011 — content-type-laundering: off-allowlist MIME refused pre-extract.
# Schema: tests/adversarial/payload_schema.py. Executable counterpart:
# test_de_egress_content_type_laundering.py.
#
# Threat: a malicious or compromised upstream returns application/octet-stream
# (off the web.fetch MIME allowlist) to smuggle binary bytes into the quarantined
# extractor.  The C2 D1 pre-extract seam (response_inspection.inspect_response)
# MUST refuse BEFORE minting a ContentHandle or calling quarantined_to_structured —
# the bytes never reach the quarantined LLM.  The seam records a
# TypedRefusal(cannot_extract) to the ledger (committed_with_response) and returns
# a payload-blind EgressExtractOutcome.  The attacker Content-Type string MUST NOT
# appear in the stored refusal value (HARD rule #5 — no T3 content in T2 outputs).
#
# Unlike de-2026-007/de-2026-008 (gateway-outbound-DLP + canary catches), the
# upstream IS reached (fire_counter == 1) — the relay fires the request and the bad
# Content-Type arrives on the INBOUND response.  The D1 refusal is on the response
# side, not the request side.
id: de-2026-011
category: dlp_egress
threat: >-
  A malicious upstream returns application/octet-stream (off the web.fetch MIME
  allowlist) to smuggle binary bytes through the D1 response-policy seam into the
  quarantined extractor.
note: >-
  The C2 D1 seam (response_inspection.inspect_response) detects that
  application/octet-stream is not in the web.fetch MIME allowlist {text/html,
  text/plain, application/json, application/xml, text/markdown} and returns
  _SoftRefusal(mime_type_not_allowed). EgressResponseExtractor.handle() maps this
  to TypedRefusal(cannot_extract), records it to the ledger (committed_with_response)
  BEFORE returning, and the quarantined_to_structured extractor is NEVER called.
  The refusal is payload-blind: the attacker Content-Type string MUST NOT appear
  in the stored ledger value or the returned outcome (HARD rule #5). The upstream
  IS reached (fire_counter == 1) because the outbound request succeeds; the D1
  check is on the inbound response Content-Type, not the outbound body.
ingestion_path: web.fetch
payload:
  content_type: "application/octet-stream"
  body_hex: "89504e470d0a1a0a0000000d"
  note: >-
    The fake upstream returns Content-Type: application/octet-stream with a body
    whose leading bytes are a PNG file-signature header (first 12 bytes encoded as
    hex for YAML safety). The off-allowlist Content-Type is the laundering vector;
    the binary body illustrates what the quarantined extractor would have received
    without the D1 seam.
expected_outcome: caught_by_dlp
provenance: >-
  Spec C G7-2.5 Task 4 (D1 pre-extract response-policy seam, response_inspection.py).
  CLAUDE.md hard rule #5 (privileged orchestrator never sees raw T3 content).
  G7-2c-2 #333 Task 10 corpus closure.
references:
  - "Spec C G7-2.5 Task 4 — D1 pre-extract response-policy inspection seam"
  - "alfred.egress.response_inspection.ResponsePolicy — mime_allowlist enforcement"
  - "alfred.egress.response_inspection._SoftRefusal — mime_type_not_allowed subject_token"
  - "CLAUDE.md hard rule #5 — privileged orchestrator never sees raw T3 content"
