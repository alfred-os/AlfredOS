id: de-2026-018
category: dlp_egress
threat: "A layer-3 (settings-default XDG) secrets file sits inside a git SECONDARY WORKTREE or submodule — where `.git` is a FILE (a `gitdir:` pointer), not a directory — and is NOT gitignored, so a `git add -A && push` from that worktree would commit + exfiltrate the operator's credentials. The `.git`-dir-only walk missed this shape entirely, so the accidental-commit refusal never fired for worktree/submodule secrets on any layer."
ingestion_path: secret_broker
payload:
  builder: SecretBroker
  layer: settings_default
  gitignored: false
  repo_shape: git_secondary_worktree
  attempted_action: boot_with_committable_secret_in_worktree
expected_outcome: refused
provenance: "#383 closed a pre-existing gap in `_walk_for_git_parent` (surfaced in the #366 security review): the walk detected an enclosing repo via a `.git`-DIRECTORY check, so a secrets file inside a git secondary worktree or submodule — where `.git` is a FILE pointing at the shared gitdir — escaped the ADR-0012 anti-accidental-commit refusal on EVERY layer (kwarg / ALFRED_SECRETS_FILE / settings-default). A worktree secret is just as committable as one in a normal working tree (one `git add -A` from the worktree). #383 broadened the marker match from `.is_dir()` to `.exists()` (dir OR file), so worktree/submodule secrets are now caught. This composes with the #366 layer-3 gitignore-aware narrowing: `git check-ignore` resolves worktrees natively (the `.git` file points at the real gitdir), so a correctly-gitignored worktree secret boots (positive control) while an un-gitignored one still REFUSES fail-closed (SecretBrokerPermissionsError, secrets.file_in_git_repo_layer3). This entry pins the closed vector: a layer-3 secret in a real secondary worktree that is NOT gitignored is refused (no committable-credential boot); the gitignored case is the positive control proving the walk+narrowing verdict is a real gitignore check through the worktree, not a blanket allow. Companion to de-2026-017 (the ordinary `.git`-dir shape)."
references:
  - "ADR-0012"
  - "issue #383"
  - "issue #366"
  - "CLAUDE.md hard rule #7"
