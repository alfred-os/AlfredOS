# dns_rebinding_to_metadata.yaml — SSRF-class adversarial payload.
# Spec §7.4 (allowlist + IP guard). Schema: tests/adversarial/payload_schema.py.
#
# Schema note: the payload-schema Category Literal does not include
# ``ssrf`` (Slice-3 categories are prompt_injection / dlp / capability_bypass
# / canary / inter_persona / hooks / tier_laundering / dlp_egress). Per the
# task spec for sec-pr-s3-5-003 ("category=ssrf if the schema supports it;
# otherwise use dlp_egress and document the threat is SSRF-class"), this
# payload uses category=dlp_egress with the threat string + provenance
# making the SSRF framing explicit.
#
# Attack: An attacker controls DNS for an allowlisted hostname
# (``example.com``). On the first resolution (when the operator added
# the domain to the allowlist) it returned a public IP and looked
# legitimate. On the SECOND resolution — when the orchestrator actually
# fetches — it returns ``169.254.169.254`` (AWS / Azure / GCP metadata)
# / ``10.0.0.1`` (internal RFC1918) / ``127.0.0.1`` (loopback to Redis
# / Postgres / local services). The three-way URL allowlist
# (manifest ∩ operator ∩ session) matches on netloc, NOT on resolved IP,
# so it cannot block this on its own.
#
# Defence (G7-2b — gateway egress relay, ``EgressRelay._handle_one``):
#   - The connectivity-free core (Spec C / CLAUDE.md hard rule #9) no
#     longer resolves DNS; all outbound HTTP originates at the gateway.
#   - The gateway relay resolves the hostname server-side and classifies
#     the result via ``ipaddress.ip_address``.
#   - ``RESOLVED_IP_NOT_GLOBAL`` deny_reason is emitted when the resolved
#     IP is not globally routable — covers RFC1918, loopback, link-local,
#     multicast, and reserved addresses.
#   - The relay refuses BEFORE opening the upstream connection; the core
#     never sees the raw IP — only the ``EgressRelayDenyReason`` enum
#     value on the framed response.
#   - Verified by: ``test_resolved_private_ip_denied`` in
#     tests/unit/gateway/test_egress_relay.py.
#
# Outcome: ``refused`` — the merge-blocking assertion is that the
# gateway relay refuses internal-IP fetches via ``RESOLVED_IP_NOT_GLOBAL``
# before opening the upstream connection.
id: de-2026-003
category: dlp_egress
threat: >-
  SSRF-class attack: DNS rebinding against an allowlisted hostname
  (example.com). The attacker controls the authoritative DNS for the
  allowlisted domain and returns an internal address on resolution
  (169.254.169.254 AWS/Azure/GCP metadata, 10.0.0.1 RFC1918 internal
  endpoint, 127.0.0.1 loopback to local Redis/Postgres). The three-way
  URL allowlist matches on netloc — it does NOT check resolved IPs —
  so this attack bypasses the URL allowlist completely. The gateway
  egress relay (G7-2b) is the defence — it resolves the hostname
  server-side and refuses non-globally-routable IPs with
  deny_reason=RESOLVED_IP_NOT_GLOBAL before opening the upstream
  connection. The relay is the sole outbound HTTP origin (Spec C /
  CLAUDE.md hard rule #9); the connectivity-free core never resolves
  DNS and never sees raw resolved IPs.
ingestion_path: web.fetch
payload:
  # Three SSRF rebinding shapes the guard must refuse.
  url_under_attack: "https://example.com/api/data"
  resolved_ip_aws_metadata: "169.254.169.254"
  resolved_ip_rfc1918: "10.0.0.1"
  resolved_ip_loopback: "127.0.0.1"
  expected_refusal_reasons:
    - "RESOLVED_IP_NOT_GLOBAL"  # gateway collapses RFC1918/link-local/loopback into one deny reason
  notes: >-
    Each shape uses the SAME URL (https://example.com/api/data) — the
    allowlist passes for the netloc. The DNS resolver is the attacker-
    controlled element; the gateway's defence is name-independent (it
    classifies the resolved IP, not the URL). The gateway collapses the
    old per-class vocabulary (link_local / rfc1918 / loopback) into the
    single ``RESOLVED_IP_NOT_GLOBAL`` deny reason. All three shapes are
    proven by gateway unit tests: ``test_resolved_private_ip_denied``
    (10.0.0.1 / RFC1918), ``test_resolved_link_local_ip_denied``
    (169.254.169.254), and ``test_resolved_loopback_ip_denied`` (127.0.0.1)
    in tests/unit/gateway/test_egress_relay.py.
expected_outcome: refused
provenance: >-
  Slice-3 PR-S3-5 security review sec-pr-s3-5-003 / H3 (HIGH).
  Originally defended by the in-core ``host_ip_guard.py``
  (``check_url_host_ips``). G7-2b (PR #344) re-located the SSRF chain
  to the gateway egress relay; the connectivity-free core (Spec C /
  CLAUDE.md hard rule #9) can no longer resolve DNS or open raw sockets.
  The gateway relay is now the sole defence: it resolves server-side and
  emits ``RESOLVED_IP_NOT_GLOBAL`` for non-globally-routable IPs before
  opening the upstream connection. ``host_ip_guard.py`` deleted in G7-2.5
  Task 7 (this PR / #333).
references:
  - "spec §7.4 three-way URL allowlist (manifest ∩ operator ∩ session)"
  - "sec-pr-s3-5-003 / H3 — security review finding: no connector-level IP-allowlist"
  - "tests/unit/gateway/test_egress_relay.py::test_resolved_private_ip_denied — RFC1918 gateway SSRF proof"
  - "tests/unit/gateway/test_egress_relay.py::test_resolved_link_local_ip_denied — link-local (169.254.x) gateway SSRF proof"
  - "tests/unit/gateway/test_egress_relay.py::test_resolved_loopback_ip_denied — loopback (127.0.0.1) gateway SSRF proof"
  - "src/alfred/gateway/egress_relay.py — EgressRelay._handle_one (RESOLVED_IP_NOT_GLOBAL path)"
  - "OWASP SSRF cheat sheet — DNS rebinding section"
  - "AWS Instance Metadata Service v1 (IMDSv1) credential exfiltration"
