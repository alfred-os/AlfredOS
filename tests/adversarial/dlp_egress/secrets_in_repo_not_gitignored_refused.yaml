id: de-2026-017
category: dlp_egress
threat: "A layer-3 (settings-default XDG) secrets file sits inside a versioned repo (a dotfiles-repo ~/.config) and is NOT gitignored, so a stray `git add -A && push` would commit + exfiltrate the operator's credentials — the accidental-commit exfiltration vector the .git-in-parent refusal defends."
ingestion_path: secret_broker
payload:
  builder: SecretBroker
  layer: settings_default
  gitignored: false
  attempted_action: boot_with_committable_secret_in_repo
expected_outcome: refused
provenance: "ADR-0012's .git-in-parent refusal is an anti-accidental-commit defence: a secrets.toml inside a git worktree is one `git add -A` from being committed and pushed — a T3-origin credential exfiltration path. #363 activated the layer-3 host default (~/.config/alfred/secrets.toml); a versioned ~/.config (chezmoi/yadm/bare-repo/stow — common for the self-host audience) makes the canonical path a real commit vector. #366 narrowed the refusal for the layer-3 path ONLY to be gitignore-aware (authoritative `git check-ignore`; fail-closed on git-absent/error/timeout), so a correctly-gitignored secret boots but an un-gitignored one still REFUSES fail-closed (SecretBrokerPermissionsError, secrets.file_in_git_repo). This entry pins the defence: a layer-3 secret inside a versioned repo that is NOT gitignored is refused (no committable-credential boot); the gitignored case is the positive control proving the narrowing is a real gitignore verdict, not a blanket allow. The kwarg / ALFRED_SECRETS_FILE layers keep the full always-refuse walk. Corrects the #366 'zero coverage' framing — the dotfiles-repo commit vector is real, so options a/b (stop-at-XDG / warn-not-refuse) were rejected for weakening the defence."
references:
  - "ADR-0012"
  - "issue #366"
  - "issue #363"
  - "CLAUDE.md hard rule #7"
