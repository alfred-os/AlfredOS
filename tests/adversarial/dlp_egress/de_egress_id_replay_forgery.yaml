# de-2026-009 — egress-id replay / false-replay / forgery / different-hash.
# Schema: tests/adversarial/payload_schema.py. Executable counterpart:
# test_de_egress_id_replay_forgery.py.
#
# Four sub-assertions against the real PostgresEgressIdempotencyStore + real
# RelayEgressClient via the loopback relay stack:
#
# (a) committed_with_response replay: a completed row is short-circuited
#     with NO re-fire (fire_count unchanged) — the memoised T2 replays.
# (b) committed_no_response (in-doubt) + non-idempotent: EgressInDoubtError,
#     no re-fire — the at-most-once firewall.
# (c) forged / out-of-range egress-id: commit_intent rejects it (only valid
#     sha256 hex 64-char ids accepted; an injected bad id fails the ledger).
# (d) same-position different-hash: EgressIdIntegrityError — a non-deterministic
#     re-run is LOUD (HARD rule #7).
#
# All four assertions carry the property: the egress-id is a trust-boundary
# primitive; any deviation from the one-fire, one-response contract is refused
# or detected loud — never silently duplicated or replayed as a T2.
id: de-2026-009
category: dlp_egress
threat: >-
  A caller replays, forges, or collides an egress-id to trick the relay into
  re-firing an upstream call or injecting a response into the ledger.
note: >-
  Four sub-scenarios: (a) committed_with_response replay → deduped, no re-fire,
  fire_count=1 (the memoised T2 replays; HARD rule #5 — re-extraction of raw T3
  is forbidden); (b) committed_no_response (in-doubt) + non-idempotent →
  EgressInDoubtError, no re-fire — at-most-once firewall; (c) forged/out-of-range
  egress-id → EgressLedgerStateError (commit_intent rejects non-sha256-hex ids);
  (d) same-position different-hash → EgressIdIntegrityError — non-deterministic
  re-run is LOUD (HARD rule #7).  The egress-id is a trust-boundary primitive; any
  deviation from the one-fire, one-response contract is refused or detected loud —
  never silently duplicated or replayed as a T2 (Spec C §5).
ingestion_path: web.fetch
payload:
  scenarios:
    - id: replay_complete
      desc: "committed_with_response row → deduplicated, fire_count=1"
      expected_outcome: deduped
    - id: in_doubt_non_idempotent
      desc: "committed_no_response + non-idempotent → EgressInDoubtError, no refire"
      expected_outcome: refused
    - id: different_hash
      desc: "same egress_id, different body hash → EgressIdIntegrityError"
      expected_outcome: refused
    - id: forged_unknown_id
      desc: "record_response on a never-committed egress-id → EgressLedgerStateError"
      expected_outcome: refused
expected_outcome: deduped_or_refused
provenance: >-
  Spec C §5 (at-most-once + dedup ledger) + HARD rules #5/#7.
  PostgresEgressIdempotencyStore commit_intent / record_response contract.
  G7-2a (#343) + G7-2c-1 (relay_client) + G7-2c-2 C4 (barrier/dedup). #333 C5.
references:
  - "Spec C §5 — egress-id ledger tri-state + at-most-once guarantee"
  - "CLAUDE.md hard rule #5 — privileged orchestrator never sees raw T3; dedup path must not re-enter extraction"
  - "CLAUDE.md hard rule #7 — integrity mismatch is loud, never silent"
  - "alfred.egress.egress_id.EgressIdIntegrityError — body-hash mismatch"
  - "alfred.memory.egress_idempotency.PostgresEgressIdempotencyStore"
