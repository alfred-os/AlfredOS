# handle_cap_exhaustion.yaml — dlp_egress adversarial payload.
# Spec §7.10. Schema: tests/adversarial/payload_schema.py.
#
# Attack class: redis_memory_exhaustion via concurrent ContentHandle
# accumulation. A single user attempts to fill Redis with parked T3
# content bodies by issuing concurrent web.fetch calls against distinct
# allowlisted endpoints. Without a per-user concurrent-handle cap, a
# malicious or pathologically-buggy user could pin ~max_body_bytes ×
# in-flight-count of Redis memory per user, exhausting the shared store
# for legitimate users.
#
# Defence (spec §7.10 HandleCap):
#   - `HandleCap.reserve_slot(user_id)` is a Lua-atomic Redis ZADD that
#     fails when the user's live-handle count already equals the cap.
#   - The dispatcher calls `reserve_slot` BEFORE the plugin call so the
#     refusal happens without a network round-trip.
#   - On cap exhaustion: emit a `tool.web.fetch` audit row carrying
#     `rate_limit_bucket="handle_cap"` AND
#     `dlp_scan_result="handle_cap_exceeded"` AND `result="rate_limited"`,
#     then raise `WebFetchRateLimited(bucket="handle_cap")`.
#   - Slots are released by extract success, canary trip, or passive TTL.
#
# Burst-size note (plan Task 21 Step 1): a 100-concurrent-fetch shape
# would trip the per-user 30/min rate-limit FIRST (refusing ~70 with
# `bucket="per_user"`) and the cap would never be exercised. This payload
# uses a 6-against-6-endpoint burst so the cap (5) is the binding limit
# and the per-user rate limit (30/min) is not.
#
# Outcome: `audit_row_emitted` — the merge-blocking assertion is that
# the cap-refused audit row fires with the three closed-vocabulary fields
# above AND `WebFetchRateLimited(bucket="handle_cap")` is raised BEFORE
# the plugin call. The user's HandleCap reservation ZSET MUST contain
# exactly 5 live members after the burst (bounded keyspace proof).
id: de-2026-004
category: dlp_egress
threat: >-
  A single user issues 6 concurrent web.fetch calls against 6 distinct
  allowlisted endpoints, attempting to exhaust Redis memory by pinning
  many parked T3 ContentHandle bodies at once. With the per-user
  concurrent ContentHandle cap set to 5 (spec §7.10 default), the 6th
  call must be refused with WebFetchRateLimited(bucket='handle_cap')
  BEFORE the plugin call is dispatched; a tool.web.fetch audit row
  with rate_limit_bucket='handle_cap',
  dlp_scan_result='handle_cap_exceeded', result='rate_limited' must
  fire; the Redis content keyspace for the user must be bounded to
  exactly 5 keys × max_body_bytes. Burst is sized to 6/6 endpoints so
  the cap — not the per-user 30/min rate limit — is the binding
  constraint.
ingestion_path: web.fetch
payload:
  user_id: "attacker-user-1"
  cap_per_user: 5
  concurrent_requests: 6
  allowed_domains:
    - "endpoint-1.example.test"
    - "endpoint-2.example.test"
    - "endpoint-3.example.test"
    - "endpoint-4.example.test"
    - "endpoint-5.example.test"
    - "endpoint-6.example.test"
  expected_audit_row:
    event: "tool.web.fetch"
    rate_limit_bucket: "handle_cap"
    dlp_scan_result: "handle_cap_exceeded"
    result: "rate_limited"
  attack_steps:
    - "Issue 6 web.fetch calls in flight against the 6 distinct endpoints."
    - "Expect 5 fetches to succeed; the 6th refuses with WebFetchRateLimited(bucket='handle_cap')."
    - "Verify the user's HandleCap reservation ZSET is bounded to exactly 5 live members."
    - "Verify exactly 1 audit row with dlp_scan_result='handle_cap_exceeded' fires."
    - "Verify refusal happens BEFORE the plugin call (no network round-trip on refusal)."
  notes: >-
    Burst sized to 6/6 endpoints (cap=5) on purpose: a 100-fetch burst
    would hit the per-user 30/min rate-limit first (bucket='per_user')
    and the cap would never be exercised. Direct-cap exercise keeps the
    payload's intent — prove the §7.10 cap fires — uncoupled from the
    rate-limit-vs-cap interaction (which is its own test surface).
expected_outcome: audit_row_emitted
provenance: >-
  Spec §7.10 per-user concurrent ContentHandle cap. The cap bounds how
  many T3 ContentHandle bodies a single user can have alive in Redis at
  one moment, preventing one user from exhausting Redis memory shared
  across the deployment. This payload is the adversarial proof that the
  cap fires with the typed audit row before the plugin call.
references:
  - "spec §7.10 per-user concurrent ContentHandle cap"
  - "config/policies.yaml web_fetch.max_concurrent_handles_per_user"
  - "src/alfred/plugins/web_fetch/handle_cap.py HandleCap.reserve_slot"
  - "src/alfred/audit/audit_row_schemas.py WEB_FETCH_FIELDS (rate_limit_bucket, dlp_scan_result)"
  - "docs/runbooks/handle-cap-exceeded.md operator runbook"
  - "OWASP API4:2023 Unrestricted Resource Consumption — https://owasp.org/API-Security/editions/2023/en/0xa4-unrestricted-resource-consumption/"
  - "CWE-770 Allocation of Resources Without Limits or Throttling — https://cwe.mitre.org/data/definitions/770.html"
