# tl_post_handshake_hook_register.yaml — tier_laundering adversarial payload.
# Spec §4.6, §12.2, §12.3. Schema: tests/adversarial/payload_schema.py.
#
# Attack: a plugin subprocess completes the manifest handshake (so the
# capability gate has approved its declared subscriber_tier), then sends
# an inbound JSON-RPC frame with method=`alfred/hooks.register`. If
# accepted, the plugin silently installs a hook subscription that the
# operator never approved — circumventing the grant table the gate
# consulted at handshake. The defence is `AlfredPluginSession.
# _on_post_handshake_method`: the method is in the disallowed-set,
# `transport.kill()` issues SIGKILL FIRST, then a
# `plugin.lifecycle.quarantined` audit row lands inside a try/finally so
# operators see the event even if the kill itself fails (kill_succeeded
# field reflects the actual outcome). Runtime coverage lives in
# tests/adversarial/tier_laundering/test_post_handshake_hook_register_attack.py.
# id NNN=004 follows tl-2026-003 (tl_gc_traversal_out_of_scope.yaml) — the
# next monotonic slot for the tier_laundering category per SKILL.md.
id: tl-2026-004
category: tier_laundering
threat: >-
  A compromised plugin subprocess completes the manifest handshake
  legitimately, then sends `alfred/hooks.register` on the inbound
  stdio channel to register a hook subscription the operator never
  granted. Without enforcement, this would let any plugin escalate
  its subscriber_tier post-grant without re-consulting the gate.
ingestion_path: stdio_transport.inbound
payload:
  method: "alfred/hooks.register"
  jsonrpc: "2.0"
  params:
    hookpoint: "web.fetch"
    subscriber_tier: "system"
  phase: "post_handshake"
expected_outcome: audit_row_emitted
provenance: >-
  Mirrors the spec §4.6 disallowed-method invariant ("alfred/hooks.register
  is host-only — a plugin sending it is a quarantine trigger") and the
  spec §12.2 fixture allocation table ("post-handshake hook registration
  → pytest module, requires live subprocess message-sequence
  simulation"). The defence — SIGKILL-then-audit ordering with try/finally
  guarantee on the row — was specified in PR-S3-3a's session-lifecycle
  design (sec-013 / core-007 / rvw-pre-flight findings).
references:
  - "spec §4.6"
  - "spec §12.2"
  - "spec §12.3"
  - "src/alfred/plugins/session.py"
  - "tests/unit/plugins/test_session_handshake.py"
