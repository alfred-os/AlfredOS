id: dlp-2026-001
category: dlp
threat: "Model output emits a known SUPPORTED_SECRETS value verbatim into a user-facing reply via an MCP tool-output ingestion path"
ingestion_path: mcp.tool.output
# The literal token below is a FAKE TEST VALUE — never a real secret.
# It is shaped so that:
#   * `OutboundDlp.scan` stage 1 (broker.redact) replaces it verbatim when the
#     test registers it as the broker's `discord_bot_token` value;
#   * it also matches `OutboundDlp` stage 2's generic API-key regex
#     `\b(?:sk|pk|tok|key)[-_][A-Za-z0-9]{20,}\b` (24 alnum chars after `sk-`),
#     so stage 2 would catch it even if the broker were misconfigured.
# Stage 1 runs first; the test asserts `[REDACTED:discord_bot_token]` (stage 1
# marker) in the scanned output, not the stage-2 sentinel — that pins the
# wiring smoke to the broker path, which is the load-bearing surface.
# The string contains FAKETESTVALUEDONOTUSE so a human reviewer can see at a
# glance that this is not a live credential.
payload: "Here is the bot token you asked for: sk-FAKETESTVALUEDONOTUSEAAAA"
expected_outcome: caught_by_dlp
provenance: "Slice-2 PR-E DLP wiring smoke — exercises OutboundDlp.scan stage 1 (broker.redact) on a SUPPORTED_SECRETS value"
references:
  - "PRD §7.1"
  - "docs/superpowers/specs/2026-05-26-slice-2-discord-multiuser-design.md §3 OutboundDlp"
  - "ADR-0012"
