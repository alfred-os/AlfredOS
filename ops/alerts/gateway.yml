# AlfredOS gateway alerting rules (Spec B G6-0, #288).
groups:
  - name: alfred-gateway
    rules:
      - alert: GatewayCoreUnavailable
        expr: gateway_core_link_up == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AlfredOS gateway core link has been down for 5m"
          description: "gateway_core_link_up has been 0 for 5m; the gateway is buffering operator input and cannot reach the core daemon."
      - alert: GatewayBufferNearCap
        expr: gateway_buffer_cap_ratio > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "AlfredOS gateway ReplayBuffer is near its soft cap"
          description: "gateway_buffer_cap_ratio > 0.8 for 2m; approaching the back-pressure breaker."
      - alert: GatewayCircuitBreakerOpen
        expr: gateway_circuit_breaker_open == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "AlfredOS gateway back-pressure breaker is latched"
          description: "gateway_circuit_breaker_open == 1; the gateway has stopped draining the client (buffer past cap). Operator input is held, not dropped."
      # Spec B G6-4 (#288, ADR-0036): per-adapter ingress / leg signals (label set {adapter}).
      - alert: GatewayAdapterIngressThrottling
        expr: rate(gateway_ingress_throttled_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AlfredOS gateway is throttling an adapter leg's ingress"
          description: "gateway_ingress_throttled_total{adapter} is increasing for 5m; the leg's rate / in-flight / size gate is refusing ingress with loud back-pressure (the frame is NOT enqueued — refused, not retained). Inspect the leg's volume, downstream drain rate, or caps."
      - alert: GatewayAdapterBufferGrowing
        expr: gateway_adapter_buffer_depth_bytes > 6291456
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "AlfredOS gateway adapter replay-buffer is near its per-leg cap"
          description: "gateway_adapter_buffer_depth_bytes{adapter} > 6 MiB for 2m (the 8 MiB per-leg soft/breaker cap is approaching; the hard ceiling is 16 MiB); the leg's un-acked backlog is growing — check core reachability for that leg."
