# Babel extraction mapping. The path pattern is glob-matched RELATIVE to the
# input dir passed to `pybabel extract` (so a pattern of `src/alfred/**.py`
# would only match `src/alfred/src/alfred/**.py` — silently zero hits — when
# invoked as `pybabel extract -F babel.cfg src/alfred`). Use `**.py` so the
# pattern is portable across `pybabel extract -F babel.cfg src/alfred` and
# `pybabel extract -F babel.cfg .` (which the CI drift gate uses).
#
# `keywords = t` registers AlfredOS's t() translator helper (alfred.i18n.t)
# as a gettext-like callable so its first arg is extracted as a msgid. The
# default gettext / _ keywords are NOT inherited when `keywords =` is set in
# a Babel mapping section — they're additive to the global -k flag chain.
# CI passes -k t in addition, so this default is belt-and-braces.
[python: **.py]
encoding = utf-8
keywords = t
