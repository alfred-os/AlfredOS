# AlfredOS web.fetch plugin manifest — Slice 3 (spec §4.3, §7.1)
#
# manifest_version=1 is the integer Slice-3 baseline. The host refuses
# any version > N+1 at handshake (spec §4.9), so bumping this here without
# the corresponding host-side schema bump is a release-blocker.
alfred.manifest_version = 1

[plugin]
id = "alfred.web-fetch"
# subscriber_tier=system: the plugin processes T3 content on behalf of the
# system. (Spec §4.3 distinguishes subscriber_tier — the hookchain axis —
# from sandbox_profile — the OS-sandbox axis. They are orthogonal: a
# system-tier subscriber may still run under user-plugin sandboxing.)
subscriber_tier = "system"
# sandbox_profile=user-plugin: restricted env, FS writes confined to
# $XDG_RUNTIME_DIR/alfred/plugin-alfred.web-fetch/, network egress via the
# operator-controlled allowlist (spec §4.3).
sandbox_profile = "user-plugin"

[network]
# Manifest declares the upper bound of what the plugin is willing to dial.
# The operator's config/policies.yaml web_fetch.allowed_domains is the
# narrowing cap; the three-way allowlist intersection runs at fetch time.
# A manifest entry absent from operator config is dropped from the
# effective set AND triggers a web.allowlist.manifest_broadening_capped
# audit row (spec §7.4) — never silently accepted.
allowlist = "*"

[secrets]
# Cookie grants for domain-keyed sessions (operator-tier only).
# Format: {{secret:cookie:<domain>}} substituted by the host secret
# broker (spec §7.8) at the JSON-RPC dispatch boundary. Plugin code
# never sees raw cookie values.
cookie = "*"

# platform field reserved for Slice-4 comms-MCP extension (spec §4.3).
# Optional in manifest_version=1; present-but-mandatory in version=2.
# Reserving the line here prevents a manifest_version bump when Slice 4
# ships — adding a new optional field is backwards-compatible.
# platform = ""  # (commented — optional, not set for web-fetch)

# No [[hooks]] entries. The plugin EMITS the tool.web.fetch event; it
# does not SUBSCRIBE to any hookpoints. Subscriber registration for
# tool.web.fetch is host-side (the InboundCanaryScanner, registered in
# canary_scanner.py). See spec §7.5 for the publish/subscribe split.
