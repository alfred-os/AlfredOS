[alembic]
script_location = src/alfred/memory/migrations
# Intentionally blank. env.py reads the live URL from
# ``Settings().database_url`` (which itself reads ``ALFRED_DATABASE_URL``);
# this line exists only so alembic accepts the config file. Hardcoding a
# real DSN here would ship plausible-looking credentials in the repo tree
# and drift from the env-driven source of truth the runtime uses.
sqlalchemy.url =
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
