[alembic]
# PACKAGE-RESOURCE form (``package:relative_path``), not a filesystem path.
#
# ``src/alfred/memory/migrations`` was source-tree-relative, so it resolved only
# from a repo checkout. In the built image the package lives under
# ``site-packages/alfred/memory/migrations`` and that directory does not exist,
# so the documented one-off `docker compose run --rm alfred-core migrate` failed
# outright on a first run.
#
# Alembic's ``coerce_resource_to_filename`` treats a non-absolute value containing
# a colon as a package resource and resolves it with ``importlib.resources``, which
# finds the migrations wherever ``alfred.memory`` is actually importable from —
# repo checkout and installed wheel alike. See
# ``tests/unit/memory/test_alembic_script_location_resolves.py``.
script_location = alfred.memory:migrations
# Intentionally blank. env.py reads the live URL from
# ``Settings().database_url`` (which itself reads ``ALFRED_DATABASE_URL``);
# this line exists only so alembic accepts the config file. Hardcoding a
# real DSN here would ship plausible-looking credentials in the repo tree
# and drift from the env-driven source of truth the runtime uses.
sqlalchemy.url =
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
