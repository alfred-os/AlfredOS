# Slice-1 default deployment for AlfredOS.
#
# Two services:
#   * alfred-postgres — long-running daemon, healthchecked, restart-on-fail.
#   * alfred-core     — Spec B G6-0b (#288): the long-running core daemon
#                       (`daemon start`, `restart: unless-stopped`). The always-up
#                       alfred-gateway dials its `comms-tui.sock`, so the core
#                       stays up and shares the `alfred_run` socket volume.
#                       `docker compose run --rm alfred-core <cmd>` still works
#                       for one-off subcommands (migrate, user add, chat, …) —
#                       `run` overrides `command`. Requires a seeded
#                       audit.hash_pepper (bin/alfred-setup.sh) before `up -d`,
#                       or the daemon refuse-boots and (under restart) crash-loops.
#
# The compose service is named exactly `alfred-postgres` because the i18n
# string `hint.is_compose_up` advertises that name to operators.

services:
  alfred-postgres:
    image: postgres:16
    restart: unless-stopped
    # Credentials come from `.env` (see `.env.example`). Slice-1 default values
    # land via `${VAR:-default}` so a fresh checkout still boots locally; an
    # operator who wants stronger credentials sets the variables in `.env`
    # before `docker compose up`. We deliberately do NOT commit the literal
    # `alfred:alfred` password into the compose file so credential rotation
    # never requires editing tracked YAML, and a leaked checkout doesn't ship
    # reusable auth material.
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alfred}
      POSTGRES_USER: ${POSTGRES_USER:-alfred}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alfred}
    ports:
      - "5432:5432"
    volumes:
      - alfred_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alfred} -d ${POSTGRES_DB:-alfred}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # alfred-redis — rate-limit counters, ContentHandle store, robots cache.
  # Internal-only: no host port exposed (spec §7.7). volatile-lru evicts
  # TTL-bearing keys under memory pressure when maxmemory is reached.
  # devops-002: maxmemory MUST be set — without it volatile-lru never
  # triggers (eviction only kicks in at the memory ceiling). Default 256 MB;
  # override with ALFRED_REDIS_MAXMEMORY env var for larger deployments.
  # devops-007: appendfsync everysec means up to 1s of budget-counter data
  # can be lost on crash. This is the accepted trade-off for AlfredOS's low
  # write rate — budget bypass from a 1s gap is an acceptable risk vs. the
  # performance cost of appendfsync always. Document this in the operator
  # runbook.
  alfred-redis:
    image: redis:7
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory ${ALFRED_REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy volatile-lru
      --appendonly yes
      --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - alfred_redis_data:/data

  alfred-core:
    build:
      context: .
      dockerfile: docker/alfred-core.Dockerfile
    # Spec B G6-0b (#288): alfred-core is the long-running daemon. The always-up
    # gateway dials its comms-tui.sock (bound when the socket-backed alfred_tui
    # adapter is enabled), so the core must stay up and share alfred_run.
    # `docker compose run --rm alfred-core <cmd>` still works for one-off
    # subcommands (run overrides command). Requires a seeded audit.hash_pepper
    # (bin/alfred-setup.sh) before `up -d`, or the daemon refuse-boots/crash-loops.
    command: ["daemon", "start"]
    restart: unless-stopped
    depends_on:
      alfred-postgres:
        condition: service_healthy
      alfred-redis:
        condition: service_healthy
    # SETUID is load-bearing for spec §5.2: alfred-plugin-launcher needs the
    # setuid bit (or this capability) to drop privileges to alfred-quarantine
    # at subprocess spawn. The compose-invariant test (devops-010, in
    # tests/unit/test_compose_invariants.py) pins that alfred-discord does
    # NOT have it — that service must never be able to impersonate the
    # quarantine UID.
    cap_add:
      - SETUID
    # #290: the dual-LLM quarantine child runs under bubblewrap, which builds an
    # unprivileged user namespace. Two container-level confinement layers block
    # that for a non-root, non-CAP_SYS_ADMIN process:
    #   1. Docker's default AppArmor profile (docker-default) — on Ubuntu 24.04+
    #      hosts the kernel additionally refuses unprivileged userns unless the
    #      process is under a profile carrying `userns,`.
    #   2. Docker's default seccomp profile — blocks clone/unshare with the
    #      CLONE_NEW* namespace flags absent CAP_SYS_ADMIN.
    # We replace both with custom, least-privilege profiles so bwrap can build
    # its sandbox WITHOUT --privileged / SYS_ADMIN / seccomp=unconfined /
    # apparmor=unconfined / a host-wide sysctl flip:
    #   * apparmor=alfred-bwrap   — grants ONLY `userns,` (docker/apparmor/alfred-bwrap).
    #   * seccomp=...alfred-bwrap.json — Docker default + the minimal namespace
    #     syscall allow bwrap needs (docker/seccomp/alfred-bwrap.json).
    # The host profile must be loaded once: `bin/alfred-setup.sh` does it (or run
    # `sudo apparmor_parser -r -W docker/apparmor/alfred-bwrap`). The real
    # containment around the T3 child is the bwrap policy itself, unaffected here.
    # NOTE: alfred-discord and alfred-gateway are NOT given these — alfred-discord
    # has no SETUID and never spawns the launcher (it must not impersonate the
    # quarantine UID — see test_compose_invariants), and the G6-0 gateway is a
    # pure relay; the spawn moves there in G6-1 with its own grant.
    # NOTE: the seccomp path is resolved by the Docker CLI RELATIVE TO THE
    # COMPOSE-INVOCATION CWD, not relative to this file. Run `docker compose`
    # from the repository root or the profile load fails with a "no such file"
    # error (README documents this). The apparmor entry is a NAMED profile that
    # must already be loaded into the host kernel (`bin/alfred-setup.sh` or
    # `sudo apparmor_parser -r docker/apparmor/alfred-bwrap`).
    security_opt:
      - "apparmor=alfred-bwrap"
      - "seccomp=docker/seccomp/alfred-bwrap.json"
    environment:
      # G6-0b (#288): hard boot requirement — _load_settings_or_die refuses to
      # boot the daemon without it. Defaults to production for the deployed stack.
      ALFRED_ENVIRONMENT: ${ALFRED_ENVIRONMENT:-production}
      # G6-0b (#288): enable the socket-backed alfred_tui adapter so the core
      # binds comms-tui.sock — the socket the always-up gateway dials. SINGLE-
      # QUOTED so the JSON list survives YAML scalar parsing (pydantic parses it
      # to a tuple). Override with ALFRED_COMMS_ENABLED_ADAPTERS in `.env`.
      ALFRED_COMMS_ENABLED_ADAPTERS: '${ALFRED_COMMS_ENABLED_ADAPTERS:-["alfred_tui"]}'
      ALFRED_DEEPSEEK_API_KEY: ${ALFRED_DEEPSEEK_API_KEY}
      ALFRED_ANTHROPIC_API_KEY: ${ALFRED_ANTHROPIC_API_KEY:-}
      # Reuse the same Postgres credentials so `.env` is the single source of
      # truth. The default chain mirrors the alfred-postgres service so the
      # two containers always agree on the DSN.
      ALFRED_DATABASE_URL: ${ALFRED_DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-alfred}:${POSTGRES_PASSWORD:-alfred}@alfred-postgres:5432/${POSTGRES_DB:-alfred}}
      ALFRED_OPERATOR_NAME: ${ALFRED_OPERATOR_NAME:-operator}
      ALFRED_OPERATOR_LANGUAGE: ${ALFRED_OPERATOR_LANGUAGE:-en-US}
      ALFRED_DAILY_BUDGET_USD: ${ALFRED_DAILY_BUDGET_USD:-1.0}
      ALFRED_PER_CALL_MAX_USD: ${ALFRED_PER_CALL_MAX_USD:-0.10}
      # Internal redis URL — alfred-redis has no host port; only services on
      # the compose network can reach it. PR-S3-5 ContentStore + RateLimiter
      # consume this.
      ALFRED_REDIS_URL: ${ALFRED_REDIS_URL:-redis://alfred-redis:6379/0}
    # state.git lives on this volume and is the source of truth for
    # reviewer-gated proposals + plugin grants (spec §11.1). NOT mounted in
    # alfred-discord — the comms adapter has no business writing grants.
    volumes:
      - alfred_state_git:/var/lib/alfred
      # G6-0b (#288): the comms socket dir, shared with alfred-gateway so the
      # gateway can dial the comms-tui.sock the core binds.
      - alfred_run:/home/alfred/.run

  # PR D2 — Slice-2 Discord adapter. Reuses the alfred-core image (one
  # Dockerfile, one entrypoint) and runs the long-running `alfred discord`
  # subcommand. Restart policy is ``unless-stopped`` because this IS a
  # long-running daemon (like alfred-core since G6-0b — both stay up under
  # ``unless-stopped``; one-off subcommands still use ``run --rm``). The
  # 256M memory cap is sized for the DM-only Slice-2 workload with
  # discord.Client(max_messages=100, chunk_guilds_at_startup=False,
  # member_cache_flags=MemberCacheFlags.none()) — measured RSS for a
  # quiet DM workload sits at ~90-150 MB. Bump to 512M if you see
  # OOMKills under sustained load (perf-003).
  #
  # Secrets bind-mount: the Discord token lives in
  # `~/.config/alfred/secrets.toml` on the host and is bind-mounted
  # read-only into `/etc/alfred/secrets.toml`. The
  # `user: "${UID:-1000}:${GID:-1000}"` substitution makes the container
  # run as the host operator so the mount's `chmod 600` is enforceable
  # against the in-container user too. The setup script `export UID GID`s
  # before `docker compose up` so the substitution actually picks up the
  # operator's real uid/gid (bash does not export UID by default on macOS).
  alfred-discord:
    build:
      context: .
      dockerfile: docker/alfred-core.Dockerfile
    command: ["discord"]
    restart: unless-stopped
    depends_on:
      alfred-postgres:
        condition: service_healthy
    # ``mem_limit`` is the legacy service-level field Docker Compose
    # (non-Swarm, ``docker compose up``) enforces via cgroups; the
    # ``deploy.resources.limits.memory`` block below is the modern
    # Compose-spec form that Swarm + the various managed-compose
    # platforms read. Operators get a hard 256MB cap regardless of
    # which runtime interprets the file.
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      ALFRED_DEEPSEEK_API_KEY: ${ALFRED_DEEPSEEK_API_KEY}
      ALFRED_ANTHROPIC_API_KEY: ${ALFRED_ANTHROPIC_API_KEY:-}
      ALFRED_DATABASE_URL: ${ALFRED_DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-alfred}:${POSTGRES_PASSWORD:-alfred}@alfred-postgres:5432/${POSTGRES_DB:-alfred}}
      ALFRED_OPERATOR_NAME: ${ALFRED_OPERATOR_NAME:-operator}
      ALFRED_OPERATOR_LANGUAGE: ${ALFRED_OPERATOR_LANGUAGE:-en-US}
      ALFRED_DAILY_BUDGET_USD: ${ALFRED_DAILY_BUDGET_USD:-1.0}
      ALFRED_PER_CALL_MAX_USD: ${ALFRED_PER_CALL_MAX_USD:-0.10}
      # Container-layer secrets file. The bind-mount below puts the
      # operator's host secrets.toml at this path read-only.
      ALFRED_SECRETS_FILE: /etc/alfred/secrets.toml
    volumes:
      - ${HOME}/.config/alfred/secrets.toml:/etc/alfred/secrets.toml:ro
    user: "${UID:-1000}:${GID:-1000}"

  # Spec B G6-0 (#288) — the always-up resumable gateway, deployed as its own service.
  # Reuses the alfred-core image (one Dockerfile) and runs `alfred gateway start`. In
  # G6-0 it is a pure relay (no adapter hosting, no SETUID — G6-1+) and is NOT yet
  # linked to the core (G6-0b enables comms on the core + couples the socket ids); it
  # boots HEALTHY in its core-down/buffering state (only wedged-past-breaker is
  # unhealthy). It shares alfred_run so it can bind its client socket + (in G6-0b) dial
  # the core. No depends_on: readiness is independent of the core, and the core is not a
  # long-running service until G6-0b. /metrics is compose-internal (no host port).
  alfred-gateway:
    build:
      context: .
      dockerfile: docker/alfred-core.Dockerfile
    command: ["gateway", "start"]
    restart: unless-stopped
    environment:
      ALFRED_ENVIRONMENT: ${ALFRED_ENVIRONMENT:-production}
      ALFRED_OPERATOR_LANGUAGE: ${ALFRED_OPERATOR_LANGUAGE:-en-US}
      ALFRED_GATEWAY_METRICS_PORT: ${ALFRED_GATEWAY_METRICS_PORT:-9464}
    volumes:
      - alfred_run:/home/alfred/.run
    healthcheck:
      test: ["CMD", "alfred", "gateway", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  alfred_pg_data:
  alfred_redis_data:
  alfred_state_git:
  alfred_run:
