# Slice-1 default deployment for AlfredOS.
#
# Two services:
#   * alfred-postgres — long-running daemon, healthchecked, restart-on-fail.
#   * alfred-core     — Spec B G6-0b (#288): the long-running core daemon
#                       (`daemon start`, `restart: unless-stopped`). The always-up
#                       alfred-gateway dials its `comms-tui.sock`, so the core
#                       stays up and shares the `alfred_run` socket volume.
#                       `docker compose run --rm alfred-core <cmd>` still works
#                       for one-off subcommands (migrate, user add, chat, …) —
#                       `run` overrides `command`. Requires a seeded
#                       audit.hash_pepper (bin/alfred-setup.sh) before `up -d`,
#                       or the daemon refuse-boots and (under restart) crash-loops.
#
# The compose service is named exactly `alfred-postgres` because the i18n
# string `hint.is_compose_up` advertises that name to operators.

services:
  alfred-postgres:
    image: postgres:18
    restart: unless-stopped
    # Credentials come from `.env` (see `.env.example`). Slice-1 default values
    # land via `${VAR:-default}` so a fresh checkout still boots locally; an
    # operator who wants stronger credentials sets the variables in `.env`
    # before `docker compose up`. We deliberately do NOT commit the literal
    # `alfred:alfred` password into the compose file so credential rotation
    # never requires editing tracked YAML, and a leaked checkout doesn't ship
    # reusable auth material.
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alfred}
      POSTGRES_USER: ${POSTGRES_USER:-alfred}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alfred}
      # postgres:18 relocated the default PGDATA to /var/lib/postgresql/18/docker
      # and moved its VOLUME up to /var/lib/postgresql. Pin PGDATA back to the
      # mounted path so the named `alfred_pg_data` volume actually holds the
      # cluster (otherwise pg18 writes to an anonymous volume — silent data loss
      # on recreate) AND so pg18 sees an existing pg16 cluster here and refuses
      # to boot (`database files are incompatible`) instead of initdb'ing a fresh
      # empty one — the loud guard the upgrade runbook relies on.
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - alfred_pg_data:/var/lib/postgresql/data
    networks:
      - alfred_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alfred} -d ${POSTGRES_DB:-alfred}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # alfred-redis — rate-limit counters, ContentHandle store, robots cache.
  # Internal-only: no host port exposed (spec §7.7). volatile-lru evicts
  # TTL-bearing keys under memory pressure when maxmemory is reached.
  # devops-002: maxmemory MUST be set — without it volatile-lru never
  # triggers (eviction only kicks in at the memory ceiling). Default 256 MB;
  # override with ALFRED_REDIS_MAXMEMORY env var for larger deployments.
  # devops-007: appendfsync everysec means up to 1s of budget-counter data
  # can be lost on crash. This is the accepted trade-off for AlfredOS's low
  # write rate — budget bypass from a 1s gap is an acceptable risk vs. the
  # performance cost of appendfsync always. Document this in the operator
  # runbook.
  alfred-redis:
    image: redis:8
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory ${ALFRED_REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy volatile-lru
      --appendonly yes
      --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - alfred_redis_data:/data
    networks:
      - alfred_internal

  alfred-core:
    build:
      context: .
      dockerfile: docker/alfred-core.Dockerfile
    # Spec B G6-0b (#288): alfred-core is the long-running daemon. The always-up
    # gateway dials its comms-tui.sock (bound when the socket-backed alfred_tui
    # adapter is enabled), so the core must stay up and share alfred_run.
    # `docker compose run --rm alfred-core <cmd>` still works for one-off
    # subcommands (run overrides command). Requires a seeded audit.hash_pepper
    # (bin/alfred-setup.sh) before `up -d`, or the daemon refuse-boots/crash-loops.
    command: ["daemon", "start"]
    restart: unless-stopped
    depends_on:
      alfred-postgres:
        condition: service_healthy
      alfred-redis:
        condition: service_healthy
      alfred-gateway:
        condition: service_healthy
    # SETUID is load-bearing for spec §5.2: alfred-plugin-launcher needs the
    # setuid bit (or this capability) to drop privileges to alfred-quarantine
    # at subprocess spawn. The compose-invariant test (devops-010, in
    # tests/unit/test_compose_invariants.py) pins that alfred-discord does
    # NOT have it — that service must never be able to impersonate the
    # quarantine UID.
    cap_add:
      - SETUID
    # #290: the dual-LLM quarantine child runs under bubblewrap, which builds an
    # unprivileged user namespace. Two container-level confinement layers block
    # that for a non-root, non-CAP_SYS_ADMIN process:
    #   1. Docker's default AppArmor profile (docker-default) — on Ubuntu 24.04+
    #      hosts the kernel additionally refuses unprivileged userns unless the
    #      process is under a profile carrying `userns,`.
    #   2. Docker's default seccomp profile — blocks clone/unshare with the
    #      CLONE_NEW* namespace flags absent CAP_SYS_ADMIN.
    # We replace both with custom, least-privilege profiles so bwrap can build
    # its sandbox WITHOUT --privileged / SYS_ADMIN / seccomp=unconfined /
    # apparmor=unconfined / a host-wide sysctl flip:
    #   * apparmor=alfred-bwrap   — grants ONLY `userns,` (docker/apparmor/alfred-bwrap).
    #   * seccomp=...alfred-bwrap.json — Docker default + the minimal namespace
    #     syscall allow bwrap needs (docker/seccomp/alfred-bwrap.json).
    # The host profile must be loaded once: `bin/alfred-setup.sh` does it (or run
    # `sudo apparmor_parser -r -W docker/apparmor/alfred-bwrap`). The real
    # containment around the T3 child is the bwrap policy itself, unaffected here.
    # NOTE: alfred-discord and alfred-gateway are NOT given these — alfred-discord
    # has no SETUID and never spawns the launcher (it must not impersonate the
    # quarantine UID — see test_compose_invariants), and the G6-0 gateway is a
    # pure relay; the spawn moves there in G6-1 with its own grant.
    # NOTE: the seccomp path is resolved by the Docker CLI RELATIVE TO THE
    # COMPOSE-INVOCATION CWD, not relative to this file. Run `docker compose`
    # from the repository root or the profile load fails with a "no such file"
    # error (README documents this). The apparmor entry is a NAMED profile that
    # must already be loaded into the host kernel (`bin/alfred-setup.sh` or
    # `sudo apparmor_parser -r docker/apparmor/alfred-bwrap`).
    security_opt:
      - "apparmor=alfred-bwrap"
      - "seccomp=docker/seccomp/alfred-bwrap.json"
    environment:
      # G6-0b (#288): hard boot requirement — _load_settings_or_die refuses to
      # boot the daemon without it. Defaults to production for the deployed stack.
      ALFRED_ENVIRONMENT: ${ALFRED_ENVIRONMENT:-production}
      # G6-0b (#288): enable the socket-backed alfred_tui adapter so the core
      # binds comms-tui.sock — the socket the always-up gateway dials. SINGLE-
      # QUOTED so the JSON list survives YAML scalar parsing (pydantic parses it
      # to a tuple). Override with ALFRED_COMMS_ENABLED_ADAPTERS in `.env`.
      ALFRED_COMMS_ENABLED_ADAPTERS: '${ALFRED_COMMS_ENABLED_ADAPTERS:-["alfred_tui"]}'
      ALFRED_DEEPSEEK_API_KEY: ${ALFRED_DEEPSEEK_API_KEY}
      ALFRED_ANTHROPIC_API_KEY: ${ALFRED_ANTHROPIC_API_KEY:-}
      # #340 PR2b-golive: the quarantined (dual-LLM) child's provider key. The core
      # resolves it from the broker's env layer SYNCHRONOUSLY before spawning the child
      # and REFUSES BOOT when unset (§20.2 primary refuse-boot) — a real client on a
      # placeholder key would be a silent dead-LLM, so the fail-loud posture is
      # deliberate and a keyless stack is MEANT to refuse.
      #
      # It must nonetheless be FORWARDED here, or the refusal names a remedy the operator
      # cannot perform: without this line no value in `.env` reaches the container, and
      # alfred-core mounts only alfred_state_git + alfred_run, so the _PREFER_FILE
      # secrets.toml route is closed too. The stack would then crash-loop under
      # `restart: unless-stopped` with no reachable fix. Set it in `.env`.
      #
      # Crosses to the child ONLY over fd 3 (never the scrubbed spawn env) — see
      # _child_env / fd3_key_delivery.
      ALFRED_QUARANTINE_PROVIDER_API_KEY: ${ALFRED_QUARANTINE_PROVIDER_API_KEY:-}
      # Spec C G7-1b (#333): the SAME base URL the gateway derives its egress allowlist from
      # (threaded to alfred-gateway too). An operator override MUST reach BOTH or the core
      # would dial a host the gateway's allowlist denies — a silent egress mismatch.
      ALFRED_DEEPSEEK_BASE_URL: ${ALFRED_DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      # #309 GAP-4 (Option A): the core resolves discord_bot_token from env and
      # delivers it to the gateway-hosted Discord child via spawn-grant -> fd-3.
      # Mirrors the provider keys; the gateway/child never hold a vault key. NOTE:
      # discord_bot_token is _PREFER_FILE, so a mounted secrets.toml would SHADOW this.
      ALFRED_DISCORD_BOT_TOKEN: ${ALFRED_DISCORD_BOT_TOKEN:-}
      # Reuse the same Postgres credentials so `.env` is the single source of
      # truth. The default chain mirrors the alfred-postgres service so the
      # two containers always agree on the DSN.
      ALFRED_DATABASE_URL: ${ALFRED_DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-alfred}:${POSTGRES_PASSWORD:-alfred}@alfred-postgres:5432/${POSTGRES_DB:-alfred}}
      ALFRED_OPERATOR_NAME: ${ALFRED_OPERATOR_NAME:-operator}
      ALFRED_OPERATOR_LANGUAGE: ${ALFRED_OPERATOR_LANGUAGE:-en-US}
      ALFRED_DAILY_BUDGET_USD: ${ALFRED_DAILY_BUDGET_USD:-1.0}
      ALFRED_PER_CALL_MAX_USD: ${ALFRED_PER_CALL_MAX_USD:-0.10}
      # Internal redis URL — alfred-redis has no host port; only services on
      # the compose network can reach it. PR-S3-5 ContentStore + RateLimiter
      # consume this.
      ALFRED_REDIS_URL: ${ALFRED_REDIS_URL:-redis://alfred-redis:6379/0}
      # Spec C G7-3 (#333, ADR-0042): route ALL provider egress through the gateway L7
      # CONNECT proxy — the gateway is the sole external egress plane. The connectivity-free
      # core has NO direct-egress fallback: an unset value fails closed at the EgressClient
      # seam (IOPlaneUnavailableError). Compose-internal — the proxy port is NEVER
      # host-published (test_egress_proxy_port_never_host_published).
      ALFRED_EGRESS_PROXY_URL: ${ALFRED_EGRESS_PROXY_URL:-http://alfred-gateway:8889}
      # Spec C G7-2c (#333): route tool egress through the gateway EgressRelay (the
      # framed JSON-over-TCP relay). Compose-internal — the relay port is NEVER
      # host-published (mirrors ALFRED_EGRESS_PROXY_URL / port 8889 pattern).
      # The in-core RelayEgressClient parses host:port from this URL via
      # urllib.parse.urlsplit; the scheme is informational (raw asyncio TCP, not HTTP).
      # UNSET => relay client reports a configuration error at first call.
      ALFRED_EGRESS_RELAY_URL: ${ALFRED_EGRESS_RELAY_URL:-http://alfred-gateway:8890}
      # #470: the daemon's /metrics server bind port (resolve_metrics_port falls back to
      # 9465 absent this var — mirrors the gateway's ALFRED_GATEWAY_METRICS_PORT). This is a
      # bind-port SEAM, not an operator knob: it exists so the daemon and `alfred daemon
      # healthcheck` resolve one port from one place. Treat 9465 as FIXED — Prometheus cannot
      # env-expand a static_configs target, so the scrape config targets alfred-core:9465
      # literally (exactly as it already hardcodes alfred-gateway:9464), and overriding this
      # without editing ops/prometheus/prometheus.yml silently breaks scraping with nothing to
      # catch it. The alfred-core scrape job and an operator runbook covering it land with
      # #470 PR2, which adds the bundled Prometheus/Grafana services.
      # Compose-internal only — NEVER host-published (test_core_metrics_port_never_host_published).
      ALFRED_CORE_METRICS_PORT: ${ALFRED_CORE_METRICS_PORT:-9465}
    # state.git lives on this volume and is the source of truth for
    # reviewer-gated proposals + plugin grants (spec §11.1). NOT mounted in
    # alfred-discord — the comms adapter has no business writing grants.
    volumes:
      - alfred_state_git:/var/lib/alfred
      # G6-0b (#288): the comms socket dir, shared with alfred-gateway so the
      # gateway can dial the comms-tui.sock the core binds.
      - alfred_run:/home/alfred/.run
    networks:
      - alfred_internal
    # #470: probes the daemon's /metrics HTTP endpoint on 127.0.0.1:$ALFRED_CORE_METRICS_PORT
    # (src/alfred/cli/daemon/_healthcheck.py) — liveness of the metrics exposition only, not
    # full data-plane readiness (spec §5.4); mirrors the gateway's `alfred gateway healthcheck`
    # pin below. start_period gives the daemon boot sequence (DB migration check, quarantine
    # child spawn, metrics server bind) room before the first probe counts against `retries`.
    healthcheck:
      test: ["CMD", "alfred", "daemon", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Spec B (#288) — the always-up resumable gateway, deployed as its own service.
  # Reuses the alfred-core image (one Dockerfile) and runs `alfred gateway start`. It is
  # linked to the core over the shared alfred_run socket volume (G6-0b couples the socket
  # ids) and, as of G6-1 (ADR-0036), is a privileged adapter-hosting tier — it carries
  # SETUID + the alfred-bwrap profiles (see the block comment below; the supervisor that
  # uses them lands in G6-2). It boots HEALTHY in its core-down/buffering state (only
  # wedged-past-breaker is unhealthy) and shares alfred_run so it can bind its client
  # socket + dial the core. No depends_on: readiness is independent of the core.
  # /metrics is compose-internal (no host port).
  alfred-gateway:
    build:
      context: .
      dockerfile: docker/alfred-core.Dockerfile
    command: ["gateway", "start"]
    restart: unless-stopped
    # Spec B G6-1 (ADR-0036): the gateway is reframed from "dumb/stable/low-privilege
    # relay" to a "stable-code, privileged" adapter-hosting tier. It gains SETUID +
    # the same alfred-bwrap AppArmor/seccomp profiles alfred-core carries (ADR-0037)
    # so it CAN spawn bwrap-sandboxed adapter children. The capability is granted
    # here; the GatewayAdapterSupervisor that USES it lands in G6-2 — so for the
    # G6-1→G6-2 window the gateway is privileged but spawns nothing (the dormant-
    # privilege window, accepted in ADR-0036). The image already carries bubblewrap +
    # the launcher (shared docker/alfred-core.Dockerfile); only this Compose service
    # is flipped. The gateway still mounts NO alfred_state_git (the grant store stays
    # core-only). The named alfred-bwrap AppArmor profile must be loaded on the host
    # first (bin/alfred-setup.sh / nightly already load it for alfred-core; it is
    # host-global once loaded — no new load step), and the seccomp path is resolved
    # RELATIVE TO THE COMPOSE-INVOCATION CWD, so run `docker compose` from the repo
    # root (same constraint as alfred-core).
    cap_add:
      - SETUID
    security_opt:
      - "apparmor=alfred-bwrap"
      - "seccomp=docker/seccomp/alfred-bwrap.json"
    environment:
      ALFRED_ENVIRONMENT: ${ALFRED_ENVIRONMENT:-production}
      ALFRED_OPERATOR_LANGUAGE: ${ALFRED_OPERATOR_LANGUAGE:-en-US}
      ALFRED_GATEWAY_METRICS_PORT: ${ALFRED_GATEWAY_METRICS_PORT:-9464}
      # Spec B G6-7-8 (#309): the gateway HOSTS the Discord adapter as a bwrap child.
      # _resolve_hosted_adapter_ids maps alfred_discord -> canonical "discord" and
      # excludes the tui dial-in. The gateway holds NO secret — the core resolves the
      # token and delivers it over spawn-grant -> fd-3 at each (re)spawn.
      ALFRED_COMMS_ENABLED_ADAPTERS: '${ALFRED_GATEWAY_HOSTED_ADAPTERS:-["alfred_discord"]}'
      # Spec C G7-1b (#333): the gateway serves the L7 CONNECT egress proxy on this port
      # (the core dials http://alfred-gateway:8889). NEVER host-published (no `ports:` line —
      # test_egress_proxy_port_never_host_published).
      ALFRED_EGRESS_PROXY_PORT: ${ALFRED_EGRESS_PROXY_PORT:-8889}
      # Spec C G7-2c (#333): the gateway EgressRelay listens on this port for the core's
      # framed JSON-over-TCP tool-egress requests. NEVER host-published (no `ports:` line —
      # mirrors the proxy port; test_alfred_gateway_publishes_no_host_port is the pin).
      ALFRED_EGRESS_RELAY_PORT: ${ALFRED_EGRESS_RELAY_PORT:-8890}
      # Tool-egress destination allowlist consumed by the gateway EgressRelay. Empty (default)
      # means default-deny — no tool may fire external requests until the operator adds
      # entries (public, non-secret; ADR-0036 — the gateway holds no vault key).
      ALFRED_TOOL_EGRESS_ALLOWLIST: ${ALFRED_TOOL_EGRESS_ALLOWLIST:-}
      # Canary token list for inbound-egress-response scanning. Empty (default) means no canary
      # is seeded; set to a comma-separated list of token strings in .env to enable the guard.
      # Public, non-secret — tokens are opaque strings with no exploitable value outside the
      # detection context (ADR-0036 no-secret-on-gateway invariant).
      ALFRED_CANARY_TOKENS: ${ALFRED_CANARY_TOKENS:-}
      # The gateway derives the egress destination allowlist from the SAME provider config
      # the core uses, so an operator base_url override must reach BOTH (else the gateway
      # would deny the core's legitimate destination — a silent mismatch). NOT a secret (a
      # public API base URL), so it does not breach the no-secret-on-gateway invariant.
      ALFRED_DEEPSEEK_BASE_URL: ${ALFRED_DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      # G7-4: Discord adapter L7-proxy egress allowlist. Empty (default) = the built-in
      # discord.com + *.discord.gg set. Public, non-secret (ADR-0036 no-secret-on-gateway
      # invariant). Mounted on the GATEWAY only (alfred_discord_egress) — the
      # connectivity-free core must NOT reach the Discord egress socket (devops-001).
      ALFRED_DISCORD_EGRESS_ALLOWLIST: ${ALFRED_DISCORD_EGRESS_ALLOWLIST:-}
    volumes:
      - alfred_run:/home/alfred/.run
      # G7-4: Discord adapter egress socket dir, gateway-hosted only (devops-001).
      # The core must never mount this volume — it is the whole point of Spec C / G7-4.
      - alfred_discord_egress:/home/alfred/.egress
    networks:
      - alfred_internal
      - alfred_external
    healthcheck:
      test: ["CMD", "alfred", "gateway", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # #470 PR2 Task 1: bundled internal-only Prometheus. Scrapes alfred-gateway (:9464) and
  # alfred-core (:9465) over alfred_internal only — it never joins alfred_external, so it
  # has no route to the internet even though nothing in its own config asks for one
  # (test_observability_services_internal_only is the compose-level guard; internal:true
  # on the network is the kernel-level backstop). No --web.enable-admin-api /
  # --web.enable-lifecycle: those flags let an unauthenticated caller on the compose
  # network wipe the TSDB or force a config reload, which the built-in scrape-only
  # surface has no legitimate use for here (test_prometheus_has_no_admin_or_lifecycle_api).
  # No host port published — operators reach it via `alfred` CLI / Grafana, not directly.
  alfred-prometheus:
    image: prom/prometheus:v3.13.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.listen-address=0.0.0.0:9090"
    volumes:
      - alfred_prom_data:/prometheus
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/alerts:/etc/prometheus/alerts:ro
    networks:
      - alfred_internal
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  # Spec C / G7 (epic #333, ADR-0042): the connectivity-free-core split. alfred_internal is
  # kernel-isolated (internal: true — no route to the internet); the core + datastores live
  # here. The gateway is the sole bridge: it joins BOTH networks and is the only external
  # egress plane. alfred_internal's internal:true is the kernel enforcement-of-record.
  # NOTE: an internal:true container's host-published port is not forwarded on
  # Docker-Desktop/OrbStack (macOS) — alfred-postgres's 5432:5432 works on Linux but is
  # unreachable from a Mac host (use `docker compose exec alfred-postgres psql …`).
  alfred_internal:
    internal: true
  alfred_external: {}

volumes:
  alfred_pg_data:
  alfred_redis_data:
  alfred_state_git:
  alfred_run:
  # G7-4: gateway-only Discord adapter egress socket dir. Mounted on alfred-gateway ONLY.
  # The connectivity-free core never mounts this volume (devops-001 / Spec C invariant).
  alfred_discord_egress:
  # #470 PR2 Task 1: Prometheus TSDB data — 15d retention (command's
  # --storage.tsdb.retention.time), so this volume grows bounded, not unbounded.
  alfred_prom_data:
