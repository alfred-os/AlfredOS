name: Feature request
description: Propose a new feature or capability
title: "feat: "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: What user problem does this solve?
      description: Describe the problem first, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: prd-impact
    attributes:
      label: PRD impact
      description: Does this change PRD scope, an MVP non-goal, or a decision in the log?
  - type: dropdown
    id: subsystem
    attributes:
      label: Subsystem
      multiple: true
      options:
        - Comms adapter
        - Memory
        - Trust boundary / safety
        - Reviewer gate
        - Persona system
        - Provider routing / caching
        - Deployment / setup
        - Observability
        - CLI
        - Other
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have read CLAUDE.md and PRD.md
          required: true
