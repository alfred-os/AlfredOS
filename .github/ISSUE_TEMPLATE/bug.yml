name: Bug report
description: Report a defect in AlfredOS
title: "bug: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
        **If this is a security concern, stop and use [Security Advisories](https://github.com/alfred-os/AlfredOS/security/advisories/new) instead.**
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear, concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start AlfredOS with ...
        2. Send message ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AlfredOS version or commit
      placeholder: v0.1.0 or 7a1f2b3
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker Compose (default)
        - Local Python (dev)
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Host OS
      placeholder: "macOS 15.5 / Ubuntu 24.04 / Windows 11 WSL2"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (redact secrets and personal data)
      render: text
  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have read SECURITY.md and this is not a security concern
          required: true
        - label: I have redacted any secrets, tokens, or personal data from logs
          required: true
