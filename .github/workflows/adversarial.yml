name: adversarial

# Runs the AlfredOS adversarial security corpus
# (`uv run pytest tests/adversarial -v`) on EVERY PR to main and every push
# to main.
#
# Spec B G6-7-6 (#309) flipped this corpus from ADVISORY to RELEASE-BLOCKING:
#   - `continue-on-error: true` REMOVED — a corpus failure now blocks merge.
#   - the `paths:` filter DROPPED from both triggers — the suite runs on
#     EVERY PR, closing the "off-path PR ⇒ required check never runs ⇒ merge
#     blocked forever" footgun documented in docs/ci/required-checks.md
#     (the perf-gate paths-filter caveat).
#   - the `corpuscheck` step is now FAIL-CLOSED on an empty/moved corpus
#     (it FAILs the job instead of skipping) so a layout change that breaks
#     the `find` pattern cannot pass the required gate while gating nothing.
# The `Adversarial corpus` check is being promoted to a required status check
# — see docs/ci/required-checks.md.
#
# COVERAGE HONESTY: the bwrap-gated `sandbox_escape` legs SKIP here (no bwrap
# on this runner) and stay gated by the `integration-privileged` job (its own
# promotion is G6-7-7's done-definition). A green `Adversarial corpus` does
# NOT certify the escape payloads until that lands.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  PYTHON_VERSION: "3.14"
  UV_VERSION: "0.5.14"

jobs:
  adversarial:
    name: Adversarial corpus
    # No job-level `hashFiles()` guard: GitHub Actions rejects `hashFiles()`
    # in job-level `if:` at workflow-parse time (HTTP 422 "Unrecognized
    # function: 'hashFiles'") — the function is only valid inside step
    # contexts (`steps.*.if`, `env:`, `with:`). The in-job `corpuscheck`
    # step below is the canonical gate; every downstream step short-circuits
    # on `steps.corpuscheck.outputs.has_corpus`. The cost of running
    # checkout + the corpuscheck probe on a no-corpus branch is ~5 seconds.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Check for adversarial corpus
        id: corpuscheck
        run: |
          set -euo pipefail
          if [ -d tests/adversarial ] && find tests/adversarial -name 'test_*.py' 2>/dev/null | grep -q .; then
            echo "has_corpus=true" >> "$GITHUB_OUTPUT"
          else
            # FAIL-CLOSED (Spec B G6-7-6, #309): this is now a REQUIRED gate.
            # `tests/adversarial` is permanent (235 tests); a missing/moved
            # corpus means the `find` pattern broke, NOT that there's nothing
            # to gate. Skipping here would pass the required check while gating
            # nothing (green-because-skipped). Fail loud instead.
            echo "::error::adversarial corpus missing — required gate cannot run"
            exit 1
          fi
      - name: Install uv
        if: steps.corpuscheck.outputs.has_corpus == 'true'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        if: steps.corpuscheck.outputs.has_corpus == 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Sync dependencies
        if: steps.corpuscheck.outputs.has_corpus == 'true'
        run: uv sync --dev
      - name: Run adversarial corpus
        if: steps.corpuscheck.outputs.has_corpus == 'true'
        run: uv run pytest tests/adversarial -v
      - name: Assert sandbox-escape corpus is present (collected, even if skipped)
        # sec-001(b) (Spec B G6-7-6, #309): the bwrap-gated `sandbox_escape`
        # payloads SKIP here (no bwrap on this runner) — they are gated by the
        # `integration-privileged` job (G6-7-7). Assert they are still
        # COLLECTED so a future deletion/rename can't make them vanish while
        # this required gate stays green. (Skipped-but-present is fine; absent
        # is a fail.)
        #
        # ROBUSTNESS (Spec B G6-7-6 fleet review — devops-002/err-001/sec-g676-001):
        # assert the SPECIFIC load-bearing escape node-ids, not merely "some test_
        # line", and check pytest's collect exit code SEPARATELY from the grep. The
        # naive `--collect-only … 2>&1 | grep -q 'test_'` had two green-because-
        # skipped holes this step exists to prevent: (a) deleting only the escape
        # payload FILE while sibling detector tests survive still emits `test_`
        # node-ids and passes; (b) `pipefail` + a collection error that streams one
        # line before dying is masked by the pipe. The two node-ids live in
        # `test_sbx_corpus_executable.py`, the third in its sibling, so the trio
        # also fails loud if EITHER file vanishes. Capturing into `$collected` under
        # `set -e` fails the step on a non-zero collect (error/empty) before any grep.
        #
        # #340 PR2a Task 6 registers two more: the sbx-2026-015 dormant-mechanism
        # corpus payload's mechanism-proof node-ids
        # (`test_brokered_fd_dormant_mechanism.py`). Unlike the bwrap-gated pair
        # above, these are PURE UNIT tests (mocked Popen + a real socketpair, no
        # bwrap) that run — never skip — on this runner; registering them here means
        # a silent deletion of the payload or its test file fails this gate too.
        if: steps.corpuscheck.outputs.has_corpus == 'true'
        run: |
          set -euo pipefail
          collected="$(uv run pytest tests/adversarial/sandbox_escape --collect-only -q)"
          for node in \
            test_sbx_2026_012_quarantine_child_does_not_leak_fd3_key \
            test_sbx_2026_013_live_spawned_child_host_escape_contained \
            test_only_sanctioned_quarantined_llm_spawn_site \
            test_only_sanctioned_raw_socket_egress_site \
            test_live_echo_spawn_passes_no_control_fd \
            test_control_channel_refuses_a_second_or_zero_fd \
            test_sbx_2026_016_over_broad_bind_source_refused ; do
            if ! printf '%s\n' "$collected" | grep -q "::${node}"; then
              echo "::error::sandbox_escape payload ${node} missing from the required adversarial corpus"
              printf '%s\n' "$collected"
              exit 1
            fi
          done
