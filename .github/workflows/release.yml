name: Release

on:
  push:
    tags:
      - "v*"

# Tag-driven; do not cancel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false


permissions:
  # contents: write is required by softprops/action-gh-release to create
  # the draft release. Scoped to this workflow only; other workflows are
  # contents: read.
  contents: write  # zizmor: ignore[excessive-permissions]

jobs:
  release:
    name: Create draft release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          # Release workflow doesn't push — only reads tag history to
          # generate release notes — so credentials don't need to persist.
          persist-credentials: false
      - name: Create draft release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0 # zizmor: ignore[superfluous-actions]
        with:
          draft: true
          generate_release_notes: true
          body: |
            Draft release for ${{ github.ref_name }}.

            Edit this draft to fill in highlights, breaking changes, and the upgrade guide before publishing.
