name: CodeQL

# Deep semantic analysis via CodeQL. Free for public repos via GitHub
# Advanced Security. Authored per the author-gating-workflow skill.
#
# Pre-Slice-1 state has no Python source files yet; the `srccheck` step
# detects this and skips init+analyze so the job succeeds. Once Slice 1
# lands `src/alfred/**/*.py`, the steps activate automatically.
#
# No `strategy.matrix` here even though CodeQL typically uses one — when a
# matrix is present GitHub appends the matrix value to the job's display
# name (e.g. "CodeQL (Python) (python)"), which broke matching against the
# required-check string "CodeQL (Python)". When more first-party languages
# land, switch to `strategy.matrix.include` with an explicit `display:`
# field so the appended suffix matches the required-check name verbatim.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    # Mondays at 06:17 UTC. Random minute to avoid the top-of-hour rush.
    - cron: "17 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  analyze:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read         # Read the codebase for CodeQL extraction
      actions: read          # Query Actions for build/run context
      security-events: write # Write findings to the GitHub Security tab
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Check for Python source files
        # CodeQL's Python extractor exits with a fatal error if it finds no
        # Python source ("CodeQL detected code written in GitHub Actions,
        # but not any written in Python"). Pre-Slice-1 there's no Python
        # code yet; this step lets the job succeed cleanly until Slice 1
        # introduces src/alfred/**/*.py.
        id: srccheck
        run: |
          set -euo pipefail
          if find . -name '*.py' \
               -not -path './.claude/*' \
               -not -path './.gemini/*' \
               -not -path './.cursor/*' \
               -not -path './node_modules/*' 2>/dev/null | grep -q .; then
            echo "has_source=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_source=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Python source files found; CodeQL analysis skipped (expected pre-Slice-1)."
          fi
      - name: Initialize CodeQL
        if: steps.srccheck.outputs.has_source == 'true'
        uses: github/codeql-action/init@6825d5659bf007b85a0866e2d0f434aacf50de94 # v3.27.5
        with:
          languages: python
          queries: security-and-quality
      - name: Perform CodeQL analysis
        if: steps.srccheck.outputs.has_source == 'true'
        uses: github/codeql-action/analyze@6825d5659bf007b85a0866e2d0f434aacf50de94 # v3.27.5
        with:
          category: "/language:python"
