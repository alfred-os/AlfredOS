name: CodeQL

# Deep semantic analysis via CodeQL. Free for public repos via GitHub
# Advanced Security. Authored per the author-gating-workflow skill.
#
# Pre-Slice-1 state has no Python source files yet; the `srccheck` step
# detects this and skips init+analyze so the job succeeds. Once Slice 1
# lands `src/alfred/**/*.py`, the steps activate automatically.
#
# No `strategy.matrix` here even though CodeQL typically uses one — when a
# matrix is present GitHub appends the matrix value to the job's display
# name (e.g. "CodeQL (Python) (python)"), which broke matching against the
# required-check string "CodeQL (Python)". When more first-party languages
# land, switch to `strategy.matrix.include` with an explicit `display:`
# field so the appended suffix matches the required-check name verbatim.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    # Mondays at 06:17 UTC. Random minute to avoid the top-of-hour rush.
    - cron: "17 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  analyze:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read         # Read the codebase for CodeQL extraction
      actions: read          # Query Actions for build/run context
      security-events: write # Write findings to the GitHub Security tab
      packages: read         # CodeQL v4 needs to pull bundled query packs
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # fetch-depth: 0 (full history) is required by CodeQL's pr-diff-range
          # feature: it computes the diff between PR base and head to scope
          # analysis to changed code, and a shallow clone can't fetch back to
          # the merge base. A shallow checkout fails with
          # "git call failed. Cannot fetch main" + "resolve extensions-by-pack
          # error code 2" inside `codeql database run-queries`.
          fetch-depth: 0
          persist-credentials: false
      - name: Prepare git for CodeQL pr-diff-range
        if: github.event_name == 'pull_request'
        env:
          # Avoid hard-coding 'main' so this still works if the PR base ever
          # changes (e.g. release branches).
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          # The codeql-action's pr-diff-range feature shells out to
          # `git fetch origin <base>` internally and fails with "fatal:
          # error processing shallow info: 4" → "resolve extensions-by-pack
          # error code 2" when the runner's clone retains a stale shallow
          # marker (even after actions/checkout fetch-depth: 0) and/or has
          # no refspec for the PR base. Two defensive prep steps:
          #   1. If the clone is still marked shallow for any reason,
          #      unshallow it so the codeql-internal fetch can resolve.
          #   2. Materialise the base ref locally so the action's diff
          #      computation has both endpoints to compare.
          if [ -f .git/shallow ]; then
            git fetch --unshallow || true
          fi
          git fetch --no-tags origin "${BASE_REF}:${BASE_REF}"
      - name: Check for Python source files
        # CodeQL's Python extractor exits with a fatal error if it finds no
        # Python source ("CodeQL detected code written in GitHub Actions,
        # but not any written in Python"). Pre-Slice-1 there's no Python
        # code yet; this step lets the job succeed cleanly until Slice 1
        # introduces src/alfred/**/*.py.
        id: srccheck
        run: |
          set -euo pipefail
          if find . -name '*.py' \
               -not -path './.claude/*' \
               -not -path './.gemini/*' \
               -not -path './.cursor/*' \
               -not -path './node_modules/*' 2>/dev/null | grep -q .; then
            echo "has_source=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_source=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Python source files found; CodeQL analysis skipped (expected pre-Slice-1)."
          fi
      - name: Initialize CodeQL
        if: steps.srccheck.outputs.has_source == 'true'
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: python
          queries: security-and-quality
          # codeql-action v4 ships a bundled CodeQL CLI that parses the
          # action-generated pr-diff-range extension YAML correctly. v4
          # doesn't accept `tools: latest` (only `linked` or `nightly`), so
          # we rely on the bundled CLI rather than overriding it.
      - name: Perform CodeQL analysis
        if: steps.srccheck.outputs.has_source == 'true'
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:python"
