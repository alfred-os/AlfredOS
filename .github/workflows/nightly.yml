name: Nightly

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

# Schedule-driven; do not cancel overlapping runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false


permissions:
  contents: read  # Minimal: read repo content for e2e + adversarial runs

jobs:
  e2e:
    name: End-to-end
    runs-on: ubuntu-latest
    if: hashFiles('tests/e2e/conftest.py') != ''
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3 latest
      - run: uv sync --frozen --dev
      - name: Boot stack
        run: docker compose up -d --wait
      - name: Run E2E
        env:
          ANTHROPIC_API_KEY: ${{ secrets.E2E_ANTHROPIC_KEY }}
          OPENAI_API_KEY: ${{ secrets.E2E_OPENAI_KEY }}
        run: uv run pytest tests/e2e -q
      - name: Stack logs on failure
        if: failure()
        run: docker compose logs --no-color > stack.log
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4 latest
        with:
          name: stack-logs
          path: stack.log

  adversarial:
    name: Adversarial test suite
    runs-on: ubuntu-latest
    if: hashFiles('tests/adversarial/conftest.py') != ''
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3 latest
      - run: uv sync --frozen --dev
      - run: uv run pytest tests/adversarial -q
