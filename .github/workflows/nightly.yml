name: Nightly

on:
  schedule:
    # 06:00 UTC — drives the e2e + adversarial jobs (gated per-job below).
    - cron: "0 6 * * *"
    # 21:30 UTC — inside DeepSeek's off-peak discount window (16:30–00:30 UTC,
    # ~50–75% cheaper) — drives the real-llm-smoke job ONLY (gated per-job below).
    - cron: "30 21 * * *"
  workflow_dispatch:

# Schedule-driven; do not cancel overlapping runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false


permissions:
  contents: read  # Minimal: read repo content for e2e + adversarial runs

jobs:
  e2e:
    name: End-to-end
    runs-on: ubuntu-latest
    # Off-peak split (see `on.schedule`): the 06:00 cron drives e2e + adversarial;
    # the 21:30 cron drives real-llm-smoke only; workflow_dispatch runs all three.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * *' }}
    # No job-level `hashFiles()` guard: GitHub Actions rejects `hashFiles()`
    # in job-level `if:` at workflow-parse time (HTTP 422 "Unrecognized
    # function: 'hashFiles'") — the function is only valid inside step
    # contexts. The first-step `check` below probes the corpus and every
    # downstream step short-circuits on `steps.check.outputs.has_e2e`.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for e2e suite
        id: check
        run: |
          set -euo pipefail
          if [ -f tests/e2e/conftest.py ]; then
            echo "has_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_e2e=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tests/e2e/conftest.py missing — skipping E2E job."
          fi
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        if: steps.check.outputs.has_e2e == 'true'
      - if: steps.check.outputs.has_e2e == 'true'
        run: uv sync --frozen --dev
      - name: Load the bwrap userns AppArmor profile (#290)
        if: steps.check.outputs.has_e2e == 'true'
        # docker-compose.yaml pins alfred-core at `security_opt:
        # apparmor=alfred-bwrap`. Docker REFUSES to create the container if that
        # named profile is not loaded into the host kernel — so the stack fails to
        # boot before any e2e test runs. Load it here (the GH ubuntu runner has
        # passwordless sudo). Guarded on `command -v apparmor_parser` so a future
        # non-AppArmor runner skips gracefully (where the security_opt line is a
        # runtime no-op anyway).
        run: |
          set -euo pipefail
          if command -v apparmor_parser >/dev/null 2>&1; then
            sudo apparmor_parser -r -W docker/apparmor/alfred-bwrap
            echo "Loaded alfred-bwrap AppArmor profile."
          else
            echo "::notice::apparmor_parser absent — skipping profile load (security_opt is a no-op on this host)."
          fi
      - name: Boot stack
        if: steps.check.outputs.has_e2e == 'true'
        run: docker compose up -d --wait
      - name: Run E2E
        if: steps.check.outputs.has_e2e == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.E2E_ANTHROPIC_KEY }}
          OPENAI_API_KEY: ${{ secrets.E2E_OPENAI_KEY }}
        run: uv run pytest tests/e2e -q
      - name: Stack logs on failure
        if: failure() && steps.check.outputs.has_e2e == 'true'
        run: docker compose logs --no-color > stack.log
      - name: Upload logs
        if: failure() && steps.check.outputs.has_e2e == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stack-logs
          path: stack.log

  adversarial:
    name: Adversarial test suite
    runs-on: ubuntu-latest
    # Runs on the 06:00 cron (or manual dispatch), not the 21:30 off-peak cron.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * *' }}
    # No job-level `hashFiles()` guard (see e2e job above for rationale).
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for adversarial corpus
        id: check
        run: |
          set -euo pipefail
          if [ -f tests/adversarial/conftest.py ]; then
            echo "has_adversarial=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_adversarial=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tests/adversarial/conftest.py missing — skipping adversarial job."
          fi
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        if: steps.check.outputs.has_adversarial == 'true'
      - if: steps.check.outputs.has_adversarial == 'true'
        run: uv sync --frozen --dev
      - if: steps.check.outputs.has_adversarial == 'true'
        run: uv run pytest tests/adversarial -q

  real-llm-smoke:
    name: Real-LLM act-loop smoke
    runs-on: ubuntu-latest
    # Runs ONLY on the 21:30 UTC cron — DeepSeek's off-peak window (~50–75%
    # cheaper) — or on manual dispatch; skipped on the 06:00 peak cron.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '30 21 * * *' }}
    timeout-minutes: 25
    permissions:
      contents: read  # Minimal: read repo content; testcontainers use the host docker socket.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for the smoke test
        id: check
        run: |
          set -euo pipefail
          if [ -f tests/integration/orchestrator/test_act_loop_real_llm_smoke.py ]; then
            echo "has_smoke=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_smoke=false" >> "$GITHUB_OUTPUT"
            echo "::notice::real-LLM smoke test missing — skipping job."
          fi
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        if: steps.check.outputs.has_smoke == 'true'
      - if: steps.check.outputs.has_smoke == 'true'
        run: uv sync --frozen --dev
      - name: Run the real-LLM smoke (bounded retry to absorb LLM nondeterminism)
        if: steps.check.outputs.has_smoke == 'true'
        # ALFRED_SMOKE_PROVIDER_KEY: a throwaway low-balance deepseek-chat key the
        # operator provisions as a repo secret. Absent (fork PR / unprovisioned)
        # => the test SKIPS (skip-unless-key), never spends. Scoped via env:,
        # never interpolated into run: (workflow-injection guard).
        env:
          ALFRED_SMOKE_PROVIDER_KEY: ${{ secrets.ALFRED_SMOKE_PROVIDER_KEY }}
        # Dep-free bounded retry: 3 attempts, 5s backoff. Matches the spec's
        # `--reruns 2` INTENT (3 total attempts) without adding pytest-rerunfailures
        # (CLAUDE.md: no new dep without justification) and gets fresh
        # testcontainers per attempt (more robust vs an infra/pull flake). A
        # skipped test (no key) exits 0 on attempt 1 → no wasted retries. Every
        # conditional uses `if` so `set -e` never aborts mid-loop. Each attempt
        # is itself bounded by `timeout 300` (5m) so a stuck/degraded provider
        # fails fast (exit 124) instead of the 20-25m job-level timeout firing
        # mid-attempt-1 and starving the retry budget — 3 x 5m attempts fits
        # comfortably inside the 25m job timeout alongside setup/checkout.
        run: |
          set -euo pipefail
          if [ -z "${ALFRED_SMOKE_PROVIDER_KEY:-}" ]; then
            echo "::warning title=real-LLM smoke skipped::ALFRED_SMOKE_PROVIDER_KEY is not provisioned — this nightly run validated NOTHING (paper-gate). Provision the repo secret to activate the smoke."
          fi
          for i in 1 2 3; do
            if timeout 300 uv run pytest \
              tests/integration/orchestrator/test_act_loop_real_llm_smoke.py \
              -m real_llm -v; then
              exit 0
            fi
            echo "::warning::real-LLM smoke attempt ${i}/3 failed"
            if [ "$i" -lt 3 ]; then sleep 5; fi
          done
          exit 1
