name: Nightly

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

# Schedule-driven; do not cancel overlapping runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false


permissions:
  contents: read  # Minimal: read repo content for e2e + adversarial runs

jobs:
  e2e:
    name: End-to-end
    runs-on: ubuntu-latest
    # No job-level `hashFiles()` guard: GitHub Actions rejects `hashFiles()`
    # in job-level `if:` at workflow-parse time (HTTP 422 "Unrecognized
    # function: 'hashFiles'") — the function is only valid inside step
    # contexts. The first-step `check` below probes the corpus and every
    # downstream step short-circuits on `steps.check.outputs.has_e2e`.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for e2e suite
        id: check
        run: |
          set -euo pipefail
          if [ -f tests/e2e/conftest.py ]; then
            echo "has_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_e2e=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tests/e2e/conftest.py missing — skipping E2E job."
          fi
      - uses: astral-sh/setup-uv@887a942a15af3a7626099df99e897a18d9e5ab3a # v3 latest
        if: steps.check.outputs.has_e2e == 'true'
      - if: steps.check.outputs.has_e2e == 'true'
        run: uv sync --frozen --dev
      - name: Load the bwrap userns AppArmor profile (#290)
        if: steps.check.outputs.has_e2e == 'true'
        # docker-compose.yaml pins alfred-core at `security_opt:
        # apparmor=alfred-bwrap`. Docker REFUSES to create the container if that
        # named profile is not loaded into the host kernel — so the stack fails to
        # boot before any e2e test runs. Load it here (the GH ubuntu runner has
        # passwordless sudo). Guarded on `command -v apparmor_parser` so a future
        # non-AppArmor runner skips gracefully (where the security_opt line is a
        # runtime no-op anyway).
        run: |
          set -euo pipefail
          if command -v apparmor_parser >/dev/null 2>&1; then
            sudo apparmor_parser -r -W docker/apparmor/alfred-bwrap
            echo "Loaded alfred-bwrap AppArmor profile."
          else
            echo "::notice::apparmor_parser absent — skipping profile load (security_opt is a no-op on this host)."
          fi
      - name: Boot stack
        if: steps.check.outputs.has_e2e == 'true'
        run: docker compose up -d --wait
      - name: Run E2E
        if: steps.check.outputs.has_e2e == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.E2E_ANTHROPIC_KEY }}
          OPENAI_API_KEY: ${{ secrets.E2E_OPENAI_KEY }}
        run: uv run pytest tests/e2e -q
      - name: Stack logs on failure
        if: failure() && steps.check.outputs.has_e2e == 'true'
        run: docker compose logs --no-color > stack.log
      - name: Upload logs
        if: failure() && steps.check.outputs.has_e2e == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stack-logs
          path: stack.log

  adversarial:
    name: Adversarial test suite
    runs-on: ubuntu-latest
    # No job-level `hashFiles()` guard (see e2e job above for rationale).
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for adversarial corpus
        id: check
        run: |
          set -euo pipefail
          if [ -f tests/adversarial/conftest.py ]; then
            echo "has_adversarial=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_adversarial=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tests/adversarial/conftest.py missing — skipping adversarial job."
          fi
      - uses: astral-sh/setup-uv@887a942a15af3a7626099df99e897a18d9e5ab3a # v3 latest
        if: steps.check.outputs.has_adversarial == 'true'
      - if: steps.check.outputs.has_adversarial == 'true'
        run: uv sync --frozen --dev
      - if: steps.check.outputs.has_adversarial == 'true'
        run: uv run pytest tests/adversarial -q
