name: Nightly

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

# Schedule-driven; do not cancel overlapping runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false


permissions:
  contents: read  # Minimal: read repo content for e2e + adversarial runs

jobs:
  e2e:
    name: End-to-end
    runs-on: ubuntu-latest
    if: hashFiles('tests/e2e/conftest.py') != ''
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@887a942a15af3a7626099df99e897a18d9e5ab3a # v3 latest
      - run: uv sync --frozen --dev
      - name: Boot stack
        run: docker compose up -d --wait
      - name: Run E2E
        env:
          ANTHROPIC_API_KEY: ${{ secrets.E2E_ANTHROPIC_KEY }}
          OPENAI_API_KEY: ${{ secrets.E2E_OPENAI_KEY }}
        run: uv run pytest tests/e2e -q
      - name: Stack logs on failure
        if: failure()
        run: docker compose logs --no-color > stack.log
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4 latest
        with:
          name: stack-logs
          path: stack.log

  adversarial:
    name: Adversarial test suite
    runs-on: ubuntu-latest
    if: hashFiles('tests/adversarial/conftest.py') != ''
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@887a942a15af3a7626099df99e897a18d9e5ab3a # v3 latest
      - run: uv sync --frozen --dev
      - run: uv run pytest tests/adversarial -q
