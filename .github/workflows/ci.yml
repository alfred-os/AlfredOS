name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel-in-progress: rapid PR pushes do not queue stale runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}


permissions:
  contents: read  # Minimal: read repo content for lint / type / unit / integration

jobs:
  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: DavidAnson/markdownlint-cli2-action@b4c9feab76d8025d1e83c653fa3990936df0e6c8 # v16
        with:
          globs: |
            **/*.md
            !LICENSE
            !node_modules/**

  python:
    name: Python (lint, types, unit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: hashFiles('pyproject.toml') != ''
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3 latest
      - run: uv python install 3.14
      - run: uv sync --frozen --dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        # Replaces the old `black --check .` step. ruff format is the
        # AlfredOS-canonical formatter (see docs/python-conventions.md);
        # black is being removed from dev-deps in the Slice 1 Task 1
        # pyproject.toml fixup.
        run: uv run ruff format --check .
      - name: Mypy (strict)
        if: hashFiles('src/**/*.py') != ''
        run: uv run mypy --strict src/
      - name: Pyright
        if: hashFiles('src/**/*.py') != ''
        run: uv run pyright src/
      - name: Unit tests + coverage gates
        if: hashFiles('tests/unit/**/*.py') != ''
        # Two gates here:
        #   1. Overall coverage >= 75% (matches pyproject.toml [tool.coverage.report]
        #      fail_under). Drift-detection contract — keeps wide modules honest.
        #   2. Security boundaries 100% line+branch. CLAUDE.md hard rule:
        #      every security boundary must have 100% line+branch coverage.
        #      Slice 1's security surface is small (tiers + secret broker), so
        #      100% is achievable today; future slices add canaries, capability
        #      gate, DLP — each must land with its tests at this bar.
        # The follow-up `coverage report` invocation re-uses the .coverage
        # data file written by the pytest --cov run; no second test execution.
        # The hooks-subsystem coverage gate lives in its OWN step below so
        # the `if: hashFiles('src/alfred/hooks/*.py') != ''` guard cleanly
        # no-ops on a branch where the hooks subsystem hasn't landed yet —
        # mirrors the unit-test step's guard discipline.
        run: |
          uv run pytest tests/unit -q --cov=src/alfred --cov-report=term-missing --cov-fail-under=75
          uv run coverage report --include='src/alfred/security/*' --fail-under=100
      - name: Hooks subsystem 100% line+branch coverage
        # Slice 2.5 PR-A's ``src/alfred/hooks/`` is a trust boundary in its
        # own right — the capability gate (sec-007), the re-entry bypass
        # (sec-008), the chain-deadline timer (§6.4) and the
        # refusal-authorization check (§6.5) ALL live in this subsystem;
        # every line must be proven by a test. Per-file ``--include``
        # enumerates the eight ``.py`` modules (including ``__init__.py``
        # so the public-surface lock is gated too) so the list stays
        # unambiguous when new files land — a new module skipped here is a
        # code-review smell, not a silent coverage hole.
        # The hashFiles guard makes the step a clean no-op on a branch where
        # the hooks subsystem hasn't landed yet (mirrors the unit-test step
        # at line 61's guard discipline). Re-uses the .coverage data file
        # written by the unit-test step above; depends on that step running
        # first via implicit step ordering.
        if: hashFiles('src/alfred/hooks/*.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/hooks/__init__.py,src/alfred/hooks/registry.py,src/alfred/hooks/invoke.py,src/alfred/hooks/capability.py,src/alfred/hooks/decorators.py,src/alfred/hooks/context.py,src/alfred/hooks/errors.py,src/alfred/hooks/audit_sink.py' \
            --fail-under=100
      - name: Trust-boundary files 100% line+branch coverage
        # Slice-3 PR-S3-1 trust-boundary surface (spec §11a). The four
        # files explicitly enumerated below are the ONLY legitimate
        # construction sites for ``TaggedContent`` instances and the
        # ingress / quarantine / bootstrap boundaries the orchestrator
        # depends on:
        #
        #   * ``src/alfred/security/tiers.py`` — T0/T1/T2/T3 classes,
        #     ``tag()`` overload set, ``CapabilityGateNonce``, and
        #     ``tag_t3_with_nonce`` (§3.1 / §3.2).
        #   * ``src/alfred/security/quarantine.py`` — ``T3DerivedData``
        #     NewType, ``ContentHandle`` single-use carrier, and the
        #     ``quarantined_to_structured`` / ``downgrade_to_orchestrator``
        #     stubs PR-S3-4 will fill in (§3.4 / §3.7 / §7.3).
        #   * ``src/alfred/identity/_ingest.py`` — the role × adapter
        #     T1/T2 derivation hook (§3.6) AND the publisher for the
        #     ``identity.t1_ingress`` + ``identity.t1_downgrade``
        #     hookpoints (§14).
        #   * ``src/alfred/bootstrap/nonce_factory.py`` — the per-process
        #     T3 nonce factory and the module-level lock that backs the
        #     atomic registration invariant (§3.2; CR-138 round-2 #3+#4).
        #
        # Per-file ``--include`` mirrors the hooks-subsystem precedent
        # above. The list is explicit so a new trust-boundary file gets
        # added to the gate at the same PR it lands, not silently shipped
        # at < 100% coverage. The hashFiles guard makes the step a clean
        # no-op on a branch where any of the files have not yet landed
        # (mirrors the unit-test step's guard discipline).
        #
        # CR-138 finding #1: chain the hashFiles() checks with ``&&``
        # because ``hashFiles('a','b','c') != ''`` is ANY-match, not
        # ALL-match. The gate must require ALL files to be present; if
        # any one is missing the coverage step should no-op.
        if: hashFiles('src/alfred/security/tiers.py') != '' && hashFiles('src/alfred/security/quarantine.py') != '' && hashFiles('src/alfred/identity/_ingest.py') != '' && hashFiles('src/alfred/bootstrap/nonce_factory.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/security/tiers.py,src/alfred/security/quarantine.py,src/alfred/identity/_ingest.py,src/alfred/bootstrap/nonce_factory.py' \
            --fail-under=100

  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: hashFiles('tests/integration/**/*.py') != ''
    services:
      # Service container images are pinned to major tags. zizmor flags these
      # as unpinned-images (which prefers @sha256:digest); accept it because
      # (a) these are well-known images from official Docker Hub sources,
      # (b) Dependabot's docker ecosystem watches docker-compose.yaml not
      # GHA service blocks, and (c) digest-pinning here would block
      # patch-level postgres/redis updates we want for security.
      postgres:
        image: postgres:16  # zizmor: ignore[unpinned-images]
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports: ["5432:5432"]
      redis:
        image: redis:7  # zizmor: ignore[unpinned-images]
        ports: ["6379:6379"]
      qdrant:
        image: qdrant/qdrant:v1.12.4  # zizmor: ignore[unpinned-images]
        ports: ["6333:6333"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3 latest
      - run: uv sync --frozen --dev
      - run: uv run pytest tests/integration -q

  smoke:
    name: Smoke (end-to-end)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: hashFiles('tests/smoke/**/*.py') != ''
    # No services: block — the smoke test boots its own Postgres testcontainer
    # so the container lifecycle is deterministic and the test owns its data.
    # Docker is available on ubuntu-latest by default; testcontainers uses the
    # host docker socket.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3 latest
      - run: uv python install 3.14
      - run: uv sync --frozen --dev
      - name: Run smoke tests
        # Gated smoke env vars: when present, the Discord-gateway smoke
        # and the real-provider TUI smoke run end-to-end; when absent
        # (fork PRs, secrets not yet provisioned), the tests SKIP cleanly
        # — same skip-vs-pass discipline the test files enforce.
        # The values must be set as repo secrets by the operator AFTER
        # this PR merges (PR-E plan Task 1 Step 4 + Task 1b Step 1b.7):
        # * ALFRED_SMOKE_DISCORD_TOKEN — throwaway bot from a private
        #   Discord application the operator/CI owns.
        # * ALFRED_SMOKE_PROVIDER_KEY — throwaway DeepSeek API key (or
        #   Anthropic fallback per ADR-0001).
        # Secrets are scoped via env:, never interpolated into the
        # run: block — the workflow-injection guard in the security
        # reminder hook is satisfied.
        env:
          ALFRED_SMOKE_DISCORD_TOKEN: ${{ secrets.ALFRED_SMOKE_DISCORD_TOKEN }}
          ALFRED_SMOKE_PROVIDER_KEY: ${{ secrets.ALFRED_SMOKE_PROVIDER_KEY }}
        run: uv run pytest tests/smoke -v

  setup-script-smoke:
    name: Setup script smoke (${{ matrix.os }})
    if: hashFiles('bin/alfred-setup.sh') != ''
    timeout-minutes: 5
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - run: bin/alfred-setup.sh --dry-run
