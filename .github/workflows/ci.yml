name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel-in-progress: rapid PR pushes do not queue stale runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}


permissions:
  contents: read  # Minimal: read repo content for lint / type / unit / integration

jobs:
  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # markdownlint-cli2 is run via npx directly rather than the
      # DavidAnson/markdownlint-cli2-action action because alfred-os org
      # policy restricts third-party actions to GitHub-published or
      # verified-Marketplace entries; that action isn't verified, so the
      # workflow fails to parse (`startup_failure`) regardless of SHA
      # pinning. The CLI itself is a regular npm package and works fine
      # called directly. `actions/setup-node` IS GitHub-published.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
      - name: Run markdownlint-cli2
        run: |
          set -euo pipefail
          npx --yes markdownlint-cli2@0.14.0 \
            "**/*.md" \
            "!LICENSE" \
            "!node_modules/**"

  python:
    name: Python (lint, types, unit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # No job-level `hashFiles()` guard: GitHub Actions rejects `hashFiles()`
    # in job-level `if:` at workflow-parse time (HTTP 422 "Unrecognized
    # function: 'hashFiles'") — the function is only valid inside step
    # contexts. The first-step `check` below probes for pyproject.toml and
    # every downstream step short-circuits on `steps.check.outputs.has_py`.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Check for Python project
        id: check
        run: |
          set -euo pipefail
          if [ -f pyproject.toml ]; then
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_py=false" >> "$GITHUB_OUTPUT"
            echo "::notice::pyproject.toml missing — skipping Python job."
          fi
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3 latest
        if: steps.check.outputs.has_py == 'true'
      - if: steps.check.outputs.has_py == 'true'
        run: uv python install 3.14
      - if: steps.check.outputs.has_py == 'true'
        run: uv sync --frozen --dev
      - name: Ruff lint
        if: steps.check.outputs.has_py == 'true'
        run: uv run ruff check .
      - name: Ruff format check
        # Replaces the old `black --check .` step. ruff format is the
        # AlfredOS-canonical formatter (see docs/python-conventions.md);
        # black is being removed from dev-deps in the Slice 1 Task 1
        # pyproject.toml fixup.
        if: steps.check.outputs.has_py == 'true'
        run: uv run ruff format --check .
      - name: Mypy (strict)
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/**/*.py') != ''
        run: uv run mypy --strict src/
      - name: Pyright
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/**/*.py') != ''
        run: uv run pyright src/
      - name: Unit tests + coverage gates
        if: steps.check.outputs.has_py == 'true' && hashFiles('tests/unit/**/*.py') != ''
        # Two gates here:
        #   1. Overall coverage >= 75% (matches pyproject.toml [tool.coverage.report]
        #      fail_under). Drift-detection contract — keeps wide modules honest.
        #   2. Security boundaries 100% line+branch. CLAUDE.md hard rule:
        #      every security boundary must have 100% line+branch coverage.
        #      Slice 1's security surface is small (tiers + secret broker), so
        #      100% is achievable today; future slices add canaries, capability
        #      gate, DLP — each must land with its tests at this bar.
        # The follow-up `coverage report` invocation re-uses the .coverage
        # data file written by the pytest --cov run; no second test execution.
        # The hooks-subsystem coverage gate lives in its OWN step below so
        # the `if: hashFiles('src/alfred/hooks/*.py') != ''` guard cleanly
        # no-ops on a branch where the hooks subsystem hasn't landed yet —
        # mirrors the unit-test step's guard discipline.
        run: |
          uv run pytest tests/unit -q --cov=src/alfred --cov-report=term-missing --cov-fail-under=75
          uv run coverage report --include='src/alfred/security/*' --fail-under=100
      - name: Comms credential adversarial corpus (release-blocking)
        # Spec B G6-3 (#288): the G6-3 credential round-trip is the heaviest trust
        # boundary in Spec B (a real platform credential over fd 3). Its non-root,
        # in-process adversarial corpus (``tests/adversarial/comms`` — cross-adapter
        # read, gateway-holds-no-vault-key, forged/replayed/unsolicited grant) is
        # labelled release-blocking, so it MUST run on a REQUIRED gate, not only on the
        # advisory ``adversarial.yml`` (which carries ``continue-on-error: true`` and
        # never blocks merge — the #245 paper-gate hazard). This discrete step in the
        # required ``python`` job is that gate: a credential-leak / forged-grant
        # regression blocks merge here. Kept SEPARATE from the unit ``--cov`` run above
        # (it is not a coverage-bearing tier; the credential modules are gated 100% by
        # the plugins + comms_mcp + gateway per-file gates). The corpus is ~3s and needs
        # no root / Postgres / Docker.
        #
        # NOTE (governance follow-up, G6-6): promoting the WHOLE adversarial suite to a
        # required gate (flipping ``adversarial.yml``'s ``continue-on-error`` + adding
        # it to ``docs/required-checks.md``) is a tracked separate change — this step
        # gates ONLY the G6-3 credential corpus, not the repo-wide suite.
        if: steps.check.outputs.has_py == 'true' && hashFiles('tests/adversarial/comms/**/*.py') != ''
        run: uv run pytest tests/adversarial/comms -q
      - name: Hooks subsystem 100% line+branch coverage
        # Slice 2.5 PR-A's ``src/alfred/hooks/`` is a trust boundary in its
        # own right — the capability gate (sec-007), the re-entry bypass
        # (sec-008), the chain-deadline timer (§6.4) and the
        # refusal-authorization check (§6.5) ALL live in this subsystem;
        # every line must be proven by a test. Per-file ``--include``
        # enumerates the eight ``.py`` modules (including ``__init__.py``
        # so the public-surface lock is gated too) so the list stays
        # unambiguous when new files land — a new module skipped here is a
        # code-review smell, not a silent coverage hole.
        # The hashFiles guard makes the step a clean no-op on a branch where
        # the hooks subsystem hasn't landed yet (mirrors the unit-test step
        # at line 61's guard discipline). Re-uses the .coverage data file
        # written by the unit-test step above; depends on that step running
        # first via implicit step ordering. The chained ``has_py`` clause
        # mirrors the Mypy / Pyright / unit-test gates so a pyproject-less
        # branch no-ops cleanly instead of failing on a missing
        # ``uv run`` toolchain (CR-177).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/hooks/*.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/hooks/__init__.py,src/alfred/hooks/registry.py,src/alfred/hooks/invoke.py,src/alfred/hooks/capability.py,src/alfred/hooks/decorators.py,src/alfred/hooks/context.py,src/alfred/hooks/errors.py,src/alfred/hooks/audit_sink.py,src/alfred/hooks/boot.py' \
            --fail-under=100
      - name: First-party bootstrap-grants 100% line+branch coverage
        # N1 (PR-S4-11b0 review): ``_bootstrap_grants.py`` holds the ADR-0026
        # ``FIRST_PARTY_SYSTEM_GRANTS`` constant — the single source of truth
        # for the in-tree defences AlfredOS seeds at boot. It is already
        # caught INCIDENTALLY by the ``security/*`` glob gate above; this
        # explicit per-file gate makes it AUDITABLY named (a reviewer can see
        # the trust-boundary constant is gated by name, not just by glob).
        # Unlike ``_gate.py`` (whose outage paths only the integration suite
        # exercises, so its explicit gate lives in ``coverage-gates``), this
        # module is a pure constant + drift-guard surface fully covered by the
        # unit tier, so gating it on unit-only ``.coverage`` data is sound.
        # The combined-job ``Trust-boundary files`` gate names it too (the
        # two-gates pattern — keep BOTH in sync when this file changes).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/security/capability_gate/_bootstrap_grants.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/security/capability_gate/_bootstrap_grants.py' \
            --fail-under=100
      - name: Comms-adapter load-grants 100% line+branch coverage
        # ADR-0027 (PR-S4-11b): ``_comms_adapter_grants.py`` holds the
        # ``comms_adapter_load_grants`` builder — the config-is-authorization
        # source of truth for the plugin-LOAD grants the daemon seeds per
        # operator-enabled first-party comms adapter. Like ``_bootstrap_grants.py``
        # it is a pure ``Settings -> tuple[GrantRow]`` transform fully covered by
        # the unit tier (reads source-controlled manifests off disk, no Postgres),
        # so gating it on unit-only ``.coverage`` data is sound. Named explicitly
        # (not just glob-caught) so a reviewer sees the trust-boundary builder is
        # gated by name. The combined-job ``Trust-boundary files`` gate names it
        # too (the two-gates pattern — keep BOTH in sync when this file changes).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/security/capability_gate/_comms_adapter_grants.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/security/capability_gate/_comms_adapter_grants.py' \
            --fail-under=100
      - name: Forwarded-inbound re-parse trust-boundary 100% line+branch coverage
        # Spec B G6-7-1 (#309, ADR-0039): ``inbound_reparse.py`` is the core-side
        # data-layer half of the gateway->core inbound bridge's F3 forgery
        # mitigation — it re-parses an opaque body the gateway never validated and
        # enforces the envelope==body adapter_id equality. A coverage hole could
        # ship an un-exercised refusal branch (a forged-body mismatch or a
        # malformed body that is NOT raised loud), so 100% line+branch is the bar.
        # Fully covered by the unit tier (tests/unit/comms/test_inbound_reparse.py)
        # — pure function, no root, no Postgres. Named explicitly (two-gates
        # pattern) so a reviewer sees the boundary; keep the combined gate in sync.
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/comms_mcp/inbound_reparse.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/comms_mcp/inbound_reparse.py' \
            --fail-under=100
      - name: Quarantine transport trust-boundary 100% line+branch coverage
        # PR-S4-11c-2a (ADR-0029): ``quarantine_transport.py`` is the host-side
        # wire that carries a T3 inbound body to the quarantined LLM — the single-
        # use staging map, the ``T3BodyRecorder`` boundary that tags the body T3,
        # and the ``QuarantineStdioTransport`` ingest-then-extract dispatch. A
        # coverage hole here is a hole at the dual-LLM trust boundary. It is
        # already caught INCIDENTALLY by the ``security/*`` glob gate above; this
        # explicit per-file gate makes it AUDITABLY named (a reviewer sees the
        # trust-boundary wire is gated by name, not just by glob). Fully covered
        # by the unit tier (``tests/unit/security/test_quarantine_transport.py``),
        # so gating on unit-only ``.coverage`` data is sound. The combined-job
        # ``Trust-boundary files`` gate names it too (the two-gates pattern — keep
        # BOTH in sync when this file changes).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/security/quarantine_transport.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/security/quarantine_transport.py' \
            --fail-under=100
      - name: Quarantine child-IO trust-boundary 100% line+branch coverage
        # PR-S4-11c-2b0 (ADR-0030): ``quarantine_child_io.py`` is the host-side
        # SPAWN of the real bwrap-sandboxed quarantined-LLM child + the fd-3
        # provider-key delivery — the dual-LLM trust boundary's spawn substrate.
        # The spawn discipline (dup read-end onto fd 3, pass_fds=(3,), scrubbed
        # allowlist env, bound-interpreter override), the bounded ``read_frame``,
        # the fail-closed ``QuarantineChildSpawnError`` on delivery failure, and
        # idempotent ``aclose`` are all trust-boundary code; a coverage hole here
        # is a hole at the boundary. Caught INCIDENTALLY by the ``security/*`` glob
        # gate above; this explicit per-file gate names it for a reviewer. Fully
        # covered by the unit tier
        # (``tests/unit/security/test_quarantine_child_io.py``, fake subprocess),
        # so gating on unit-only ``.coverage`` data is sound. The combined-job
        # ``Trust-boundary files`` gate names it too (the two-gates pattern — keep
        # BOTH in sync when this file changes).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/security/quarantine_child_io.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/security/quarantine_child_io.py' \
            --fail-under=100
      - name: Daemon control-plane trust-boundary 100% line+branch coverage
        # G6-2b-2c (#288, ADR-0038): the daemon control plane — a 0600 local-socket
        # request/response introspection RPC. ``_local_socket.py`` is the EXTRACTED
        # shared socket-security primitive (peer-uid auth, owner-only bind); the
        # control server/client/protocol are the new IPC surface the CLI dials. All
        # four are trust-boundary code (a coverage hole could ship an un-exercised
        # auth/bind/error-mapping branch). Fully covered by the unit tier
        # (``tests/unit/plugins/test_local_socket.py`` +
        # ``tests/unit/cli/daemon/test_daemon_control_*.py``), so gating on unit-only
        # ``.coverage`` data is sound. The combined ``coverage-gates`` job names them
        # too (the two-gates pattern — keep BOTH in sync when this file changes).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/plugins/_local_socket.py') != '' && hashFiles('src/alfred/cli/daemon/_daemon_control_server.py') != '' && hashFiles('src/alfred/cli/daemon/_daemon_control_client.py') != '' && hashFiles('src/alfred/cli/daemon/_daemon_control_protocol.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/plugins/_local_socket.py,src/alfred/cli/daemon/_daemon_control_server.py,src/alfred/cli/daemon/_daemon_control_client.py,src/alfred/cli/daemon/_daemon_control_protocol.py' \
            --fail-under=100
      - name: Gateway kernel trust-boundary 100% line+branch coverage
        # Spec A G3-3a (#237, ADR-0032): ``src/alfred/gateway/`` is the
        # always-up gateway's stable kernel — the client-facing T1 carrier.
        # ``link_state.py`` is the pure link-state machine enforcing the §9
        # reconnecting/restored invariant (a coverage hole could ship an
        # un-exercised transition that breaks the no-restored-without-
        # reconnecting contract); ``client_listener.py`` is the client-facing
        # socket + control-frame emit (the reused 0600/0700 peer-auth posture +
        # the loud-on-dead-client send seam). Both are trust-boundary kernel,
        # so 100% line+branch is the bar (architect L2 — a new trust-boundary
        # package needs its gate wired, not assumed). Fully covered by the unit
        # tier (``tests/unit/gateway/``, in-process loopback sockets — no root,
        # no Postgres), so gating on unit-only ``.coverage`` data is sound. The
        # combined-job gate names these two files too (the two-gates pattern —
        # keep BOTH in sync when this file changes).
        # G3-3b-1 (#237) extends the kernel with the core-facing half:
        # ``core_link.py`` is the core-leg PEER handshake + the epoch-reconcile
        # forgery defense (a mismatched-epoch ``ready`` is rejected, never fed —
        # a false ``restored`` is an attack surface) + the reconnect/backoff
        # loop; ``metrics.py`` is the core-link Prometheus instrumentation;
        # ``_control_frames.py`` is the control-path bind point (its
        # ``assert_never`` makes a missing mapping a loud failure). All are
        # trust-boundary, so 100% line+branch is the bar.
        # G6-2b-1 (#288, ADR-0036) adds the per-adapter supervision shell:
        # ``adapter_lifecycle.py`` is the pure spawn/handshake/crash/breaker
        # state machine (an un-exercised transition could ship a false-liveness
        # ``up`` or a silently-dark crash-loop); ``adapter_supervisor.py`` is the
        # imperative shell whose every transition emits its ``gateway.adapter.*``
        # status frame BY CONSTRUCTION; ``adapter_status_emitter.py`` is the
        # REDACT-then-bound producer for those frames; ``adapter_metrics.py`` is
        # the per-adapter Prometheus instrumentation. All trust-boundary, 100%.
        # G6-2b-2a (#288) adds ``status_leg.py`` — the live emitter->core-link status
        # sink that carries ``gateway.adapter.*`` frames over the wire (a forged-status
        # trust boundary). 100% line+branch.
        # G6-4 (#288, ADR-0036) adds the per-adapter ingress / fair-leg-multiplex layer:
        # ``gateway_leg.py`` is the per-leg owner (buffer + per-leg seq + breaker feed +
        # back-pressure gate) the scheduler drains; ``leg_scheduler.py`` is the fair
        # round-robin egress over the single core-link writer (a starvation/HoL boundary);
        # ``ingress_gate.py`` is the payload-blind two-tier token-bucket + in-flight cap
        # (a missed branch is an un-bounded flood or a wedged slot); ``global_replay_cap.py``
        # bounds the SUM of all legs' resident pre-DLP T1 bytes (a missed release wedges the
        # fleet); ``ingress_audit.py`` is the closed-vocab field-allowlist audit sink (no
        # body / body-hash / platform-id); ``leg_router.py`` refuses forged/unknown
        # ``adapter_id`` envelopes (a label-cardinality-DoS / audit-injection boundary).
        # All trust-boundary, 100% line+branch.
        # G6-5 (#288, ADR-0036) adds the gateway adapter-hosting SPAWN substrate:
        # ``adapter_child_factory.py`` is the fd-3 credential spawn window + child-reaping
        # (a leaked credential fd or an unreaped child is a security/resource boundary);
        # ``adapter_stdio_transport.py`` is the Popen-backed stdio transport for the
        # hosted child. The inbound->core bridge + Discord flag-day are DEFERRED to #309.
        # Both trust-boundary, 100% line+branch.
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/gateway/link_state.py') != '' && hashFiles('src/alfred/gateway/client_listener.py') != '' && hashFiles('src/alfred/gateway/core_link.py') != '' && hashFiles('src/alfred/gateway/metrics.py') != '' && hashFiles('src/alfred/gateway/_control_frames.py') != '' && hashFiles('src/alfred/gateway/relay.py') != '' && hashFiles('src/alfred/gateway/_seq_tracker.py') != '' && hashFiles('src/alfred/gateway/process.py') != '' && hashFiles('src/alfred/gateway/client_link.py') != '' && hashFiles('src/alfred/gateway/replay_buffer.py') != '' && hashFiles('src/alfred/gateway/adapter_lifecycle.py') != '' && hashFiles('src/alfred/gateway/adapter_metrics.py') != '' && hashFiles('src/alfred/gateway/adapter_status_emitter.py') != '' && hashFiles('src/alfred/gateway/adapter_supervisor.py') != '' && hashFiles('src/alfred/gateway/status_leg.py') != '' && hashFiles('src/alfred/gateway/adapter_credential_client.py') != '' && hashFiles('src/alfred/gateway/gateway_leg.py') != '' && hashFiles('src/alfred/gateway/leg_scheduler.py') != '' && hashFiles('src/alfred/gateway/ingress_gate.py') != '' && hashFiles('src/alfred/gateway/global_replay_cap.py') != '' && hashFiles('src/alfred/gateway/ingress_audit.py') != '' && hashFiles('src/alfred/gateway/leg_router.py') != '' && hashFiles('src/alfred/gateway/adapter_child_factory.py') != '' && hashFiles('src/alfred/gateway/adapter_stdio_transport.py') != '' && hashFiles('src/alfred/gateway/inbound_forward_runner.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/gateway/link_state.py,src/alfred/gateway/client_listener.py,src/alfred/gateway/core_link.py,src/alfred/gateway/metrics.py,src/alfred/gateway/_control_frames.py,src/alfred/gateway/relay.py,src/alfred/gateway/_seq_tracker.py,src/alfred/gateway/process.py,src/alfred/gateway/client_link.py,src/alfred/gateway/replay_buffer.py,src/alfred/gateway/adapter_lifecycle.py,src/alfred/gateway/adapter_metrics.py,src/alfred/gateway/adapter_status_emitter.py,src/alfred/gateway/adapter_supervisor.py,src/alfred/gateway/status_leg.py,src/alfred/gateway/adapter_credential_client.py,src/alfred/gateway/gateway_leg.py,src/alfred/gateway/leg_scheduler.py,src/alfred/gateway/ingress_gate.py,src/alfred/gateway/global_replay_cap.py,src/alfred/gateway/ingress_audit.py,src/alfred/gateway/leg_router.py,src/alfred/gateway/adapter_child_factory.py,src/alfred/gateway/adapter_stdio_transport.py,src/alfred/gateway/inbound_forward_runner.py' \
            --fail-under=100
      # NOTE: the Slice-3 trust-boundary 100% gate moved to the
      # `coverage-gates` job below. The capability-gate heartbeat /
      # fail-closed / outage paths in
      # ``src/alfred/security/capability_gate/_gate.py`` (lines 151,
      # 356-394, 420-437, 452-454) are exercised ONLY by
      # ``tests/integration/security/capability_gate/
      # test_fail_closed_outage.py``. The previous step ran against
      # unit-only ``.coverage`` data and consequently reported
      # ``_gate.py`` at 72% — the 100% bar was paper-only on exactly
      # the path CLAUDE.md hard rule #7 (no silent failures in security
      # paths) is supposed to enforce. ``coverage-gates`` combines unit
      # + integration data via ``coverage combine`` and re-runs the same
      # ``--include`` list against the merged file, restoring the gate.
      - name: Plugins subsystem 100% line+branch coverage
        # Slice-3 PR-S3-3a's ``src/alfred/plugins/`` is the plugin-host
        # trust boundary (spec §11a, ADR-0017). Every file enumerated
        # below mediates between the privileged orchestrator and an
        # untrusted subprocess; a coverage hole here is a hole at the
        # trust boundary:
        #
        #   * ``src/alfred/plugins/errors.py`` — the error hierarchy the
        #     orchestrator branches on (manifest vs transport vs
        #     invocation vs quarantine-unavailable). A skipped leaf class
        #     means audit consumers cannot disambiguate failure modes
        #     (arch-006 / err-011).
        #   * ``src/alfred/plugins/transport.py`` — ``PluginTransport``
        #     Protocol + ``DispatchResult`` union (core-011). The shape
        #     downstream PRs depend on.
        #   * ``src/alfred/plugins/manifest.py`` — TOML parser with
        #     ``manifest_version=1`` pin (arch-007) and the
        #     ``subscriber_tier != T0..T3`` invariant (tier-laundering
        #     defence).
        #   * ``src/alfred/plugins/inbound_scanner.py`` — canary detection
        #     on plugin output (sec-013 / spec §7.6). A canary trip is a
        #     quarantine trigger, not a recoverable error.
        #   * ``src/alfred/plugins/content_store_base.py`` — the
        #     ``ContentStoreBase`` Protocol that persists the
        #     ``TaggedContent[T3]`` *wrapper* (rvw-004 — persisting raw
        #     bytes would silently downgrade T3 to untagged on retrieval).
        #   * ``src/alfred/plugins/stdio_transport.py`` — the StdioTransport
        #     wire: env-scrub spawn, fd-passed provider key, DLP-then-broker
        #     outbound order (arch-001 / sec-010), inbound canary scan with
        #     SECURITY EVENT disposition, ``kill()`` returning the actual
        #     SIGKILL outcome (CR R3 ``kill_succeeded``).
        #   * ``src/alfred/plugins/session.py`` — manifest-handshake
        #     orchestrator + lifecycle audit + SIGKILL-before-audit
        #     ordering on the post-handshake hook-register attack
        #     (sec-013 / core-007).
        #   * ``src/alfred/plugins/manifest_reader.py`` — the pre-launcher
        #     Python helper (spec §7.2, PR-S4-6): policy_ref confinement
        #     (sec-2 ``policy_ref_escapes_root`` / ``policy_ref_unreadable``)
        #     + the closed-vocab bare-key refusals the bash launcher branches
        #     on. A coverage hole here is an unproven confinement branch.
        #   * ``src/alfred/plugins/_observability.py`` — the spec §7a.1
        #     Prometheus histograms covering the four p99 budgets
        #     (perf-002 / perf-009). A missed observe point is a missed
        #     budget.
        #   * ``src/alfred/plugins/comms_wire.py`` +
        #     ``src/alfred/plugins/comms_seq_codec.py`` — Spec A G2 / ADR-0032:
        #     the shared frame-bound + loud-failure leaf module and the PURE
        #     out-of-band seq/ack codec (encode/decode + ``SeqDedupWindow``).
        #     The codec is the carrier-metadata framer the resume gateway
        #     (G3/G4) builds on; a coverage hole is an unproven framing /
        #     dedup / contiguous-ack branch. Pure modules, so 100% line+branch
        #     is cheap and expected.
        #
        # Per-file ``--include`` mirrors the hooks-subsystem precedent
        # above so a new plugin trust-boundary file gets added to this
        # gate at the same PR it lands rather than silently shipped at
        # < 100% coverage. Chained ``&&`` hashFiles guard per PR-S3-1 R1
        # F1: ANY-match must NOT no-op the gate; ALL files must be
        # present before the coverage report runs.
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/plugins/errors.py') != '' && hashFiles('src/alfred/plugins/transport.py') != '' && hashFiles('src/alfred/plugins/manifest.py') != '' && hashFiles('src/alfred/plugins/inbound_scanner.py') != '' && hashFiles('src/alfred/plugins/content_store_base.py') != '' && hashFiles('src/alfred/plugins/stdio_transport.py') != '' && hashFiles('src/alfred/plugins/session.py') != '' && hashFiles('src/alfred/plugins/manifest_reader.py') != '' && hashFiles('src/alfred/plugins/_observability.py') != '' && hashFiles('src/alfred/plugins/comms_stdio_transport.py') != '' && hashFiles('src/alfred/plugins/comms_socket_transport.py') != '' && hashFiles('src/alfred/plugins/comms_runner.py') != '' && hashFiles('src/alfred/plugins/inbound_disposition.py') != '' && hashFiles('src/alfred/plugins/_comms_child_env.py') != '' && hashFiles('src/alfred/plugins/comms_wire.py') != '' && hashFiles('src/alfred/plugins/comms_seq_codec.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/plugins/errors.py,src/alfred/plugins/transport.py,src/alfred/plugins/manifest.py,src/alfred/plugins/inbound_scanner.py,src/alfred/plugins/content_store_base.py,src/alfred/plugins/stdio_transport.py,src/alfred/plugins/session.py,src/alfred/plugins/manifest_reader.py,src/alfred/plugins/_observability.py,src/alfred/plugins/comms_stdio_transport.py,src/alfred/plugins/comms_socket_transport.py,src/alfred/plugins/comms_runner.py,src/alfred/plugins/inbound_disposition.py,src/alfred/plugins/_comms_child_env.py,src/alfred/plugins/comms_wire.py,src/alfred/plugins/comms_seq_codec.py' \
            --fail-under=100
      - name: Web-fetch trust-boundary 100% line+branch coverage
        id: web_fetch_cov_python
        # Slice-3 PR-S3-5's ``src/alfred/plugins/web_fetch/`` is the
        # web.fetch trust boundary (spec §7, §11a, ADR-0017). Every file
        # enumerated below mediates between the privileged orchestrator
        # and the untrusted-by-construction T3 fetch path — a coverage
        # hole here is a hole at the trust boundary:
        #
        #   * ``src/alfred/plugins/web_fetch/errors.py`` — ``WebFetchError``
        #     hierarchy + the ``WebFetchCanaryTripped`` SECURITY EVENT
        #     (deliberately NOT a ``WebFetchError`` subclass per spec
        #     §7.10 type discipline). A skipped leaf class means the
        #     orchestrator's operational-error arm cannot disambiguate
        #     failure modes or — worse — catches a canary trip as an
        #     operational error.
        #   * ``src/alfred/plugins/web_fetch/allowlist.py`` — the three-way
        #     intersection (manifest ∩ operator ∩ session) + the
        #     segment-aligned path-prefix matcher (CR-145 substring
        #     bypass fix, commit 0ac4232) + the ``..`` traversal refusal.
        #     A missed branch silently widens the allowlist past the
        #     operator's cap.
        #   * ``src/alfred/plugins/web_fetch/tls_policy.py`` — TLS
        #     fail-closed in production with ``ALFRED_ENV=development`` as
        #     the only escape hatch (spec §7.11). A skipped branch makes
        #     the escape hatch always-on.
        #   * ``src/alfred/plugins/web_fetch/content_store.py`` — Redis-
        #     backed ``ContentHandle`` with single-use ``GETDEL`` semantics
        #     (spec §7.5). A missed branch breaks the
        #     dereference-then-delete contract — the same handle could be
        #     dereferenced twice, defeating quarantine after a canary trip.
        #   * ``src/alfred/plugins/web_fetch/rate_limit.py`` — Lua-atomic
        #     three-bucket rate limiter (per_domain / per_user /
        #     daily_budget) with race-condition prevention (spec §7.7).
        #     A skipped branch silently permits over-quota requests.
        #   * ``src/alfred/plugins/web_fetch/canary_scanner.py`` — the
        #     ``InboundCanaryScanner`` registered as a system-tier
        #     subscriber on the ``tool.web.fetch`` hookpoint (spec §7.6).
        #     A missed branch means a canary token in T3 content
        #     propagates through the dual-LLM boundary undetected. This
        #     is CLAUDE.md hard rule #7 (no silent failures in security
        #     paths) territory.
        #   * ``src/alfred/plugins/web_fetch/fetch_dispatcher.py`` — the
        #     dispatcher that composes allowlist + rate-limit + TLS +
        #     scanner + audit row emission (spec §7.4). A skipped branch
        #     skips one of those gates on the audit graph.
        #
        # Per-file ``--include`` mirrors the plugins / hooks / supervisor
        # precedent so a new web-fetch trust-boundary file gets added to
        # this gate at the same PR it lands rather than silently shipped
        # at < 100% coverage. Chained ``&&`` hashFiles guard per
        # PR-S3-1 R1 F1: ANY-match must NOT no-op the gate; ALL files
        # must be present before the coverage report runs.
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/plugins/web_fetch/errors.py') != '' && hashFiles('src/alfred/plugins/web_fetch/allowlist.py') != '' && hashFiles('src/alfred/plugins/web_fetch/tls_policy.py') != '' && hashFiles('src/alfred/plugins/web_fetch/content_store.py') != '' && hashFiles('src/alfred/plugins/web_fetch/rate_limit.py') != '' && hashFiles('src/alfred/plugins/web_fetch/canary_scanner.py') != '' && hashFiles('src/alfred/plugins/web_fetch/fetch_dispatcher.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/plugins/web_fetch/errors.py,src/alfred/plugins/web_fetch/allowlist.py,src/alfred/plugins/web_fetch/tls_policy.py,src/alfred/plugins/web_fetch/content_store.py,src/alfred/plugins/web_fetch/rate_limit.py,src/alfred/plugins/web_fetch/canary_scanner.py,src/alfred/plugins/web_fetch/fetch_dispatcher.py' \
            --fail-under=100
      - name: Web-fetch coverage gate — remediation hint
        # devex-004: when the 100% trust-boundary gate fails the operator
        # gets a wall of `coverage report` output and no obvious recipe
        # for reproducing the failure locally. This step turns the gate
        # failure into a self-service remediation card pointing at the
        # exact files under contract and the precise pytest invocation
        # that reproduces the failure on a laptop. Mirrors the Slice-2.5
        # hooks-subsystem precedent for actionable CI failure messages.
        if: failure() && steps.check.outputs.has_py == 'true' && steps.web_fetch_cov_python.outcome == 'failure'
        run: |
          echo "::error::Trust-boundary coverage gate failed for web_fetch."
          echo "Files required at 100% line+branch:"
          echo "  - src/alfred/plugins/web_fetch/{allowlist,tls_policy,fetch_dispatcher,content_store,rate_limit,canary_scanner,errors}.py"
          echo ""
          echo "Local reproduction (matches the CI gate one-for-one):"
          echo "  cd \$(git rev-parse --show-toplevel)"
          echo "  uv run pytest tests/unit/plugins/web_fetch/ \\"
          echo "    --cov=alfred.plugins.web_fetch --cov-branch --cov-report=term-missing"
          echo "  uv run coverage report \\"
          echo "    --include='src/alfred/plugins/web_fetch/errors.py,src/alfred/plugins/web_fetch/allowlist.py,src/alfred/plugins/web_fetch/tls_policy.py,src/alfred/plugins/web_fetch/content_store.py,src/alfred/plugins/web_fetch/rate_limit.py,src/alfred/plugins/web_fetch/canary_scanner.py,src/alfred/plugins/web_fetch/fetch_dispatcher.py,src/alfred/plugins/web_fetch/host_ip_guard.py' \\"
          echo "    --fail-under=100"
          echo ""
          echo "Per-file drill-down (replace <module> with a specific name):"
          echo "  uv run pytest tests/unit/plugins/web_fetch/ \\"
          echo "    --cov=alfred.plugins.web_fetch.<module> --cov-branch --cov-fail-under=100 --cov-report=term-missing"
          echo "  where <module> is one of: allowlist, tls_policy, fetch_dispatcher, content_store, rate_limit, canary_scanner, errors, host_ip_guard."
          echo ""
          echo "Why 100% on these files: trust-boundary code per CLAUDE.md security rule 8."

  python-arm64:
    # Axis 3 (arch breadth — #265) — run the lint / type / unit layer of the
    # `python` job on a native arm64 Linux runner so an architecture-specific
    # regression (ctypes struct layout, byte-order, native-extension wheel,
    # POSIX-fd / struct-format assumptions) is caught in CI rather than on an
    # Apple-Silicon / Graviton operator's host. The repo is PUBLIC, so the
    # `ubuntu-24.04-arm` runner is free (GitHub bills arm64 minutes at 0× on
    # public repos), which is why this leg can run the full unit suite rather
    # than a static-analysis subset like `python-cross-os`.
    #
    # ADD, do NOT RENAME (see docs/adr/0034-ci-os-hardware-matrix.md): this is a
    # SEPARATE job emitting a SEPARATE check context (`Python (lint, types, unit)
    # (arm64)`) ALONGSIDE the unchanged amd64 `python` job. Converting `python`
    # to a `matrix` would rename its check context to `... (amd64)` and break
    # branch protection on `main` for every open PR until the protection rules
    # were updated atomically — a hazard this additive shape avoids.
    #
    # COVERAGE GATES STAY amd64-ONLY. The per-subsystem 100% line+branch gates
    # (`security/*`, `hooks/*`, plugins / web-fetch trust-boundary files) are the
    # single source of truth and live on the amd64 `python` + `coverage-gates`
    # jobs. Coverage is arch-INVARIANT (the same lines/branches execute on
    # arm64), so duplicating the gates here would add CI cost and a second place
    # to keep the per-file `--include` lists in sync for ZERO additional signal.
    # This leg therefore runs the unit suite with `--cov-fail-under=0` and emits
    # NO coverage-report step — it is a run-to-green arm64 portability signal.
    name: Python (lint, types, unit) (arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    permissions:
      contents: read
    # No job-level `hashFiles()` guard: GitHub Actions rejects `hashFiles()` in
    # job-level `if:` at workflow-parse time. The first-step `check` probes for
    # pyproject.toml and every downstream step short-circuits on
    # `steps.check.outputs.has_py` (mirrors the amd64 `python` job's discipline).
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Check for Python project
        id: check
        run: |
          set -euo pipefail
          if [ -f pyproject.toml ]; then
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_py=false" >> "$GITHUB_OUTPUT"
            echo "::notice::pyproject.toml missing — skipping Python arm64 job."
          fi
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3 latest
        if: steps.check.outputs.has_py == 'true'
      - if: steps.check.outputs.has_py == 'true'
        run: uv python install 3.14
      - if: steps.check.outputs.has_py == 'true'
        run: uv sync --frozen --dev
      - name: Ruff lint
        if: steps.check.outputs.has_py == 'true'
        run: uv run ruff check .
      - name: Ruff format check
        if: steps.check.outputs.has_py == 'true'
        run: uv run ruff format --check .
      - name: Mypy (strict)
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/**/*.py') != ''
        run: uv run mypy --strict src/
      - name: Pyright
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/**/*.py') != ''
        run: uv run pyright src/
      - name: Unit tests (arm64 — no coverage gate)
        if: steps.check.outputs.has_py == 'true' && hashFiles('tests/unit/**/*.py') != ''
        # `--cov-fail-under=0` overrides `[tool.coverage.report] fail_under = 75`
        # in pyproject.toml: coverage is arch-invariant and the gates are the
        # amd64 `python` / `coverage-gates` jobs' single source of truth (see the
        # job-level comment + ADR-0034). This leg proves the unit suite PASSES on
        # arm64; the per-subsystem 100% gates are deliberately NOT duplicated
        # here, so no follow-up `coverage report --include=... --fail-under=100`
        # step exists.
        run: uv run pytest tests/unit -q --cov=src/alfred --cov-fail-under=0

  python-cross-os:
    # Axis 1 (OS breadth) — run the PORTABLE layer of the `python` job on the
    # non-Linux runners so a regression that only shows on macOS or Windows is
    # caught in CI instead of on a contributor's laptop. The Linux leg stays in
    # the dedicated `python` job above (it carries the per-subsystem 100%
    # coverage gates, which need the combined unit+integration corpus that only
    # the Linux `coverage-gates` job assembles — those are deliberately NOT
    # duplicated here).
    #
    # Per-OS reality (assessed empirically, not assumed — see
    # docs/ci/required-checks.md "OS matrix" note):
    #
    #   * macos-latest — runs lint + format + mypy + pyright. Type-checking is
    #     pinned to the Linux deployment target (`--platform linux`, see the
    #     mypy step) so the POSIX-only `os` surface the runtime uses
    #     (`os.setrlimit`/`RLIMIT_CORE`, `os.writev`, `os.O_NOFOLLOW`) is checked
    #     against the stubs it actually runs on, not the host runner's. This leg
    #     is the real portability signal for macOS-specific path / type drift.
    #
    #     The UNIT suite is NOT run on macOS. ~77 unit tests under
    #     tests/unit/plugins/web_fetch/, .../security/, .../config/ boot a real
    #     Redis/Postgres via Testcontainers (no `@pytest.mark.integration` —
    #     they import `testcontainers` directly), and the GitHub macOS runner
    #     ships NO Docker daemon, so they ERROR at fixture setup with
    #     `docker.errors.DockerException` (#245 first real run: 3731 passed /
    #     77 errored). Those Docker-needing tests are not cleanly separable by a
    #     single marker or path, so a deselect allowlist would rot the moment a
    #     new Docker-backed unit test lands. Running the Docker-free unit subset
    #     on macOS is deferred to the follow-up tracked in
    #     docs/ci/required-checks.md (it needs a code change: a `requires_docker`
    #     marker on the entangled tests). macOS still gets the highest-value,
    #     zero-code-change, Docker-free layer today — lint + format + type-check.
    #
    #   * windows-latest — runs lint + format + mypy + pyright ONLY (same layer
    #     as macOS). The unit suite is NOT Windows-clean either: dozens of tests
    #     invoke the POSIX bash launcher (`/bin/sh`), `os.uname()`,
    #     `os.geteuid()`, `signal.SIGKILL` and `subprocess(..., pass_fds=...)`
    #     with NO `sys.platform == "win32"` skip-guard, so they would ERROR (not
    #     skip) on Windows. Guarding them all is a cross-cutting code change out
    #     of scope for this additive CI PR — tracked in the follow-up issue
    #     referenced in docs/ci/required-checks.md. Lint/format/type-check ARE
    #     portable, so Windows gets that layer today. Per the required-vs-
    #     informational split (docs/ci/required-checks.md), the Windows leg is
    #     informational-until-green: `continue-on-error: true` keeps a Windows-
    #     only regression visible WITHOUT blocking merge, until the win32
    #     skip-guards land and it can be promoted to required.
    #
    # Cost discipline: the heavy Integration/Smoke (Testcontainers, needs the
    # Docker daemon) stay Linux-only; this matrix only adds the cheap
    # static-analysis layer. `fail-fast: false` so a macOS failure does not mask
    # a Windows failure or vice-versa.
    name: Python cross-OS (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    # Windows is informational-until-green (see the job-level comment and
    # docs/ci/required-checks.md): a Windows-only regression stays VISIBLE in the
    # PR checklist but does NOT block merge until the win32 skip-guards land and
    # the leg can be promoted to a required check. macOS is required (it must be
    # green). `continue-on-error` is matrix-leg-scoped via the expression so it
    # applies ONLY to the windows-latest leg; the macos-latest leg fails the job
    # normally.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    # No job-level `hashFiles()` guard: GitHub Actions rejects `hashFiles()` in
    # job-level `if:` at workflow-parse time. The first-step `check` probes for
    # pyproject.toml and every downstream step short-circuits on
    # `steps.check.outputs.has_py` (mirrors the `python` job's discipline).
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Check for Python project
        id: check
        # `shell: bash` pins the shell on ALL three platforms — Windows runners
        # default to PowerShell, where `[ -f ... ]` / `>>"$GITHUB_OUTPUT"` is not
        # valid. GitHub ships Git-Bash on windows-latest, so this POSIX probe
        # runs identically everywhere.
        shell: bash
        run: |
          set -euo pipefail
          if [ -f pyproject.toml ]; then
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_py=false" >> "$GITHUB_OUTPUT"
            echo "::notice::pyproject.toml missing — skipping Python cross-OS job."
          fi
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3 latest
        if: steps.check.outputs.has_py == 'true'
      - if: steps.check.outputs.has_py == 'true'
        run: uv python install 3.14
      - if: steps.check.outputs.has_py == 'true'
        run: uv sync --frozen --dev
      - name: Ruff lint
        if: steps.check.outputs.has_py == 'true'
        run: uv run ruff check .
      - name: Ruff format check
        if: steps.check.outputs.has_py == 'true'
        run: uv run ruff format --check .
      - name: Mypy (strict, Linux target)
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/**/*.py') != ''
        # `--platform linux` pins the type-check to the DEPLOYMENT target's `os`
        # stubs regardless of the runner OS. The runtime is Linux-only (bwrap /
        # runuser / POSIX fds), so it uses POSIX-only `os` attributes —
        # `os.setrlimit` + `os.RLIMIT_CORE` (process_posture.py), `os.writev`
        # (fd3_key_delivery.py), `os.O_NOFOLLOW` (_daemon_pidfile.py). Without
        # this flag, mypy on the Windows runner type-checks against Windows `os`
        # stubs (which lack those attrs) and reports false `attr-defined`
        # errors for code that NEVER runs on Windows (#245 first real run). The
        # Linux `python` job runs mypy on a Linux runner so it matches by
        # default; here we make the platform explicit so every runner checks the
        # same target.
        run: uv run mypy --strict --platform linux src/
      - name: Pyright (Linux target)
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/**/*.py') != ''
        # `--pythonplatform Linux` is pyright's equivalent of mypy's
        # `--platform linux` — pin the type-check to the Linux deployment target
        # so the POSIX-only `os` surface (see the mypy step) resolves on every
        # runner OS, not just Linux. Pyright defaults `pythonPlatform` to the
        # HOST OS, so without this the macOS/Windows legs would diverge from the
        # Linux `pyright` job.
        run: uv run pyright --pythonplatform Linux src/
      # NOTE: no unit-test step. ~77 tests under tests/unit/ boot Redis/Postgres
      # via Testcontainers and the GitHub macOS runner has no Docker daemon, so
      # they error at fixture setup. The Docker-free unit subset on macOS is
      # deferred to the follow-up tracked in docs/ci/required-checks.md (needs a
      # `requires_docker` marker on the entangled tests). See the job-level
      # comment for the full rationale.

  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # No job-level `hashFiles()` guard: GitHub Actions rejects `hashFiles()`
    # in job-level `if:` at workflow-parse time (HTTP 422 "Unrecognized
    # function: 'hashFiles'") — the function is only valid inside step
    # contexts. The first-step `check` below probes for the corpus and
    # every downstream step short-circuits on `steps.check.outputs.has_integration`.
    services:
      # Service container images are pinned to major tags. zizmor flags these
      # as unpinned-images (which prefers @sha256:digest); accept it because
      # (a) these are well-known images from official Docker Hub sources,
      # (b) Dependabot's docker ecosystem watches docker-compose.yaml not
      # GHA service blocks, and (c) digest-pinning here would block
      # patch-level postgres/redis updates we want for security.
      postgres:
        image: postgres:16  # zizmor: ignore[unpinned-images]
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports: ["5432:5432"]
      redis:
        image: redis:7  # zizmor: ignore[unpinned-images]
        ports: ["6379:6379"]
      qdrant:
        image: qdrant/qdrant:v1.12.4  # zizmor: ignore[unpinned-images]
        ports: ["6333:6333"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Check for integration suite
        id: check
        run: |
          set -euo pipefail
          # `find … -print -quit` is shell-stable: independent of bash `globstar`,
          # which is OFF by default and which `compgen -G '**/*.py'` silently
          # depends on — without it, `**` collapses to a single `*` and the
          # probe false-negatives on tests nested deeper than one directory.
          if find tests/integration -type f -name '*.py' -print -quit 2>/dev/null | grep -q .; then
            echo "has_integration=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_integration=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tests/integration/**/*.py missing — skipping Integration job."
          fi
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3 latest
        if: steps.check.outputs.has_integration == 'true'
      - if: steps.check.outputs.has_integration == 'true'
        run: uv sync --frozen --dev
      - name: Install bubblewrap + jq for the launcher policy-resolver test
        # PR-S4-6: tests/integration/test_launcher_policy_resolver.py is
        # skipif-bwrap-missing locally (macOS dev) but MUST run in CI — it is
        # the merge-blocking proof that the launcher genuinely sandboxes. jq
        # is the launcher's JSON reader. Without these the test silently
        # skips and the gate is paper-only. The alfred-core runtime image
        # (PR-S4-0b) pins bubblewrap 0.8.0; ubuntu-latest's apt bubblewrap is
        # >= 0.6, sufficient for the resolver test.
        #
        # fd-3 delivery needs NO bwrap CLI flag: bwrap inherits open,
        # non-CLOEXEC fds (fd 3 = the provider-key channel) into the sandboxed
        # child by default (#218 / ADR-0015, verified bwrap 0.8.0 + 0.9.0). The
        # translator therefore emits no fd flag, so there is no flag to guard
        # against version drift here — the earlier `--sync-fd` advertise-check
        # is removed (--sync-fd is bwrap's internal sync fd and would CONSUME
        # fd 3 if used). The #228 boot-probe owns the runtime bwrap-presence /
        # version-floor check.
        if: steps.check.outputs.has_integration == 'true'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bubblewrap jq
          bwrap --version
          # Ubuntu 23.10+/24.04 (ubuntu-latest) ships
          # kernel.apparmor_restrict_unprivileged_userns=1, which blocks the
          # unprivileged user-namespace setup bwrap needs — surfacing as
          # `bwrap: setting up uid map: Permission denied` (and RTM_NEWADDR
          # on --unshare-net). Relax it for the runner so the launcher's real
          # bwrap sandbox can spawn. `|| true`: the sysctl is absent on older
          # kernels, which is fine (no restriction to lift there).
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - name: Run integration tests with coverage append
        if: steps.check.outputs.has_integration == 'true'
        # Append integration coverage to the .coverage data file the unit
        # step writes. Trust-boundary per-file gates downstream (see the
        # `python` job's `Trust-boundary files 100% line+branch coverage`
        # step) require the heartbeat / fail-closed paths that ONLY the
        # integration suite exercises (e.g.
        # tests/integration/security/capability_gate/test_fail_closed_outage.py
        # for _gate.py's heartbeat loop + _emit_gate_unavailable_audit +
        # stop_heartbeat). Without --cov-append the gate reads only the
        # unit data file and the 100% bar is paper-only on those paths —
        # the silent-failures-in-security-paths CLAUDE.md hard rule (#7)
        # is meaningless if the gate cannot see the path it's supposed
        # to protect.
        #
        # The combined .coverage file is uploaded as an artifact for the
        # downstream `coverage-gates` job to pick up — GitHub Actions
        # jobs run on different runners so we can't rely on filesystem
        # state crossing the boundary.
        #
        # ``--cov-fail-under=0`` overrides ``[tool.coverage.report]
        # fail_under = 75`` in pyproject.toml. This job runs the
        # integration suite alone (no unit data on this runner — the
        # ``python`` job's .coverage stays on its own runner) and
        # integration-only coverage is ~46% by construction. The 75%
        # threshold is the right gate for the COMBINED unit+integration
        # run that ``coverage-gates`` performs downstream, not for the
        # integration-only data we collect here. Without this override
        # the integration job fails on the 75% threshold and the
        # downstream ``coverage-gates`` job (which carries the real
        # 100% trust-boundary gates) is skipped — leaving the gates
        # paper-only on every push. #184 item 3.
        run: |
          uv run pytest tests/integration -q --cov=src/alfred --cov-append --cov-branch --cov-fail-under=0
      - name: Upload integration coverage artifact
        if: steps.check.outputs.has_integration == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-integration
          path: .coverage
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  integration-arm64:
    # Axis 3 (arch breadth — #265) — run the integration suite on a native
    # arm64 Linux runner so an architecture-specific regression in the real
    # bwrap launcher / testcontainers path is caught in CI. The postgres / redis
    # / qdrant service images below all publish multi-arch (amd64 + arm64)
    # manifests, so Docker pulls the arm64 variant automatically on this runner.
    # The bwrap `/lib64` arch-portability fix (commit d9f487e1 on this branch) is
    # what makes `test_alfred_core_image_bwrap.py` green here — amd64's
    # `/lib64` ld-linux-x86-64 path does not exist on arm64.
    #
    # NOTE — no `integration-privileged-arm64` twin (yet): its first arm64 run
    # caught a REAL arm64 bug (the dual-LLM real-bwrap-spawn child produces a
    # truncated frame on aarch64 -> `read_frame_failed` -> a `ck_audit_log_result`
    # CHECK violation), tracked in #269 (overlapping #252). Rather than land a red
    # leg on `main`, that privileged arm64 leg is added with the #269 fix (after
    # #251 un-swallows the child stderr to diagnose it). See ADR-0034 Decision 1.
    #
    # ADD, do NOT RENAME (ADR-0034): a SEPARATE job emitting the SEPARATE check
    # context `Integration (arm64)` alongside the unchanged amd64 `integration`
    # job — converting `integration` to a matrix would rename its required
    # context and break branch protection for every open PR.
    #
    # Does NOT upload the `coverage-integration` artifact: only the amd64
    # `integration` job uploads it, and two uploaders of the same artifact name
    # collide. arm64 is a run-to-green portability signal; coverage is
    # arch-invariant and stays the amd64 `coverage-gates` job's single source of
    # truth (see ADR-0034). This leg therefore runs with `--cov-fail-under=0` and
    # no artifact upload.
    name: Integration (arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      contents: read
    # No job-level `hashFiles()` guard: rejected at workflow-parse time. The
    # `check` step probes the corpus; downstream steps short-circuit on
    # `steps.check.outputs.has_integration` (mirrors the amd64 `integration` job).
    services:
      # Service container images are pinned to major tags — same rationale as the
      # amd64 `integration` job (well-known official images; Dependabot watches
      # docker-compose.yaml, not GHA service blocks; digest-pinning would block
      # the patch-level postgres/redis security updates we want). All three
      # publish multi-arch manifests, so the arm64 variant is pulled here.
      postgres:
        image: postgres:16  # zizmor: ignore[unpinned-images]
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports: ["5432:5432"]
      redis:
        image: redis:7  # zizmor: ignore[unpinned-images]
        ports: ["6379:6379"]
      qdrant:
        image: qdrant/qdrant:v1.12.4  # zizmor: ignore[unpinned-images]
        ports: ["6333:6333"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Check for integration suite
        id: check
        run: |
          set -euo pipefail
          # `find … -print -quit` is shell-stable (independent of bash `globstar`,
          # which is OFF by default) — same probe as the amd64 `integration` job.
          if find tests/integration -type f -name '*.py' -print -quit 2>/dev/null | grep -q .; then
            echo "has_integration=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_integration=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tests/integration/**/*.py missing — skipping Integration arm64 job."
          fi
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3 latest
        if: steps.check.outputs.has_integration == 'true'
      - if: steps.check.outputs.has_integration == 'true'
        run: uv sync --frozen --dev
      - name: Install bubblewrap + jq for the launcher policy-resolver test
        # Same machinery as the amd64 `integration` job: bubblewrap is the real
        # sandbox the merge-blocking `test_launcher_policy_resolver.py` execs and
        # jq is the launcher's JSON reader; without them the test silently skips
        # and the gate is paper-only. ubuntu-24.04-arm's apt bubblewrap is >= 0.6.
        # The apparmor sysctl relax lifts the unprivileged-userns restriction
        # ubuntu 24.04 ships (`bwrap: setting up uid map: Permission denied`);
        # `|| true` because the sysctl is absent on kernels without it.
        if: steps.check.outputs.has_integration == 'true'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bubblewrap jq
          bwrap --version
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - name: Run integration tests (arm64 — no coverage upload)
        if: steps.check.outputs.has_integration == 'true'
        # `--cov-fail-under=0`: integration-only coverage is ~46% by construction
        # and the 75% / 100% gates are the amd64 jobs' single source of truth
        # (arch-invariant — see ADR-0034). Unlike the amd64 `integration` job
        # this leg does NOT run `--cov-append` or upload the `coverage-integration`
        # artifact (a second uploader of that name would collide with amd64's);
        # arm64 is a run-to-green portability signal.
        run: |
          uv run pytest tests/integration -q --cov=src/alfred --cov-branch --cov-fail-under=0

  integration-privileged:
    # Axis 2 (privileged-Linux depth) — closes #245 Problem 1. The
    # launcher-spawn / real-bwrap-spawn integration + smoke legs are gated on
    # `os.uname().sysname == "Linux" and os.geteuid() == 0` (root, so `runuser`
    # can UID-drop a kind=none plugin) and, for the dual-LLM child, on a real
    # `bwrap` binary. The required `Integration`/`Smoke` jobs run on the
    # non-root `ubuntu-latest` runner, so today those legs `pytest.skip` and the
    # gate is paper-only — a change that breaks one is invisible to CI (the
    # concrete instance: PR #243's required-kwarg break on
    # test_daemon_comms_inbound_turn.py was green-because-skipped; only a local
    # root/macOS run caught it — see #245).
    #
    # APPROACH — `sudo`, NOT a `container:` job. The root-gated spawn legs
    # (`test_daemon_comms_inbound_turn.py`, `test_slice4_daemon_comms_spawn.py`)
    # boot a `PostgresContainer("postgres:16")` via **testcontainers**, which
    # needs the host Docker daemon. A `container:` job would sever access to the
    # runner's Docker socket (docker-in-docker is not set up), so testcontainers
    # would fail to start Postgres. Instead we stay on the bare `ubuntu-latest`
    # runner — which HAS Docker for testcontainers AND a passwordless-sudo user —
    # install bubblewrap via apt, and run pytest under `sudo` so `geteuid()==0`
    # holds while the Docker socket (root-accessible) stays reachable. This is
    # the same machinery the existing `integration` job uses (apt bwrap + jq +
    # apparmor relax) plus the `sudo` UID-0 wrapper.
    #
    # REQUIRED gate (see docs/ci/required-checks.md): a regression in the real
    # fd-3 spawn-clobber / runuser UID-drop path now blocks merge.
    name: Integration (privileged Linux, real spawn)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # No job-level `hashFiles()` guard: rejected at workflow-parse time. The
    # `check` step probes the corpus; downstream steps short-circuit on
    # `steps.check.outputs.has_spawn` (mirrors every other job here).
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Check for privileged-spawn corpus
        id: check
        # If NO integration/smoke corpus is present (e.g. a branch before these
        # tests land) the job no-ops cleanly — same discipline as every other
        # job here, probed at step time because job-level `if: hashFiles(...)` is
        # rejected at parse time.
        run: |
          set -euo pipefail
          if find tests/integration tests/smoke -type f -name '*.py' \
              -print -quit 2>/dev/null | grep -q .; then
            echo "has_spawn=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_spawn=false" >> "$GITHUB_OUTPUT"
            echo "::notice::no integration/smoke corpus — skipping privileged-spawn job."
          fi
      - name: Install bubblewrap + jq and relax unprivileged-userns
        if: steps.check.outputs.has_spawn == 'true'
        # bubblewrap is the real sandbox the kind=full / dual-LLM-child legs
        # exec; jq is the launcher's JSON reader. ubuntu-latest's apt bubblewrap
        # is >= 0.6 (sufficient — the alfred-core runtime image pins 0.8.0).
        #
        # ubuntu-latest ships kernel.apparmor_restrict_unprivileged_userns=1,
        # which blocks bwrap's unprivileged user-namespace setup (surfacing as
        # `bwrap: setting up uid map: Permission denied`). Relax it for the
        # runner. `|| true`: the sysctl is absent on older kernels (no
        # restriction to lift there). Same machinery as the `integration` job.
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bubblewrap jq
          bwrap --version
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3 latest
        if: steps.check.outputs.has_spawn == 'true'
      - if: steps.check.outputs.has_spawn == 'true'
        run: uv python install 3.14
      - if: steps.check.outputs.has_spawn == 'true'
        run: uv sync --frozen --dev
      - name: Provision the bound py3.14 quarantine-child interpreter (ADR-0030, #248)
        id: bound_py
        if: steps.check.outputs.has_spawn == 'true'
        # ADR-0030 bound-interpreter contract — make the REAL bwrap quarantine-child
        # spawn RUNNABLE here instead of paper-only. `test_quarantine_child_real_spawn.py`
        # gates on `ALFRED_QUARANTINE_CHILD_PYTHON` being set (`_PROVISIONED`); without
        # this step it SKIPS even under root+bwrap, so the spawn proof gates nothing (#248).
        #
        # WHY proto (NOT a system /usr python, NOT deadsnakes): the launcher binds
        # the configured interpreter's PREFIX into the sandbox (the `--ro-bind`
        # in bin/alfred-plugin-launcher.sh's bwrap exec), so the child can exec a
        # proto-managed, self-contained python-build-standalone under ~/.proto —
        # interpreter + stdlib + pip-installed `alfred.security.quarantine_child`
        # all under ONE bound prefix. This removes any dependency on a system
        # python version (the user-mandated hermetic 3.14). The uv venv still drives
        # pytest + testcontainers; ONLY the bwrapped child execs the proto interpreter.
        #
        # Validated on TRUE x86_64 ubuntu-noble + bwrap 0.9.0 via qemu with this exact
        # recipe (proto install python 3.14 + uv pip install . + launcher prefix-bind):
        # the real round-trip test PASSED — body echoed over the wire (PROOF OK).
        run: |
          set -euo pipefail
          # Hermetic Python 3.14 via PROTO — NO system python, no deadsnakes, no
          # /usr binary. The launcher (bin/alfred-plugin-launcher.sh) binds the
          # configured interpreter's prefix into the sandbox, so the bwrapped child
          # execs a proto-managed, self-contained python-build-standalone under
          # ~/.proto (interpreter + stdlib + pip-installed alfred all under one
          # bound prefix). Validated on true x86_64 ubuntu-noble + bwrap 0.9.0 via
          # qemu: real round-trip PROOF OK.
          export PROTO_HOME="${HOME}/.proto"
          curl -fsSL https://moonrepo.dev/install/proto.sh | bash -s -- --yes
          export PATH="${PROTO_HOME}/bin:${PROTO_HOME}/shims:${PATH}"
          proto install python 3.14
          # Resolve the interpreter from the tree `proto install` just populated —
          # NOT via `proto bin python`. The runner image carries a stale GLOBAL proto
          # pin (python 3.14.5) that `proto bin` resolves over the 3.14.6 `install`
          # actually fetched, then fails `missing_executable` on a path that was never
          # installed. The PBS layout is tools/python/<ver>/bin/python3; glob it.
          PROTO_PY="$(ls -d "${PROTO_HOME}"/tools/python/3.14.*/bin/python3 2>/dev/null | sort -V | tail -1)"
          if [ -z "${PROTO_PY}" ] || [ ! -x "${PROTO_PY}" ]; then
            echo "no proto-managed python3 under ${PROTO_HOME}/tools/python" >&2
            ls -la "${PROTO_HOME}/tools/python" 2>&1 >&2 || true
            exit 1
          fi
          "${PROTO_PY}" -V
          # World-readable so the bwrapped child (runs under sudo/root) can read+exec
          # the interpreter the launcher binds RO into the sandbox.
          chmod -R a+rX "${PROTO_HOME}"
          # ONE consistent 3.14: make `python3` the proto python so the launcher's
          # `python3 -m alfred.plugins.manifest_reader` uses the SAME interpreter
          # (with alfred) the child execs — no alfred-less system python in the mix.
          sudo ln -sf "${PROTO_PY}" /usr/local/bin/python3
          python3 -V
          # Install alfred (+ deps) INTO the proto interpreter so the child resolves
          # `alfred.security.quarantine_child` from the bound proto prefix. `uv` (the
          # repo's package manager, set up above) targets the proto interpreter via
          # `--python` — faster than `pip`, and on-convention.
          uv pip install --python "${PROTO_PY}" .
          CHILD_FILE="$("${PROTO_PY}" -c 'import alfred.security.quarantine_child as m; print(m.__file__)')"
          echo "quarantine_child resolves at: ${CHILD_FILE}"
          test -n "${CHILD_FILE}"
          echo "bound_py=${PROTO_PY}" >> "$GITHUB_OUTPUT"
          echo "Hermetic proto py3.14 provisioned (no system python); launcher binds its prefix."
      - name: Assert the spawn-enabling preconditions hold (euid 0 + bwrap)
        if: steps.check.outputs.has_spawn == 'true'
        # The bound-interpreter path comes in via `env:` (NOT a `${{ }}` splice into
        # the script) so a workflow-injection audit (zizmor template-injection) stays
        # clean — the value is a step-output, never attacker-controllable, but the
        # env-indirection is the repo convention regardless.
        env:
          BOUND_PY: ${{ steps.bound_py.outputs.bound_py }}
        # Guard against this gate silently regressing to paper-only. The
        # root-gated legs `skipif (not bwrap) or (sysname != Linux) or (geteuid
        # != 0)`. If a future change to this job broke any of those three
        # conditions (sudo not actually giving uid 0, bwrap install silently
        # failing, the wrong runner image), pytest would skip the legs and the
        # JOB would still go green — gating nothing. That is the exact #245
        # failure mode one level up. Prove DETERMINISTICALLY, before pytest, that
        # the environment the legs require is real: `sudo` yields euid 0 and
        # bwrap is on root's PATH. A cheap, unambiguous precondition beats
        # parsing pytest's skip summary.
        run: |
          set -euo pipefail
          EUID_UNDER_SUDO=$(sudo python3 -c 'import os; print(os.geteuid())')
          echo "euid under sudo: ${EUID_UNDER_SUDO}"
          if [ "${EUID_UNDER_SUDO}" != "0" ]; then
            echo "::error::sudo did not yield euid 0 (got ${EUID_UNDER_SUDO}); the root-gated spawn legs would SKIP and this gate would be paper-only (see #245)."
            exit 1
          fi
          if ! sudo bash -c 'command -v bwrap' >/dev/null 2>&1; then
            echo "::error::bwrap not on root PATH; the bwrap-gated real-spawn legs would SKIP and this gate would be paper-only (see #245)."
            exit 1
          fi
          # #248: the real-spawn quarantine-child leg ADDITIONALLY gates on
          # `ALFRED_QUARANTINE_CHILD_PYTHON` being set to a real /usr interpreter
          # (`_PROVISIONED` in test_quarantine_child_real_spawn.py). The provisioning
          # step above must have produced it; if it silently no-op'd, the spawn leg
          # would SKIP and re-create the #245 paper-gate one level deeper. Assert it.
          # ``BOUND_PY`` arrives via the step ``env:`` (workflow-injection-safe).
          if [ -z "${BOUND_PY}" ] || [ ! -x "${BOUND_PY}" ]; then
            echo "::error::bound py3.14 (ALFRED_QUARANTINE_CHILD_PYTHON) missing or not executable ('${BOUND_PY}'); the real-spawn quarantine-child leg would SKIP and gate nothing (see #248)."
            exit 1
          fi
          echo "Preconditions hold: euid 0 + bwrap + bound py3.14 (${BOUND_PY}) — the root-gated legs will EXECUTE, not skip."
      - name: Run real-spawn integration + smoke legs as root
        id: real_spawn
        if: steps.check.outputs.has_spawn == 'true'
        # Run pytest under `sudo` so `os.geteuid() == 0` holds and bwrap is on
        # PATH — the legs that `skipif (not bwrap) or (sysname != Linux) or
        # (geteuid != 0)` on the non-root runner now EXECUTE here. We
        # deliberately run the FULL integration + smoke corpus (not a hand-picked
        # subset): the whole point of #245 is that ANY future required-kwarg /
        # contract break on a currently-skipped leg must surface, and an
        # allowlist would re-create the same blind spot the moment a NEW
        # root-gated leg lands without being added to the list.
        #
        # `sudo -E` preserves the environment AND keeps the root-accessible
        # Docker socket reachable so testcontainers can still boot
        # Postgres/Redis from inside the root pytest process.
        #
        # PATH propagation is the subtle part. `sudo` strips PATH down to its
        # `secure_path` (`/etc/sudoers`) even with `-E`, so root's command
        # lookup does NOT see the GITHUB_PATH additions setup-uv made for the
        # runner user (`/opt/hostedtoolcache/uv/<ver>/x86_64`, `~/.local/bin`).
        # Two consumers need uv resolvable:
        #   1. the pytest invocation itself — handled by `$(command -v uv)`,
        #      an absolute path that does not depend on PATH; and
        #   2. the daemon-spawn SMOKE legs
        #      (test_slice4_daemon_comms_spawn / test_slice4_daemon_dispatch),
        #      which shell out to bare `subprocess.run(["uv", "run", ...])` and
        #      inherit the pytest process's PATH. Under plain `sudo -E` that PATH
        #      lacks uv's dir, so those legs ERROR with
        #      `FileNotFoundError: 'uv'` (#245 first real run). We therefore
        #      explicitly carry uv's directory onto PATH via `sudo env
        #      "PATH=<uv-dir>:$PATH"` so the nested `uv` resolves. `UV_DIR` is
        #      derived from the absolute uv path, so it tracks whatever location
        #      setup-uv chose (tool-cache version dir) without hard-coding it.
        #
        # The kind=none launcher legs UID-drop via `runuser -u <target>`; each
        # test sets `ALFRED_PLUGIN_UID = getpass.getuser()` itself (under sudo
        # that is `root`, so `runuser -u root` succeeds trivially as uid 0). No
        # job-level UID env is needed.
        #
        # `-p no:cacheprovider` avoids a root-owned `.pytest_cache`. The full
        # integration suite already runs (non-root) in the `integration` job, so
        # any leg that does NOT gate on root simply re-runs here harmlessly; the
        # NEW signal is the previously-skipped root-gated legs now executing.
        # `--cov-fail-under=0` because this run is about EXECUTION of the spawn
        # legs, not the 75%/100% coverage thresholds the dedicated coverage jobs
        # own.
        #
        # `ALFRED_QUARANTINE_CHILD_PYTHON` (#248) is threaded through the same
        # `sudo env` (sudo strips the environment even with -E, like PATH above) so
        # the bwrapped quarantine child execs the bound hermetic proto py3.14 (under
        # ~/.proto, whose prefix the launcher binds into the sandbox — ADR-0030) and
        # its `_PROVISIONED` skip-guard passes — the real-spawn round-trip RUNS here
        # rather than skipping. The provisioning step asserted both the interpreter
        # and the child package resolve from that bound proto prefix.
        env:
          ALFRED_QUARANTINE_CHILD_PYTHON: ${{ steps.bound_py.outputs.bound_py }}
        run: |
          set -euo pipefail
          UV_BIN="$(command -v uv)"
          UV_DIR="$(dirname "${UV_BIN}")"
          sudo env \
            "PATH=${UV_DIR}:${PATH}" \
            "ALFRED_QUARANTINE_CHILD_PYTHON=${ALFRED_QUARANTINE_CHILD_PYTHON}" \
            "${UV_BIN}" run pytest tests/integration tests/smoke -q \
            -p no:cacheprovider --cov-fail-under=0
      - name: Run the bwrap-gated sandbox-escape adversarial corpus (#248)
        # Guard on the corpus harness existing too (not just `has_spawn`, derived
        # from tests/integration|smoke): on a stacked branch where those suites
        # exist but tests/adversarial/sandbox_escape hasn't landed, this step must
        # no-op cleanly rather than hard-fail (the `.github/workflows/**` keep-
        # hashFiles-guards guideline; CR #250).
        if: steps.check.outputs.has_spawn == 'true' && hashFiles('tests/adversarial/sandbox_escape/**/*.py') != ''
        # The `@_bwrap_required` payloads in
        # tests/adversarial/sandbox_escape/test_sbx_corpus_executable.py
        # (incl. sbx-2026-012 fd-3 key-leak containment + sbx-2026-013 the live
        # "policy was inert, now enforced" host-escape proof) SKIP wherever bwrap
        # is absent. The dedicated `adversarial` workflow does NOT install bwrap,
        # so those kernel-observable containment assertions are paper-only there
        # (#248). This job HAS bwrap, so we run the sandbox-escape corpus here to
        # make the bwrap-gated payloads actually execute under the SHIPPED policy.
        #
        # These payloads gate ONLY on `_bwrap_required` (bwrap present) — NOT root,
        # NOT the bound interpreter (they exec `sys.executable` under the policy's
        # flags + test binds, no launcher / no fd-3 spawn machinery). We still run
        # them under `sudo env` PATH for parity with the spawn legs above; root is
        # harmless here. Validated locally in `docker run --rm --privileged
        # --platform linux/amd64 ubuntu:24.04`: sbx-2026-012/013 un-skip and pass.
        run: |
          set -euo pipefail
          UV_BIN="$(command -v uv)"
          UV_DIR="$(dirname "${UV_BIN}")"
          sudo env "PATH=${UV_DIR}:${PATH}" "${UV_BIN}" run pytest \
            tests/adversarial/sandbox_escape -q \
            -p no:cacheprovider --cov-fail-under=0


  coverage-gates:
    name: Coverage gates (combined unit + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [python, integration]
    # No job-level `hashFiles()` guard: GitHub Actions rejects `hashFiles()`
    # in job-level `if:` at workflow-parse time. The first-step `check` below
    # probes the corpus and every downstream step short-circuits on
    # `steps.check.outputs.has_coverage_corpus`.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Check for combined coverage corpus
        id: check
        run: |
          set -euo pipefail
          # See `integration` job's check step for why we use `find … -print -quit`
          # instead of `compgen -G '**/*.py'` (bash `globstar` is off by default
          # and `**` silently collapses to `*`, producing false negatives on
          # nested test files).
          if find tests/unit -type f -name '*.py' -print -quit 2>/dev/null | grep -q . \
