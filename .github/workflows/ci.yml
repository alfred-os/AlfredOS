  python-arm64:
    # Axis 3 (arch breadth — #265) — run the lint / type / unit layer of the
    # `python` job on a native arm64 Linux runner so an architecture-specific
    # regression (ctypes struct layout, byte-order, native-extension wheel,
    # POSIX-fd / struct-format assumptions) is caught in CI rather than on an
    # Apple-Silicon / Graviton operator's host. The repo is PUBLIC, so the
    # `ubuntu-24.04-arm` runner is free (GitHub bills arm64 minutes at 0× on
    # public repos), which is why this leg can run the full unit suite rather
    # than a static-analysis subset like `python-cross-os`.
    #
    # ADD, do NOT RENAME (see docs/adr/0034-ci-os-hardware-matrix.md): this is a
    # SEPARATE job emitting a SEPARATE check context (`Python (lint, types, unit)
    # (arm64)`) ALONGSIDE the unchanged amd64 `python` job. Converting `python`
    # to a `matrix` would rename its check context to `... (amd64)` and break
    # branch protection on `main` for every open PR until the protection rules
    # were updated atomically — a hazard this additive shape avoids.
    #
    # COVERAGE GATES STAY amd64-ONLY. The per-subsystem 100% line+branch gates
    # (`security/*`, `hooks/*`, plugins / web-fetch trust-boundary files) are the
    # single source of truth and live on the amd64 `python` + `coverage-gates`
    # jobs. Coverage is arch-INVARIANT (the same lines/branches execute on
    # arm64), so duplicating the gates here would add CI cost and a second place
    # to keep the per-file `--include` lists in sync for ZERO additional signal.
    # This leg therefore runs the unit suite with `--cov-fail-under=0` and emits
    # NO coverage-report step — it is a run-to-green arm64 portability signal.
    name: Python (lint, types, unit) (arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    permissions:
      contents: read
    # No job-level `hashFiles()` guard: GitHub Actions rejects `hashFiles()` in
    # job-level `if:` at workflow-parse time. The first-step `check` probes for
    # pyproject.toml and every downstream step short-circuits on
    # `steps.check.outputs.has_py` (mirrors the amd64 `python` job's discipline).
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for Python project
        id: check
        run: |
          set -euo pipefail
          if [ -f pyproject.toml ]; then
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_py=false" >> "$GITHUB_OUTPUT"
            echo "::notice::pyproject.toml missing — skipping Python arm64 job."
          fi
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        if: steps.check.outputs.has_py == 'true'
      - if: steps.check.outputs.has_py == 'true'
        run: uv python install 3.14
      - if: steps.check.outputs.has_py == 'true'
        run: uv sync --frozen --dev
      - name: Ruff lint
        if: steps.check.outputs.has_py == 'true'
        run: uv run ruff check .
      - name: Ruff format check
        if: steps.check.outputs.has_py == 'true'
        run: uv run ruff format --check .
      - name: Mypy (strict)
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/**/*.py') != ''
        run: uv run mypy --strict src/
      - name: Pyright
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/**/*.py') != ''
        run: uv run pyright src/
      - name: Unit tests (arm64 — no coverage gate)
        if: steps.check.outputs.has_py == 'true' && hashFiles('tests/unit/**/*.py') != ''
        # `--cov-fail-under=0` overrides `[tool.coverage.report] fail_under = 75`
        # in pyproject.toml: coverage is arch-invariant and the gates are the
        # amd64 `python` / `coverage-gates` jobs' single source of truth (see the
        # job-level comment + ADR-0034). This leg proves the unit suite PASSES on
        # arm64; the per-subsystem 100% gates are deliberately NOT duplicated
        # here, so no follow-up `coverage report --include=... --fail-under=100`
        # step exists.
        run: uv run pytest tests/unit -q --cov=src/alfred --cov-fail-under=0

  python-cross-os:
    # Axis 1 (OS breadth) — run the PORTABLE layer of the `python` job on the
    # non-Linux runners so a regression that only shows on macOS or Windows is
    # caught in CI instead of on a contributor's laptop. The Linux leg stays in
    # the dedicated `python` job above (it carries the per-subsystem 100%
    # coverage gates, which need the combined unit+integration corpus that only
    # the Linux `coverage-gates` job assembles — those are deliberately NOT
    # duplicated here).
    #
    # Per-OS reality (assessed empirically, not assumed — see
    # docs/ci/required-checks.md "OS matrix" note):
    #
    #   * macos-latest — runs lint + format + mypy + pyright. Type-checking is
    #     pinned to the Linux deployment target (`--platform linux`, see the
    #     mypy step) so the POSIX-only `os` surface the runtime uses
    #     (`os.setrlimit`/`RLIMIT_CORE`, `os.writev`, `os.O_NOFOLLOW`) is checked
    #     against the stubs it actually runs on, not the host runner's. This leg
    #     is the real portability signal for macOS-specific path / type drift.
    #
    #     The UNIT suite NOW runs on macOS (#246). The Testcontainers-backed
    #     unit files (tests/unit/plugins/web_fetch/) are module-marked
    #     `pytest.mark.docker`; the root-conftest collection hook skips them
    #     cleanly when no daemon is reachable (the macOS runner ships none), so
    #     the rest of tests/unit runs and gives the Darwin-vs-Linux divergence
    #     signal that caught nothing before (e.g. the #340 PR2a recvmsg split).
    #     No coverage gate — the per-subsystem 100% gates stay on the Linux job.
    #
    #   * windows-latest — runs lint + format + mypy + pyright, and the unit
    #     suite BLOCKING (#246 Phase B, 2026-07-12). The Docker files auto-skip
    #     on win32 (Docker Desktop reports available but the Linux-container
    #     Testcontainers can't run); the wholly-POSIX unit files are collect-
    #     ignored on win32 (tests/_posix_only_tests.py); and the POSIX-only
    #     tests in otherwise-portable files carry `sys.platform == "win32"`
    #     skipif. So the portable subset (~5.4k tests) runs green and blocks
    #     merge — the Windows portability-hygiene signal for a Linux-only
    #     runtime whose Windows dev path is WSL2. The static layer
    #     (lint/format/type) is also REQUIRED (#321 Phase 3).
    #
    # Cost discipline: the heavy Integration/Smoke (Testcontainers, needs the
    # Docker daemon) stay Linux-only; this matrix only adds the cheap
    # static-analysis layer. `fail-fast: false` so a macOS failure does not mask
    # a Windows failure or vice-versa.
    name: Python cross-OS (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # 30 (not 20): the now-blocking Windows unit step runs ~17 min; +uncached
    # uv sync + type-checks leaves thin headroom under 20 on a slow runner, and
    # a job TIMEOUT is not rescued by the unit step's rollback lever (#246 CR).
    timeout-minutes: 30
    # Both matrix legs' STATIC layer (lint/format/type) is BLOCKING — the
    # `continue-on-error` that kept windows informational-until-green was
    # removed 2026-06-24 (#321 Phase 3) after 6+ green cycles (#312–#319). The
    # UNIT step is now BLOCKING on BOTH legs: macos-latest (proven green) and
    # windows-latest (green after the #246 Phase B win32 guards; its step-level
    # `continue-on-error` was dropped 2026-07-12).
    # No job-level `hashFiles()` guard: GitHub Actions rejects `hashFiles()` in
    # job-level `if:` at workflow-parse time. The first-step `check` probes for
    # pyproject.toml and every downstream step short-circuits on
    # `steps.check.outputs.has_py` (mirrors the `python` job's discipline).
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for Python project
        id: check
        # `shell: bash` pins the shell on ALL three platforms — Windows runners
        # default to PowerShell, where `[ -f ... ]` / `>>"$GITHUB_OUTPUT"` is not
        # valid. GitHub ships Git-Bash on windows-latest, so this POSIX probe
        # runs identically everywhere.
        shell: bash
        run: |
          set -euo pipefail
          if [ -f pyproject.toml ]; then
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_py=false" >> "$GITHUB_OUTPUT"
            echo "::notice::pyproject.toml missing — skipping Python cross-OS job."
          fi
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        if: steps.check.outputs.has_py == 'true'
      - if: steps.check.outputs.has_py == 'true'
        run: uv python install 3.14
      - if: steps.check.outputs.has_py == 'true'
        run: uv sync --frozen --dev
      - name: Ruff lint
        if: steps.check.outputs.has_py == 'true'
        run: uv run ruff check .
      - name: Ruff format check
        if: steps.check.outputs.has_py == 'true'
        run: uv run ruff format --check .
      - name: Mypy (strict, Linux target)
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/**/*.py') != ''
        # `--platform linux` pins the type-check to the DEPLOYMENT target's `os`
        # stubs regardless of the runner OS. The runtime is Linux-only (bwrap /
        # runuser / POSIX fds), so it uses POSIX-only `os` attributes —
        # `os.setrlimit` + `os.RLIMIT_CORE` (process_posture.py), `os.writev`
        # (fd3_key_delivery.py), `os.O_NOFOLLOW` (_daemon_pidfile.py). Without
        # this flag, mypy on the Windows runner type-checks against Windows `os`
        # stubs (which lack those attrs) and reports false `attr-defined`
        # errors for code that NEVER runs on Windows (#245 first real run). The
        # Linux `python` job runs mypy on a Linux runner so it matches by
        # default; here we make the platform explicit so every runner checks the
        # same target.
        run: uv run mypy --strict --platform linux src/
      - name: Pyright (Linux target)
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/**/*.py') != ''
        # `--pythonplatform Linux` is pyright's equivalent of mypy's
        # `--platform linux` — pin the type-check to the Linux deployment target
        # so the POSIX-only `os` surface (see the mypy step) resolves on every
        # runner OS, not just Linux. Pyright defaults `pythonPlatform` to the
        # HOST OS, so without this the macOS/Windows legs would diverge from the
        # Linux `pyright` job.
        run: uv run pyright --pythonplatform Linux src/
      # Unit suite on the non-Linux legs (#246). The Testcontainers-backed unit
      # files are module-marked `pytest.mark.docker` and the root-conftest
      # collection hook SKIPS them cleanly when no Docker daemon is reachable
      # (neither runner has one) — so the suite runs without erroring at fixture
      # setup. No coverage gate here: the per-subsystem 100% line+branch gates
      # stay on the Linux `python` job (they need the combined unit+integration
      # corpus). These are pass/fail portability runs.
      - name: Unit tests (no coverage gate)
        # ONE step, BLOCKING on both legs (#246 Phase B dropped the windows
        # step-level `continue-on-error` on 2026-07-12, once the win32 guards
        # made Windows green). macos-latest is the highest-value divergence
        # signal — POSIX syscalls (recvmsg/MSG_CTRUNC, os.geteuid, SIGKILL,
        # pass_fds) run on Darwin, catching the class of bug the #340 PR2a split
        # hit. windows-latest runs the portable subset: Docker files auto-skip
        # on win32, wholly-POSIX files are collect-ignored
        # (tests/_posix_only_tests.py), and POSIX-only tests in mixed files
        # carry `skipif(sys.platform == "win32")`.
        # ROLLBACK (see docs/ci/required-checks.md): on a Windows-unit flake,
        # re-add the step-level windows-only continue-on-error matrix expression
        # here. Do NOT de-require `Python cross-OS (windows-latest)` — that also
        # drops the static lint/format/type gate.
        if: steps.check.outputs.has_py == 'true' && hashFiles('tests/unit/**/*.py') != ''
        shell: bash
        # assert-RAN floor (#246 Phase B / #245 discipline): the blocking leg
        # must RUN a substantial suite, not merely be FAILED/ERROR-free — else a
        # future PR growing the win32 collect-ignore/skipif guard list could
        # hollow the gate green. 3000 is a fixed floor far below today's counts
        # (macOS ~6018, Windows ~5459) and the suite only grows, so it never
        # needs re-tuning; it trips only on a runaway guard list.
        env:
          MATRIX_OS: ${{ matrix.os }}
        run: |
          set -eo pipefail
          uv run pytest tests/unit -q | tee pytest-unit-summary.txt
          passed="$(grep -oE '[0-9]+ passed' pytest-unit-summary.txt | tail -n1 | grep -oE '^[0-9]+' || echo 0)"
          echo "assert-RAN: ${passed} unit tests passed on ${MATRIX_OS}"
          if [ "${passed}" -lt 3000 ]; then
            echo "::error::assert-RAN floor tripped: only ${passed} unit tests passed (<3000) on ${MATRIX_OS} — the win32 collect-ignore/skipif guard list may have hollowed this blocking gate; investigate (#246 Phase B, #245 discipline)."
            exit 1
          fi

  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # No job-level `hashFiles()` guard: GitHub Actions rejects `hashFiles()`
    # in job-level `if:` at workflow-parse time (HTTP 422 "Unrecognized
    # function: 'hashFiles'") — the function is only valid inside step
    # contexts. The first-step `check` below probes for the corpus and
    # every downstream step short-circuits on `steps.check.outputs.has_integration`.
    services:
      # Service container images are pinned to major tags. zizmor flags these
      # as unpinned-images (which prefers @sha256:digest); accept it because
      # (a) these are well-known images from official Docker Hub sources,
      # (b) Dependabot's docker ecosystem watches docker-compose.yaml not
      # GHA service blocks, and (c) digest-pinning here would block
      # patch-level postgres/redis updates we want for security.
      postgres:
        image: postgres:18  # zizmor: ignore[unpinned-images]
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports: ["5432:5432"]
      redis:
        image: redis:8  # zizmor: ignore[unpinned-images]
        ports: ["6379:6379"]
      qdrant:
        image: qdrant/qdrant:v1.12.4  # zizmor: ignore[unpinned-images]
        ports: ["6333:6333"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for integration suite
        id: check
        run: |
          set -euo pipefail
          # `find … -print -quit` is shell-stable: independent of bash `globstar`,
          # which is OFF by default and which `compgen -G '**/*.py'` silently
          # depends on — without it, `**` collapses to a single `*` and the
          # probe false-negatives on tests nested deeper than one directory.
          if find tests/integration -type f -name '*.py' -print -quit 2>/dev/null | grep -q .; then
            echo "has_integration=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_integration=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tests/integration/**/*.py missing — skipping Integration job."
          fi
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        if: steps.check.outputs.has_integration == 'true'
      - if: steps.check.outputs.has_integration == 'true'
        run: uv sync --frozen --dev
      - name: Install bubblewrap + jq for the launcher policy-resolver test
        # PR-S4-6: tests/integration/test_launcher_policy_resolver.py is
        # skipif-bwrap-missing locally (macOS dev) but MUST run in CI — it is
        # the merge-blocking proof that the launcher genuinely sandboxes. jq
        # is the launcher's JSON reader. Without these the test silently
        # skips and the gate is paper-only. The alfred-core runtime image
        # (PR-S4-0b) pins bubblewrap 0.8.0; ubuntu-latest's apt bubblewrap is
        # >= 0.6, sufficient for the resolver test.
        #
        # fd-3 delivery needs NO bwrap CLI flag: bwrap inherits open,
        # non-CLOEXEC fds (fd 3 = the provider-key channel) into the sandboxed
        # child by default (#218 / ADR-0015, verified bwrap 0.8.0 + 0.9.0). The
        # translator therefore emits no fd flag, so there is no flag to guard
        # against version drift here — the earlier `--sync-fd` advertise-check
        # is removed (--sync-fd is bwrap's internal sync fd and would CONSUME
        # fd 3 if used). The #228 boot-probe owns the runtime bwrap-presence /
        # version-floor check.
        if: steps.check.outputs.has_integration == 'true'
        run: |
          set -euo pipefail
          # Retry BOTH apt steps, like the three sibling lanes. Wrapping only the
          # install left `apt-get update` a one-shot single point of failure on a
          # REQUIRED lane — an Azure-mirror flake there would block merges just as
          # surely, and asymmetry between the four lanes is exactly how one of them
          # quietly stops being hardened.
          for attempt in 1 2 3; do
            sudo apt-get update && break
            echo "::warning::apt-get update failed (attempt ${attempt}/3); retrying"
            [ "${attempt}" -eq 3 ] && { echo "::error::apt-get update failed 3x — package-mirror flake on a merge-blocking lane, not a code failure."; exit 1; }
            sleep $((attempt * 5))
          done
          for attempt in 1 2 3; do
            sudo apt-get install -y --no-install-recommends bubblewrap jq && break
            echo "::warning::apt-get install failed (attempt ${attempt}/3); retrying"
            [ "${attempt}" -eq 3 ] && { echo "::error::apt-get install bubblewrap/jq failed 3x — package-mirror flake on a merge-blocking lane, not a code failure."; exit 1; }
            sleep $((attempt * 5))
          done
          bwrap --version
          # Ubuntu 23.10+/24.04 (ubuntu-latest) ships
          # kernel.apparmor_restrict_unprivileged_userns=1, which blocks the
          # unprivileged user-namespace setup bwrap needs — surfacing as
          # `bwrap: setting up uid map: Permission denied` (and RTM_NEWADDR
          # on --unshare-net). Relax it for the runner so the launcher's real
          # bwrap sandbox can spawn. `|| true`: the sysctl is absent on older
          # kernels, which is fine (no restriction to lift there).
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - name: Run integration tests with coverage append
        if: steps.check.outputs.has_integration == 'true'
        # Append integration coverage to the .coverage data file the unit
        # step writes. Trust-boundary per-file gates downstream (see the
        # `python` job's `Trust-boundary files 100% line+branch coverage`
        # step) require the heartbeat / fail-closed paths that ONLY the
        # integration suite exercises (e.g.
        # tests/integration/security/capability_gate/test_fail_closed_outage.py
        # for _gate.py's heartbeat loop + _emit_gate_unavailable_audit +
        # stop_heartbeat). Without --cov-append the gate reads only the
        # unit data file and the 100% bar is paper-only on those paths —
        # the silent-failures-in-security-paths CLAUDE.md hard rule (#7)
        # is meaningless if the gate cannot see the path it's supposed
        # to protect.
        #
        # The combined .coverage file is uploaded as an artifact for the
        # downstream `coverage-gates` job to pick up — GitHub Actions
        # jobs run on different runners so we can't rely on filesystem
        # state crossing the boundary.
        #
        # ``--cov-fail-under=0`` overrides ``[tool.coverage.report]
        # fail_under = 75`` in pyproject.toml. This job runs the
        # integration suite alone (no unit data on this runner — the
        # ``python`` job's .coverage stays on its own runner) and
        # integration-only coverage is ~46% by construction. The 75%
        # threshold is the right gate for the COMBINED unit+integration
        # run that ``coverage-gates`` performs downstream, not for the
        # integration-only data we collect here. Without this override
        # the integration job fails on the 75% threshold and the
        # downstream ``coverage-gates`` job (which carries the real
        # 100% trust-boundary gates) is skipped — leaving the gates
        # paper-only on every push. #184 item 3.
        run: |
          uv run pytest tests/integration -q --cov=src/alfred --cov-append --cov-branch --cov-fail-under=0 -m "not real_llm"
      - name: Assert the connectivity-free-core kernel proof RUNS (not skipped) — #245 paper-gate guard
        # The runtime egress/DNS proof is the enforcement-of-record for the connectivity-free
        # core (ADR-0042 / Spec C §4.2). A `skipif(docker unavailable)` LOUD skip is still a
        # GREEN required check — the exact #245 failure mode. The Integration runner has Docker
        # (testcontainers), so the proof MUST run here. `tee` keeps the summary on disk to
        # skip-parse it; `set -o pipefail` propagates a pytest non-zero exit through the pipe.
        # NOTE: the proof FILE's presence is load-bearing — the hashFiles() gate disables this
        # guard if the file is deleted (a meta-paper-gate); a deletion is visible in the diff.
        if: steps.check.outputs.has_integration == 'true' && hashFiles('tests/integration/egress/test_core_network_isolation_kernel.py') != ''
        run: |
          set -euo pipefail
          uv run pytest tests/integration/egress/test_core_network_isolation_kernel.py \
            -rs -p no:cacheprovider --cov-fail-under=0 | tee /tmp/core_net_isolation.out
          if grep -qE "(^|[^0-9])[1-9][0-9]* skipped" /tmp/core_net_isolation.out; then
            echo "::error::connectivity-free-core kernel proof SKIPPED on the required Integration lane — paper-gate hazard (#245); docker provisioning regressed."
            exit 1
          fi
          grep -qE "(^|[^0-9])[1-9][0-9]* passed" /tmp/core_net_isolation.out || { echo "::error::connectivity-free-core kernel proof did not report a passing run."; exit 1; }
      - name: Upload integration coverage artifact
        if: steps.check.outputs.has_integration == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-integration
          path: .coverage
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  integration-arm64:
    # Axis 3 (arch breadth — #265) — run the integration suite on a native
    # arm64 Linux runner so an architecture-specific regression in the real
    # bwrap launcher / testcontainers path is caught in CI. The postgres / redis
    # / qdrant service images below all publish multi-arch (amd64 + arm64)
    # manifests, so Docker pulls the arm64 variant automatically on this runner.
    # The bwrap `/lib64` arch-portability fix (commit d9f487e1 on this branch) is
    # what makes `test_alfred_core_image_bwrap.py` green here — amd64's
    # `/lib64` ld-linux-x86-64 path does not exist on arm64.
    #
    # The `integration-privileged-arm64` twin now EXISTS (see the job below):
    # deferred while its first arm64 run's REAL bug was open (#269 — the hard
    # `--ro-bind /lib64`, absent on aarch64, killed the dual-LLM bwrap child at
    # launch; #252's `ck_audit_log_result` CHECK gap was its downstream mask and
    # is closed). Both are fixed, so the privileged arm64 leg is re-added and
    # gates merge. See ADR-0034 Decision 1.
    #
    # ADD, do NOT RENAME (ADR-0034): a SEPARATE job emitting the SEPARATE check
    # context `Integration (arm64)` alongside the unchanged amd64 `integration`
    # job — converting `integration` to a matrix would rename its required
    # context and break branch protection for every open PR.
    #
    # Does NOT upload the `coverage-integration` artifact: only the amd64
    # `integration` job uploads it, and two uploaders of the same artifact name
    # collide. arm64 is a run-to-green portability signal; coverage is
    # arch-invariant and stays the amd64 `coverage-gates` job's single source of
    # truth (see ADR-0034). This leg therefore runs with `--cov-fail-under=0` and
    # no artifact upload.
    name: Integration (arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      contents: read
    # No job-level `hashFiles()` guard: rejected at workflow-parse time. The
    # `check` step probes the corpus; downstream steps short-circuit on
    # `steps.check.outputs.has_integration` (mirrors the amd64 `integration` job).
    services:
      # Service container images are pinned to major tags — same rationale as the
      # amd64 `integration` job (well-known official images; Dependabot watches
      # docker-compose.yaml, not GHA service blocks; digest-pinning would block
      # the patch-level postgres/redis security updates we want). All three
      # publish multi-arch manifests, so the arm64 variant is pulled here.
      postgres:
        image: postgres:18  # zizmor: ignore[unpinned-images]
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports: ["5432:5432"]
      redis:
        image: redis:8  # zizmor: ignore[unpinned-images]
        ports: ["6379:6379"]
      qdrant:
        image: qdrant/qdrant:v1.12.4  # zizmor: ignore[unpinned-images]
        ports: ["6333:6333"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for integration suite
        id: check
        run: |
          set -euo pipefail
          # `find … -print -quit` is shell-stable (independent of bash `globstar`,
          # which is OFF by default) — same probe as the amd64 `integration` job.
          if find tests/integration -type f -name '*.py' -print -quit 2>/dev/null | grep -q .; then
            echo "has_integration=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_integration=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tests/integration/**/*.py missing — skipping Integration arm64 job."
          fi
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        if: steps.check.outputs.has_integration == 'true'
      - if: steps.check.outputs.has_integration == 'true'
        run: uv sync --frozen --dev
      - name: Install bubblewrap + jq for the launcher policy-resolver test
        # Same machinery as the amd64 `integration` job: bubblewrap is the real
        # sandbox the merge-blocking `test_launcher_policy_resolver.py` execs and
        # jq is the launcher's JSON reader; without them the test silently skips
        # and the gate is paper-only. ubuntu-24.04-arm's apt bubblewrap is >= 0.6.
        # The apparmor sysctl relax lifts the unprivileged-userns restriction
        # ubuntu 24.04 ships (`bwrap: setting up uid map: Permission denied`);
        # `|| true` because the sysctl is absent on kernels without it.
        if: steps.check.outputs.has_integration == 'true'
        run: |
          set -euo pipefail
          # Retry apt-get update: Azure-mirror flake is a perennial GHA failure and this
          # is now a merge-blocking lane (a transient mirror 5xx would block all merges).
          for attempt in 1 2 3; do
            sudo apt-get update && break
            echo "::warning::apt-get update failed (attempt ${attempt}/3); retrying"
            [ "${attempt}" -eq 3 ] && { echo "::error::apt-get update failed 3x — package-mirror flake on a merge-blocking lane, not a code failure."; exit 1; }
            sleep $((attempt * 5))
          done
          for attempt in 1 2 3; do
            sudo apt-get install -y --no-install-recommends bubblewrap jq && break
            echo "::warning::apt-get install failed (attempt ${attempt}/3); retrying"
            [ "${attempt}" -eq 3 ] && { echo "::error::apt-get install bubblewrap/jq failed 3x — package-mirror flake on a merge-blocking lane, not a code failure."; exit 1; }
            sleep $((attempt * 5))
          done
          bwrap --version
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - name: Run integration tests (arm64 — no coverage upload)
        if: steps.check.outputs.has_integration == 'true'
        # `--cov-fail-under=0`: integration-only coverage is ~46% by construction
        # and the 75% / 100% gates are the amd64 jobs' single source of truth
        # (arch-invariant — see ADR-0034). Unlike the amd64 `integration` job
        # this leg does NOT run `--cov-append` or upload the `coverage-integration`
        # artifact (a second uploader of that name would collide with amd64's);
        # arm64 is a run-to-green portability signal.
        run: |
          uv run pytest tests/integration -q --cov=src/alfred --cov-branch --cov-fail-under=0 -m "not real_llm"

  integration-privileged:
    # Axis 2 (privileged-Linux depth) — closes #245 Problem 1. The
    # launcher-spawn / real-bwrap-spawn integration + smoke legs are gated on
    # `os.uname().sysname == "Linux" and os.geteuid() == 0` (root, so `runuser`
    # can UID-drop a kind=none plugin) and, for the dual-LLM child, on a real
    # `bwrap` binary. The required `Integration`/`Smoke` jobs run on the
    # non-root `ubuntu-latest` runner, so today those legs `pytest.skip` and the
    # gate is paper-only — a change that breaks one is invisible to CI (the
    # concrete instance: PR #243's required-kwarg break on
    # test_daemon_comms_inbound_turn.py was green-because-skipped; only a local
    # root/macOS run caught it — see #245).
    #
    # APPROACH — `sudo`, NOT a `container:` job. The root-gated spawn legs
    # (`test_daemon_comms_inbound_turn.py`, `test_slice4_daemon_comms_spawn.py`)
    # boot a `PostgresContainer("postgres:18")` via **testcontainers**, which
    # needs the host Docker daemon. A `container:` job would sever access to the
    # runner's Docker socket (docker-in-docker is not set up), so testcontainers
    # would fail to start Postgres. Instead we stay on the bare `ubuntu-latest`
    # runner — which HAS Docker for testcontainers AND a passwordless-sudo user —
    # install bubblewrap via apt, and run pytest under `sudo` so `geteuid()==0`
    # holds while the Docker socket (root-accessible) stays reachable. This is
    # the same machinery the existing `integration` job uses (apt bwrap + jq +
    # apparmor relax) plus the `sudo` UID-0 wrapper.
    #
    # REQUIRED gate (see docs/ci/required-checks.md): a regression in the real
    # fd-3 spawn-clobber / runuser UID-drop path now blocks merge.
    name: Integration (privileged Linux, real spawn)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # No job-level `hashFiles()` guard: rejected at workflow-parse time. The
    # `check` step probes the corpus; downstream steps short-circuit on
    # `steps.check.outputs.has_spawn` (mirrors every other job here).
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for privileged-spawn corpus
        id: check
        # If NO integration/smoke corpus is present (e.g. a branch before these
        # tests land) the job no-ops cleanly — same discipline as every other
        # job here, probed at step time because job-level `if: hashFiles(...)` is
        # rejected at parse time.
        run: |
          set -euo pipefail
          if find tests/integration tests/smoke -type f -name '*.py' \
              -print -quit 2>/dev/null | grep -q .; then
            echo "has_spawn=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_spawn=false" >> "$GITHUB_OUTPUT"
            echo "::notice::no integration/smoke corpus — skipping privileged-spawn job."
          fi
      - name: Install bubblewrap + jq and relax unprivileged-userns
        if: steps.check.outputs.has_spawn == 'true'
        # bubblewrap is the real sandbox the kind=full / dual-LLM-child legs
        # exec; jq is the launcher's JSON reader. ubuntu-latest's apt bubblewrap
        # is >= 0.6 (sufficient — the alfred-core runtime image pins 0.8.0).
        #
        # ubuntu-latest ships kernel.apparmor_restrict_unprivileged_userns=1,
        # which blocks bwrap's unprivileged user-namespace setup (surfacing as
        # `bwrap: setting up uid map: Permission denied`). Relax it for the
        # runner. `|| true`: the sysctl is absent on older kernels (no
        # restriction to lift there). Same machinery as the `integration` job.
        run: |
          set -euo pipefail
          # Retry apt-get update: Azure-mirror flake is a perennial GHA failure and this
          # is now a merge-blocking lane (a transient mirror 5xx would block all merges).
          for attempt in 1 2 3; do
            sudo apt-get update && break
            echo "::warning::apt-get update failed (attempt ${attempt}/3); retrying"
            [ "${attempt}" -eq 3 ] && { echo "::error::apt-get update failed 3x — package-mirror flake on a merge-blocking lane, not a code failure."; exit 1; }
            sleep $((attempt * 5))
          done
          for attempt in 1 2 3; do
            sudo apt-get install -y --no-install-recommends bubblewrap jq && break
            echo "::warning::apt-get install failed (attempt ${attempt}/3); retrying"
            [ "${attempt}" -eq 3 ] && { echo "::error::apt-get install bubblewrap/jq failed 3x — package-mirror flake on a merge-blocking lane, not a code failure."; exit 1; }
            sleep $((attempt * 5))
          done
          bwrap --version
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        if: steps.check.outputs.has_spawn == 'true'
      - if: steps.check.outputs.has_spawn == 'true'
        run: uv python install 3.14
      - if: steps.check.outputs.has_spawn == 'true'
        run: uv sync --frozen --dev
      - name: Provision the bound py3.14 quarantine-child interpreter (ADR-0030, #248)
        id: bound_py
        if: steps.check.outputs.has_spawn == 'true'
        # DELIBERATELY NOT CACHED. `PROTO_HOME=$HOME/.proto`, and this step runs
        # `uv pip install --python "${PROTO_PY}" .` — so alfred AND ALL ITS DEPS land in
        # ~/.proto/tools/python/3.14.x/lib/python3.14/site-packages, INSIDE any cache of
        # ~/.proto. Caching that tree means: on a cache hit `uv pip install .` finds the
        # deps already satisfied and SKIPS them, so this lane would provision the
        # sandboxed T3 child against a STALE, cross-commit dependency tree instead of the
        # PR's. That is a soundness hole in the one lane whose entire job is to prove the
        # child execs the RIGHT code — traded for an unmeasured speedup (the 20m->15m I
        # first claimed for it was runner variance; the cache had MISSED). The fetches a
        # cache would have short-circuited — the proto installer AND the ~65 MB PBS
        # toolchain pull — are each retried instead.
        env:
          # Keep in lockstep with the arm64 twin's pin.
          PROTO_INSTALL_VERSION: "0.58.2"
        # ADR-0030 bound-interpreter contract — make the REAL bwrap quarantine-child
        # spawn RUNNABLE here instead of paper-only. `test_quarantine_real_extract.py`
        # gates on `ALFRED_QUARANTINE_CHILD_PYTHON` being set (`_PROVISIONED`); without
        # this step it SKIPS even under root+bwrap, so the spawn proof gates nothing (#248).
        #
        # WHY proto (NOT a system /usr python, NOT deadsnakes): the launcher binds
        # the configured interpreter's PREFIX into the sandbox (the `--ro-bind`
        # in bin/alfred-plugin-launcher.sh's bwrap exec), so the child can exec a
        # proto-managed, self-contained python-build-standalone under ~/.proto —
        # interpreter + stdlib + pip-installed `alfred.security.quarantine_child`
        # all under ONE bound prefix. This removes any dependency on a system
        # python version (the user-mandated hermetic 3.14). The uv venv still drives
        # pytest + testcontainers; ONLY the bwrapped child execs the proto interpreter.
        #
        # Validated on TRUE x86_64 ubuntu-noble + bwrap 0.9.0 via qemu with this exact
        # recipe (proto install python 3.14 + uv pip install . + launcher prefix-bind):
        # the real round-trip test PASSED — body echoed over the wire (PROOF OK).
        run: |
          set -euo pipefail
          # Hermetic Python 3.14 via PROTO — NO system python, no deadsnakes, no
          # /usr binary. The launcher (bin/alfred-plugin-launcher.sh) binds the
          # configured interpreter's prefix into the sandbox, so the bwrapped child
          # execs a proto-managed, self-contained python-build-standalone under
          # ~/.proto (interpreter + stdlib + pip-installed alfred all under one
          # bound prefix). Validated on true x86_64 ubuntu-noble + bwrap 0.9.0 via
          # qemu: real round-trip PROOF OK.
          export PROTO_HOME="${HOME}/.proto"
          # PINNED installer version (CR: supply-chain). The installer takes the
          # proto version as a positional arg (it defaults to `latest`); an unpinned
          # `curl | bash` would silently pull whatever proto ships that morning into
          # a lane that provisions the interpreter the SANDBOXED child execs. Bump
          # deliberately, not implicitly.
          # RETRY (3x, backoff): this fetch is on the critical path of a merge-blocking
          # lane, unretried and uncached. One 5xx from moonrepo.dev would block every
          # merge in the repo. `--retry-all-errors` covers the non-transient-looking
          # failures curl otherwise gives up on immediately.
          for attempt in 1 2 3; do
            if curl -fsSL --retry 3 --retry-delay 2 --retry-all-errors \
                 https://moonrepo.dev/install/proto.sh -o /tmp/proto-install.sh; then
              break
            fi
            echo "::warning::proto installer fetch failed (attempt ${attempt}/3); retrying"
            [ "${attempt}" -eq 3 ] && { echo "::error::could not fetch the proto installer after 3 attempts (moonrepo.dev unreachable) — this is a network flake on a merge-blocking lane, not a code failure."; exit 1; }
            sleep $((attempt * 5))
          done
          bash /tmp/proto-install.sh "${PROTO_INSTALL_VERSION}" --yes
          export PATH="${PROTO_HOME}/bin:${PROTO_HOME}/shims:${PATH}"
          # Retry the PBS toolchain pull too. This is the ~65 MB fetch (GitHub release
          # assets) — the one a cache would actually have mitigated. Retrying only the
          # 3 KB installer script above and calling the flake handled would be a lie.
          for attempt in 1 2 3; do
            proto install python 3.14 && break
            echo "::warning::proto install python 3.14 failed (attempt ${attempt}/3); retrying"
            [ "${attempt}" -eq 3 ] && { echo "::error::proto install python 3.14 failed 3x — network flake on a merge-blocking lane, not a code failure."; exit 1; }
            sleep $((attempt * 5))
          done
          # Resolve the interpreter from the tree `proto install` just populated —
          # NOT via `proto bin python`. The runner image carries a stale GLOBAL proto
          # pin (python 3.14.5) that `proto bin` resolves over the 3.14.6 `install`
          # actually fetched, then fails `missing_executable` on a path that was never
          # installed. The PBS layout is tools/python/<ver>/bin/python3; glob it.
          PROTO_PY="$(ls -d "${PROTO_HOME}"/tools/python/3.14.*/bin/python3 2>/dev/null | sort -V | tail -1)"
          if [ -z "${PROTO_PY}" ] || [ ! -x "${PROTO_PY}" ]; then
            echo "no proto-managed python3 under ${PROTO_HOME}/tools/python" >&2
            ls -la "${PROTO_HOME}/tools/python" 2>&1 >&2 || true
            exit 1
          fi
          "${PROTO_PY}" -V
          # World-readable so the bwrapped child (runs under sudo/root) can read+exec
          # the interpreter the launcher binds RO into the sandbox.
          chmod -R a+rX "${PROTO_HOME}"
          # ONE consistent 3.14: make `python3` the proto python so the launcher's
          # `python3 -m alfred.plugins.manifest_reader` uses the SAME interpreter
          # (with alfred) the child execs — no alfred-less system python in the mix.
          sudo ln -sf "${PROTO_PY}" /usr/local/bin/python3
          python3 -V
          # Install alfred (+ deps) INTO the proto interpreter so the child resolves
          # `alfred.security.quarantine_child` from the bound proto prefix. `uv` (the
          # repo's package manager, set up above) targets the proto interpreter via
          # `--python` — faster than `pip`, and on-convention.
          uv pip install --python "${PROTO_PY}" .
          CHILD_FILE="$("${PROTO_PY}" -c 'import alfred.security.quarantine_child as m; print(m.__file__)')"
          echo "quarantine_child resolves at: ${CHILD_FILE}"
          test -n "${CHILD_FILE}"
          echo "bound_py=${PROTO_PY}" >> "$GITHUB_OUTPUT"
          echo "Hermetic proto py3.14 provisioned (no system python); launcher binds its prefix."
      - name: Assert the spawn-enabling preconditions hold (euid 0 + bwrap)
        if: steps.check.outputs.has_spawn == 'true'
        # The bound-interpreter path comes in via `env:` (NOT a `${{ }}` splice into
        # the script) so a workflow-injection audit (zizmor template-injection) stays
        # clean — the value is a step-output, never attacker-controllable, but the
        # env-indirection is the repo convention regardless.
        env:
          BOUND_PY: ${{ steps.bound_py.outputs.bound_py }}
          # The gateway adapter child shares the SAME bound proto interpreter as
          # the quarantine child today (ADR-0030 twins), but we surface it as its
          # OWN env var (not aliasing BOUND_PY) so the assertion below is meaningful
          # against `ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON` specifically — a future
          # split (gateway var != BOUND_PY) is then caught, not passed silently.
          ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON: ${{ steps.bound_py.outputs.bound_py }}
        # Guard against this gate silently regressing to paper-only. The
        # root-gated legs `skipif (not bwrap) or (sysname != Linux) or (geteuid
        # != 0)`. If a future change to this job broke any of those three
        # conditions (sudo not actually giving uid 0, bwrap install silently
        # failing, the wrong runner image), pytest would skip the legs and the
        # JOB would still go green — gating nothing. That is the exact #245
        # failure mode one level up. Prove DETERMINISTICALLY, before pytest, that
        # the environment the legs require is real: `sudo` yields euid 0 and
        # bwrap is on root's PATH. A cheap, unambiguous precondition beats
        # parsing pytest's skip summary.
        run: |
          set -euo pipefail
          EUID_UNDER_SUDO=$(sudo python3 -c 'import os; print(os.geteuid())')
          echo "euid under sudo: ${EUID_UNDER_SUDO}"
          if [ "${EUID_UNDER_SUDO}" != "0" ]; then
            echo "::error::sudo did not yield euid 0 (got ${EUID_UNDER_SUDO}); the root-gated spawn legs would SKIP and this gate would be paper-only (see #245)."
            exit 1
          fi
          if ! sudo bash -c 'command -v bwrap' >/dev/null 2>&1; then
            echo "::error::bwrap not on root PATH; the bwrap-gated real-spawn legs would SKIP and this gate would be paper-only (see #245)."
            exit 1
          fi
          # #248: the real-spawn quarantine-child leg ADDITIONALLY gates on
          # `ALFRED_QUARANTINE_CHILD_PYTHON` being set to a real /usr interpreter
          # (`_PROVISIONED` in test_quarantine_real_extract.py). The provisioning
          # step above must have produced it; if it silently no-op'd, the spawn leg
          # would SKIP and re-create the #245 paper-gate one level deeper. Assert it.
          # ``BOUND_PY`` arrives via the step ``env:`` (workflow-injection-safe).
          if [ -z "${BOUND_PY}" ] || [ ! -x "${BOUND_PY}" ]; then
            echo "::error::bound py3.14 (ALFRED_QUARANTINE_CHILD_PYTHON) missing or not executable ('${BOUND_PY}'); the real-spawn quarantine-child leg would SKIP and gate nothing (see #248)."
            exit 1
          fi
          # devops-006: the gateway adapter child shares the SAME bound proto
          # py3.14 interpreter (ADR-0030 interpreter-prefix twins — no separate
          # provisioning). Assert `ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON` is set and
          # executable so the gateway real-spawn test's `_DOCKER_ONLY` third
          # condition holds and the leg EXECUTES, not skips (#245 paper-gate
          # discipline at the gateway layer). We check the gateway var DIRECTLY
          # (not BOUND_PY) so a future divergence where the gateway interpreter is
          # provisioned separately can never pass this gate silently.
          if [ -z "${ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON}" ] || [ ! -x "${ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON}" ]; then
            echo "::error::bound py3.14 (ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON) missing or not executable ('${ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON}'); the gateway real-spawn leg would SKIP and gate nothing (devops-006 / #245)."
            exit 1
          fi
          echo "ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON=${ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON} (shared bound proto interpreter, ADR-0030 twin) — set and executable."
          echo "Preconditions hold: euid 0 + bwrap + bound py3.14 (${BOUND_PY}) for quarantine + gateway adapter child — the root-gated legs will EXECUTE, not skip."
      - name: Run real-spawn integration + smoke legs as root
        id: real_spawn
        if: steps.check.outputs.has_spawn == 'true'
        # Run pytest under `sudo` so `os.geteuid() == 0` holds and bwrap is on
        # PATH — the legs that `skipif (not bwrap) or (sysname != Linux) or
        # (geteuid != 0)` on the non-root runner now EXECUTE here. We
        # deliberately run the FULL integration + smoke corpus (not a hand-picked
        # subset): the whole point of #245 is that ANY future required-kwarg /
        # contract break on a currently-skipped leg must surface, and an
        # allowlist would re-create the same blind spot the moment a NEW
        # root-gated leg lands without being added to the list.
        #
        # `sudo -E` preserves the environment AND keeps the root-accessible
        # Docker socket reachable so testcontainers can still boot
        # Postgres/Redis from inside the root pytest process.
        #
        # PATH propagation is the subtle part. `sudo` strips PATH down to its
        # `secure_path` (`/etc/sudoers`) even with `-E`, so root's command
        # lookup does NOT see the GITHUB_PATH additions setup-uv made for the
        # runner user (`/opt/hostedtoolcache/uv/<ver>/x86_64`, `~/.local/bin`).
        # Two consumers need uv resolvable:
        #   1. the pytest invocation itself — handled by `$(command -v uv)`,
        #      an absolute path that does not depend on PATH; and
        #   2. the daemon-spawn SMOKE legs
        #      (test_slice4_daemon_comms_spawn / test_slice4_daemon_dispatch),
        #      which shell out to bare `subprocess.run(["uv", "run", ...])` and
        #      inherit the pytest process's PATH. Under plain `sudo -E` that PATH
        #      lacks uv's dir, so those legs ERROR with
        #      `FileNotFoundError: 'uv'` (#245 first real run). We therefore
        #      explicitly carry uv's directory onto PATH via `sudo env
        #      "PATH=<uv-dir>:$PATH"` so the nested `uv` resolves. `UV_DIR` is
        #      derived from the absolute uv path, so it tracks whatever location
        #      setup-uv chose (tool-cache version dir) without hard-coding it.
        #
        # The kind=none launcher legs UID-drop via `runuser -u <target>`; each
        # test sets `ALFRED_PLUGIN_UID = getpass.getuser()` itself (under sudo
        # that is `root`, so `runuser -u root` succeeds trivially as uid 0). No
        # job-level UID env is needed.
        #
        # `-p no:cacheprovider` avoids a root-owned `.pytest_cache`. The full
        # integration suite already runs (non-root) in the `integration` job, so
        # any leg that does NOT gate on root simply re-runs here harmlessly; the
        # NEW signal is the previously-skipped root-gated legs now executing.
        # `--cov-fail-under=0` because this run is about EXECUTION of the spawn
        # legs, not the 75%/100% coverage thresholds the dedicated coverage jobs
        # own.
        #
        # `ALFRED_QUARANTINE_CHILD_PYTHON` (#248) is threaded through the same
        # `sudo env` (sudo strips the environment even with -E, like PATH above) so
        # the bwrapped quarantine child execs the bound hermetic proto py3.14 (under
        # ~/.proto, whose prefix the launcher binds into the sandbox — ADR-0030) and
        # its `_PROVISIONED` skip-guard passes — the real-spawn round-trip RUNS here
        # rather than skipping. The provisioning step asserted both the interpreter
        # and the child package resolve from that bound proto prefix.
        #
        # `ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON` (devops-006) shares the SAME bound
        # proto py3.14 interpreter — the gateway adapter child and the quarantine
        # child are ADR-0030 interpreter-prefix twins, both exec'd under the same
        # bwrap-bound prefix. No separate provisioning step is needed; we just thread
        # the same `steps.bound_py.outputs.bound_py` value through both vars so the
        # gateway real-spawn test's `_DOCKER_ONLY` third condition holds and the leg
        # EXECUTES rather than skipping (the #245 paper-gate discipline).
        env:
          ALFRED_QUARANTINE_CHILD_PYTHON: ${{ steps.bound_py.outputs.bound_py }}
          ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON: ${{ steps.bound_py.outputs.bound_py }}
        run: |
          set -euo pipefail
          UV_BIN="$(command -v uv)"
          UV_DIR="$(dirname "${UV_BIN}")"
          sudo env \
            "PATH=${UV_DIR}:${PATH}" \
            "ALFRED_QUARANTINE_CHILD_PYTHON=${ALFRED_QUARANTINE_CHILD_PYTHON}" \
            "ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON=${ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON}" \
            "${UV_BIN}" run pytest tests/integration tests/smoke -q \
            -p no:cacheprovider --cov-fail-under=0 -m "not real_llm"
      - name: Assert the gateway real-spawn test RUNS (not skipped) — #245 paper-gate guard
        # test-104: the deterministic precondition above guarantees the skipif is
        # False (euid 0 + bwrap + ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON), but a
        # RUNTIME proof that the test actually ran is required — `--collect-only`
        # alone is insufficient (the exact #245 failure mode: a gate that reports
        # green while silently skipping). Run just the new gateway probe test under
        # the same `sudo env` context and FAIL the job if it skipped or didn't pass.
        # The `env:` indirection for both child-python vars follows the zizmor
        # workflow-injection-safe convention (step-output via env:, never ${{ }}
        # spliced directly into run:).
        if: steps.check.outputs.has_spawn == 'true' && hashFiles('tests/integration/cli/daemon/test_gateway_real_probe_spawn_forwarded_inbound.py') != ''
        env:
          ALFRED_QUARANTINE_CHILD_PYTHON: ${{ steps.bound_py.outputs.bound_py }}
          ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON: ${{ steps.bound_py.outputs.bound_py }}
        run: |
          set -euo pipefail
          UV_BIN="$(command -v uv)"; UV_DIR="$(dirname "${UV_BIN}")"
          # `tee` is intentional: we need pytest's summary on disk to skip-parse it
          # below. `set -o pipefail` (above) still propagates a pytest non-zero exit
          # through the pipe, so a FAILED run fails the step here — do not "simplify"
          # the tee away.
          sudo env "PATH=${UV_DIR}:${PATH}" \
            "ALFRED_QUARANTINE_CHILD_PYTHON=${ALFRED_QUARANTINE_CHILD_PYTHON}" \
            "ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON=${ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON}" \
            "${UV_BIN}" run pytest \
            tests/integration/cli/daemon/test_gateway_real_probe_spawn_forwarded_inbound.py \
            -rs -p no:cacheprovider --cov-fail-under=0 | tee /tmp/gw_probe_spawn.out
          if grep -qE "(^|[^0-9])[1-9][0-9]* skipped" /tmp/gw_probe_spawn.out; then
            echo "::error::gateway real-spawn test SKIPPED on the privileged lane — paper-gate hazard (#245); ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON / bwrap / euid-0 provisioning regressed."
            exit 1
          fi
          grep -q "1 passed" /tmp/gw_probe_spawn.out || { echo "::error::gateway real-spawn test did not report '1 passed'."; exit 1; }
      - name: Assert the brokered-fd real-spawn leg RAN (not skipped) — #245 paper-gate guard
        # #340 PR2a (ADR-0050): the SCM_RIGHTS fd-broker C1/C2 topology proof
        # (tests/integration/test_quarantine_fd_broker_real_spawn.py) SKIPS wherever
        # bwrap / Linux / root / the bound interpreter is missing. The precondition
        # step above guarantees the skipif is False here, but — like the gateway and
        # Discord guards around it — a RUNTIME proof that it actually ran is required
        # (the #245 failure mode: a gate green while silently skipping). Run just this
        # leg in isolation under the same `sudo env` context and FAIL the job if it
        # skipped or didn't pass. The `env:` step-output indirection follows the zizmor
        # workflow-injection-safe convention (step-output via env:, never ${{ }} spliced
        # into run:). The main run step above already EXECUTES this file as part of the
        # full `tests/integration` corpus; this is the not-silently-skipped proof.
        # NOTE: the test path appears TWICE below — the `if: hashFiles(...)` guard AND the
        # `pytest` arg. Keep them in sync: a rename that updates only one silently disarms
        # this gate (the #245 failure mode at the meta level).
        if: steps.check.outputs.has_spawn == 'true' && hashFiles('tests/integration/test_quarantine_fd_broker_real_spawn.py') != ''
        env:
          ALFRED_QUARANTINE_CHILD_PYTHON: ${{ steps.bound_py.outputs.bound_py }}
        run: |
          set -euo pipefail
          UV_BIN="$(command -v uv)"; UV_DIR="$(dirname "${UV_BIN}")"
          # `tee` keeps pytest's summary on disk for the skip-parse below; `set -o
          # pipefail` (above) still propagates a FAILED run's non-zero exit through the
          # pipe, so a failing run fails the step. Do not "simplify" the tee away.
          sudo env "PATH=${UV_DIR}:${PATH}" \
            "ALFRED_QUARANTINE_CHILD_PYTHON=${ALFRED_QUARANTINE_CHILD_PYTHON}" \
            "${UV_BIN}" run pytest \
            tests/integration/test_quarantine_fd_broker_real_spawn.py \
            -rs -p no:cacheprovider --cov-fail-under=0 | tee /tmp/broker_fd_spawn.out
          if grep -qE "(^|[^0-9])[1-9][0-9]* skipped" /tmp/broker_fd_spawn.out; then
            echo "::error::brokered-fd real-spawn leg SKIPPED on the privileged lane — paper-gate hazard (#245); ALFRED_QUARANTINE_CHILD_PYTHON / bwrap / euid-0 provisioning regressed."
            exit 1
          fi
          # Token-boundary match so a hypothetical "11 passed" can't satisfy the exactly-
          # one-test contract (the file has a single test).
          grep -qE "(^|[^0-9])1 passed([^0-9]|$)" /tmp/broker_fd_spawn.out || { echo "::error::brokered-fd real-spawn leg did not report exactly '1 passed'."; exit 1; }
      - name: Run the bwrap-gated sandbox-escape adversarial corpus (#248)
        # Guard on the corpus harness existing too (not just `has_spawn`, derived
        # from tests/integration|smoke): on a stacked branch where those suites
        # exist but tests/adversarial/sandbox_escape hasn't landed, this step must
        # no-op cleanly rather than hard-fail (the `.github/workflows/**` keep-
        # hashFiles-guards guideline; CR #250).
        if: steps.check.outputs.has_spawn == 'true' && hashFiles('tests/adversarial/sandbox_escape/**/*.py') != ''
        # The `@_bwrap_required` payloads in
        # tests/adversarial/sandbox_escape/test_sbx_corpus_executable.py
        # (incl. sbx-2026-012 fd-3 key-leak containment + sbx-2026-013 the live
        # "policy was inert, now enforced" host-escape proof) SKIP wherever bwrap
        # is absent. The dedicated `adversarial` workflow does NOT install bwrap,
        # so those kernel-observable containment assertions are paper-only there
        # (#248). This job HAS bwrap, so we run the sandbox-escape corpus here to
        # make the bwrap-gated payloads actually execute under the SHIPPED policy.
        #
        # These payloads gate ONLY on `_bwrap_required` (bwrap present) — NOT root,
        # NOT the bound interpreter (they exec `sys.executable` under the policy's
        # flags + test binds, no launcher / no fd-3 spawn machinery). We still run
        # them under `sudo env` PATH for parity with the spawn legs above; root is
        # harmless here. Validated locally in `docker run --rm --privileged
        # --platform linux/amd64 ubuntu:24.04`: sbx-2026-012/013 un-skip and pass.
        run: |
          set -euo pipefail
          UV_BIN="$(command -v uv)"
          UV_DIR="$(dirname "${UV_BIN}")"
          # ASSERT-RAN (#245 / ops-003): these payloads `@_bwrap_required`-skip wherever
          # bwrap is absent, and this job is their ONLY required gate (the dedicated
          # `adversarial` workflow does not install bwrap). A silent skip here would
          # report green while gating NOTHING. `tee` + `set -o pipefail` keep a FAILED
          # run failing; the skip-parse then fails a green-but-vacuous run.
          sudo env "PATH=${UV_DIR}:${PATH}" "${UV_BIN}" run pytest \
            tests/adversarial/sandbox_escape -v -rs \
            -p no:cacheprovider --cov-fail-under=0 | tee /tmp/sbx_corpus.out
          # Fail ONLY on the BWRAP gate's skip reason — not on any skip. The corpus
          # contains DELIBERATE, environment-conditional skips the author chose on
          # purpose (a netns/RTM_NEWADDR guard that "skips loudly rather than fail", and
          # two jq-absent skipifs). A blanket "N skipped => exit 1" would turn a runner
          # image change into a REPO-WIDE merge block on a required lane. The only skip
          # that makes THIS gate vacuous is the bwrap one — so that is the only one we
          # fail on. (`-rs` prints skip reasons, which is what this greps.)
          # POSITIVE floor, by NODE ID. A negative grep on the skip-reason string is
          # single-sourced in the test file and asserted nowhere: rename the tests or
          # reword the reason and the grep silently stops matching, while "N passed"
          # still matches from the OTHER corpus files — the guard then goes green with
          # the bwrap payloads never executed. (Reproduced.) Assert they RAN by name.
          for payload in \
            test_sbx_2026_003_host_etc_passwd_read_contained \
            test_sbx_2026_004_host_bin_sh_exec_contained \
            test_sbx_2026_006_host_proc_environ_read_contained \
            test_sbx_2026_012_quarantine_child_does_not_leak_fd3_key \
            test_sbx_2026_013_live_spawned_child_host_escape_contained; do
            if ! grep -qE "${payload}.*PASSED" /tmp/sbx_corpus.out; then
              echo "::error::kernel-observable sandbox-escape payload ${payload} did NOT report PASSED on this lane. Either it skipped (bwrap provisioning regressed) or it was renamed and this gate silently stopped covering it — both make the containment corpus paper-only (#245 / #248). If renamed, update this list."
              exit 1
            fi
          done
          grep -qE "(^|[^0-9])[1-9][0-9]* passed" /tmp/sbx_corpus.out \
            || { echo "::error::sandbox-escape corpus did not report a passing run."; exit 1; }
      - name: Assert the Discord kernel proof RUNS (not skipped) — FIX-7 paper-gate guard (#245)
        # FIX-7: the Discord policy kernel-enforcement proof
        # (tests/integration/egress/test_discord_policy_kernel_enforced.py) SKIPS
        # wherever bwrap cannot configure the unshared net namespace (RTM_NEWADDR /
        # unprivileged runner). On the privileged lane (euid-0, AppArmor relaxed,
        # bwrap installed) the RTM_NEWADDR issue does not arise, so the test MUST
        # execute — not silently skip. This is the exact #245 paper-gate failure
        # mode: a skip that reports green while gating nothing.
        #
        # We run the proof file in isolation under `sudo env` (same PATH/env as
        # the main run step) and fail if ANY test in the file skipped. The
        # `hashFiles()` guard disables this step cleanly if the file is deleted
        # (a deletion is visible in the diff — meta-paper-gate).
        #
        # NOTE: DO NOT add this guard to the plain `integration` job. That job
        # runs as non-root; bwrap MAY not be able to configure the netns there
        # (RTM_NEWADDR), and a LOUD skip is the CORRECT outcome on a
        # non-privileged runner. The asymmetry (skip OK on plain-integration,
        # skip FORBIDDEN on privileged) is intentional — the privileged job is
        # the enforcement-of-record.
        if: steps.check.outputs.has_spawn == 'true' && hashFiles('tests/integration/egress/test_discord_policy_kernel_enforced.py') != ''
        run: |
          set -euo pipefail
          UV_BIN="$(command -v uv)"; UV_DIR="$(dirname "${UV_BIN}")"
          # `tee` keeps the summary on disk for the skip-parse below.
          # `set -o pipefail` propagates a pytest non-zero exit through the pipe.
          sudo env "PATH=${UV_DIR}:${PATH}" \
            "${UV_BIN}" run pytest \
            tests/integration/egress/test_discord_policy_kernel_enforced.py \
            -rs -p no:cacheprovider --cov-fail-under=0 | tee /tmp/discord_kernel_proof.out
          if grep -qE "(^|[^0-9])[1-9][0-9]* skipped" /tmp/discord_kernel_proof.out; then
            echo "::error::Discord policy kernel proof SKIPPED on the privileged lane — paper-gate hazard (#245); bwrap / euid-0 / netns provisioning regressed (FIX-7)."
            exit 1
          fi
          grep -qE "(^|[^0-9])[1-9][0-9]* passed" /tmp/discord_kernel_proof.out \
            || { echo "::error::Discord policy kernel proof did not report a passing run."; exit 1; }
      - name: Assert the dual-LLM quarantine-child real-spawn leg RAN (not skipped) — #245 / #269
        # #269 closed a gap here: the gateway, brokered-fd and Discord legs each had
        # an assert-RAN guard, but the REAL dual-LLM bwrap child round-trip — the
        # single most arch-sensitive leg in the repo — had none. #340 golive Task 14
        # SUPERSEDED the old deterministic-echo round-trip
        # (`test_quarantine_child_real_spawn.py`, deleted) with the REAL-extract proof
        # `test_quarantine_real_extract.py` (a real bwrap child + real broker + real
        # TLS against a canned-Anthropic stub -> a real Extracted). It `skipif`s on
        # (not bwrap) / (sysname != Linux) / (geteuid != 0) /
        # (not ALFRED_QUARANTINE_CHILD_PYTHON), so a provisioning regression would
        # silently downgrade it to a skip and this required lane would still go green
        # while gating nothing (the exact #245 failure mode). It is ALSO the leg that
        # proves the #269 `/lib64` soft-bind on the arm64 twin below (it spawns the
        # SAME real bwrap child), so an un-asserted skip there would make the whole
        # arm64 gate vacuous. Run it in isolation and fail on skip / non-pass.
        #
        # NO `hashFiles()` GUARD — deliberately. Every other assert-RAN step here is
        # gated on `if: hashFiles('<path>') != ''`, which means a RENAME of the test
        # makes the whole step EVAPORATE: the required check then goes green while
        # gating nothing. That is the #245 paper-gate failure mode one level up — the
        # guard disarms itself exactly when the thing it guards moves. This leg's file
        # is on `main` and must exist, so the existence check lives INSIDE the step and
        # FAILS LOUD instead of silently skipping.
        if: steps.check.outputs.has_spawn == 'true'
        env:
          ALFRED_QUARANTINE_CHILD_PYTHON: ${{ steps.bound_py.outputs.bound_py }}
          SPAWN_TEST: tests/integration/test_quarantine_real_extract.py
        run: |
          set -euo pipefail
          if [ ! -f "${SPAWN_TEST}" ]; then
            echo "::error::${SPAWN_TEST} is missing — the dual-LLM real-spawn gate cannot run. If it was RENAMED, update SPAWN_TEST here; do not let this gate disappear silently (#245)."
            exit 1
          fi
          UV_BIN="$(command -v uv)"; UV_DIR="$(dirname "${UV_BIN}")"
          # `tee` keeps pytest's summary on disk for the skip-parse; `set -o pipefail`
          # still propagates a FAILED run's non-zero exit. Do not "simplify" it away.
          sudo env "PATH=${UV_DIR}:${PATH}" \
            "ALFRED_QUARANTINE_CHILD_PYTHON=${ALFRED_QUARANTINE_CHILD_PYTHON}" \
            "${UV_BIN}" run pytest \
            "${SPAWN_TEST}" \
            -rs -p no:cacheprovider --cov-fail-under=0 | tee /tmp/quarantine_child_spawn.out
          if grep -qE "(^|[^0-9])[1-9][0-9]* skipped" /tmp/quarantine_child_spawn.out; then
            echo "::error::dual-LLM quarantine-child real-spawn leg SKIPPED on the privileged lane — paper-gate hazard (#245); ALFRED_QUARANTINE_CHILD_PYTHON / bwrap / euid-0 provisioning regressed."
            exit 1
          fi
          grep -qE "(^|[^0-9])[1-9][0-9]* passed" /tmp/quarantine_child_spawn.out \
            || { echo "::error::dual-LLM quarantine-child real-spawn leg did not report a passing run."; exit 1; }

  integration-privileged-arm64:
    # Axis 2 x Axis 3 — the arm64 twin of `integration-privileged`, re-added by
    # #269. THE most arch-sensitive lane in the repo: it runs the REAL bwrap
    # dual-LLM quarantine-child spawn, the gateway adapter child spawn, and the
    # kernel-observable sandbox-escape corpus on native aarch64.
    #
    # WHY IT WAS DEFERRED, AND WHAT FIXED IT. Its first arm64 run caught a REAL
    # arm64 bug: the shipped bwrap policies hard-bound `/lib64` (`--ro-bind`),
    # which holds the dynamic linker on x86-64 but does NOT exist on arm64 (the
    # aarch64 loader is `/lib/ld-linux-aarch64.so.1`, under the already-bound
    # `/lib`). bwrap died at launch with "Can't find source path /lib64", the
    # quarantined child never emitted a frame, and the host surfaced a truncated
    # `read_frame_failed`. Rather than land a red leg on `main`, the leg was
    # deferred to #269. The fix — binding `/lib64` via `ro_binds_try`
    # (`--ro-bind-try`: bind iff present, else skip) in both shipped Linux
    # policies — makes the same policy bytes portable across arches, so this leg
    # is now green and re-added. It is the merge-blocking proof of that fix.
    #
    # ADD, do NOT RENAME (ADR-0034): a SEPARATE job emitting the SEPARATE check
    # context `Integration (privileged Linux, real spawn) (arm64)` alongside the
    # unchanged amd64 `integration-privileged`. Folding the two into a matrix
    # would RENAME the required amd64 context and break branch protection on
    # `main` for every open PR.
    #
    # The provisioning recipe is arch-neutral and mirrors the amd64 sibling
    # VERBATIM (sudo for euid 0 while keeping the root-accessible Docker socket
    # reachable for testcontainers; apt bubblewrap + jq; apparmor userns relax;
    # a hermetic proto-managed python-build-standalone 3.14 — proto publishes
    # arm64 PBS — bound into the sandbox per ADR-0030). See `integration-privileged`
    # above for the full rationale behind each step; the comments are not
    # duplicated here.
    name: Integration (privileged Linux, real spawn) (arm64)
    runs-on: ubuntu-24.04-arm
    # 45, not the amd64 sibling's 30: arm64 runners measure ~1.7x slower on this
    # repo's integration lanes (recent `main`: Integration 11m amd64 vs 19m arm64),
    # and this lane additionally downloads an aarch64 PBS interpreter and runs a
    # sixth isolated assert-RAN re-run. A merge-blocking lane must not flake on a
    # timeout that was sized for the faster arch.
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for privileged-spawn corpus
        id: check
        run: |
          set -euo pipefail
          if find tests/integration tests/smoke -type f -name '*.py' \
              -print -quit 2>/dev/null | grep -q .; then
            echo "has_spawn=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_spawn=false" >> "$GITHUB_OUTPUT"
            echo "::notice::no integration/smoke corpus — skipping privileged-spawn arm64 job."
          fi
      - name: Install bubblewrap + jq and relax unprivileged-userns
        if: steps.check.outputs.has_spawn == 'true'
        run: |
          set -euo pipefail
          # Retry apt-get update: Azure-mirror flake is a perennial GHA failure and this
          # is now a merge-blocking lane (a transient mirror 5xx would block all merges).
          for attempt in 1 2 3; do
            sudo apt-get update && break
            echo "::warning::apt-get update failed (attempt ${attempt}/3); retrying"
            [ "${attempt}" -eq 3 ] && { echo "::error::apt-get update failed 3x — package-mirror flake on a merge-blocking lane, not a code failure."; exit 1; }
            sleep $((attempt * 5))
          done
          for attempt in 1 2 3; do
            sudo apt-get install -y --no-install-recommends bubblewrap jq && break
            echo "::warning::apt-get install failed (attempt ${attempt}/3); retrying"
            [ "${attempt}" -eq 3 ] && { echo "::error::apt-get install bubblewrap/jq failed 3x — package-mirror flake on a merge-blocking lane, not a code failure."; exit 1; }
            sleep $((attempt * 5))
          done
          bwrap --version
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        if: steps.check.outputs.has_spawn == 'true'
      - if: steps.check.outputs.has_spawn == 'true'
        run: uv python install 3.14
      - if: steps.check.outputs.has_spawn == 'true'
        run: uv sync --frozen --dev
      - name: Provision the bound py3.14 quarantine-child interpreter (ADR-0030, #248)
        id: bound_py
        if: steps.check.outputs.has_spawn == 'true'
        # DELIBERATELY NOT CACHED. `PROTO_HOME=$HOME/.proto`, and this step runs
        # `uv pip install --python "${PROTO_PY}" .` — so alfred AND ALL ITS DEPS land in
        # ~/.proto/tools/python/3.14.x/lib/python3.14/site-packages, INSIDE any cache of
        # ~/.proto. Caching that tree means: on a cache hit `uv pip install .` finds the
        # deps already satisfied and SKIPS them, so this lane would provision the
        # sandboxed T3 child against a STALE, cross-commit dependency tree instead of the
        # PR's. That is a soundness hole in the one lane whose entire job is to prove the
        # child execs the RIGHT code — traded for an unmeasured speedup (the 20m->15m I
        # first claimed for it was runner variance; the cache had MISSED). The fetches a
        # cache would have short-circuited — the proto installer AND the ~65 MB PBS
        # toolchain pull — are each retried instead.
        # Identical to the amd64 sibling — proto ships an aarch64
        # python-build-standalone, so the same glob + prefix-bind contract holds.
        env:
          # Keep in lockstep with the amd64 sibling's pin.
          PROTO_INSTALL_VERSION: "0.58.2"
        run: |
          set -euo pipefail
          export PROTO_HOME="${HOME}/.proto"
          # PINNED installer version (CR: supply-chain). The installer takes the
          # proto version as a positional arg (it defaults to `latest`); an unpinned
          # `curl | bash` would silently pull whatever proto ships that morning into
          # a lane that provisions the interpreter the SANDBOXED child execs. Bump
          # deliberately, not implicitly.
          # RETRY (3x, backoff): this fetch is on the critical path of a merge-blocking
          # lane, unretried and uncached. One 5xx from moonrepo.dev would block every
          # merge in the repo. `--retry-all-errors` covers the non-transient-looking
          # failures curl otherwise gives up on immediately.
          for attempt in 1 2 3; do
            if curl -fsSL --retry 3 --retry-delay 2 --retry-all-errors \
                 https://moonrepo.dev/install/proto.sh -o /tmp/proto-install.sh; then
              break
            fi
            echo "::warning::proto installer fetch failed (attempt ${attempt}/3); retrying"
            [ "${attempt}" -eq 3 ] && { echo "::error::could not fetch the proto installer after 3 attempts (moonrepo.dev unreachable) — this is a network flake on a merge-blocking lane, not a code failure."; exit 1; }
            sleep $((attempt * 5))
          done
          bash /tmp/proto-install.sh "${PROTO_INSTALL_VERSION}" --yes
          export PATH="${PROTO_HOME}/bin:${PROTO_HOME}/shims:${PATH}"
          # Retry the PBS toolchain pull too. This is the ~65 MB fetch (GitHub release
          # assets) — the one a cache would actually have mitigated. Retrying only the
          # 3 KB installer script above and calling the flake handled would be a lie.
          for attempt in 1 2 3; do
            proto install python 3.14 && break
            echo "::warning::proto install python 3.14 failed (attempt ${attempt}/3); retrying"
            [ "${attempt}" -eq 3 ] && { echo "::error::proto install python 3.14 failed 3x — network flake on a merge-blocking lane, not a code failure."; exit 1; }
            sleep $((attempt * 5))
          done
          PROTO_PY="$(ls -d "${PROTO_HOME}"/tools/python/3.14.*/bin/python3 2>/dev/null | sort -V | tail -1)"
          if [ -z "${PROTO_PY}" ] || [ ! -x "${PROTO_PY}" ]; then
            echo "no proto-managed python3 under ${PROTO_HOME}/tools/python" >&2
            ls -la "${PROTO_HOME}/tools/python" 2>&1 >&2 || true
            exit 1
          fi
          "${PROTO_PY}" -V
          chmod -R a+rX "${PROTO_HOME}"
          sudo ln -sf "${PROTO_PY}" /usr/local/bin/python3
          python3 -V
          uv pip install --python "${PROTO_PY}" .
          CHILD_FILE="$("${PROTO_PY}" -c 'import alfred.security.quarantine_child as m; print(m.__file__)')"
          echo "quarantine_child resolves at: ${CHILD_FILE}"
          test -n "${CHILD_FILE}"
          echo "bound_py=${PROTO_PY}" >> "$GITHUB_OUTPUT"
          echo "Hermetic proto py3.14 (aarch64) provisioned; launcher binds its prefix."
      - name: Assert the spawn-enabling preconditions hold (euid 0 + bwrap + bound py)
        if: steps.check.outputs.has_spawn == 'true'
        env:
          BOUND_PY: ${{ steps.bound_py.outputs.bound_py }}
          ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON: ${{ steps.bound_py.outputs.bound_py }}
        run: |
          set -euo pipefail
          EUID_UNDER_SUDO=$(sudo python3 -c 'import os; print(os.geteuid())')
          echo "euid under sudo: ${EUID_UNDER_SUDO}"
          if [ "${EUID_UNDER_SUDO}" != "0" ]; then
            echo "::error::sudo did not yield euid 0 (got ${EUID_UNDER_SUDO}); the root-gated spawn legs would SKIP and this arm64 gate would be paper-only (see #245)."
            exit 1
          fi
          if ! sudo bash -c 'command -v bwrap' >/dev/null 2>&1; then
            echo "::error::bwrap not on root PATH; the bwrap-gated real-spawn legs would SKIP and this arm64 gate would be paper-only (see #245)."
            exit 1
          fi
          if [ -z "${BOUND_PY}" ] || [ ! -x "${BOUND_PY}" ]; then
            echo "::error::bound py3.14 (ALFRED_QUARANTINE_CHILD_PYTHON) missing or not executable ('${BOUND_PY}'); the real-spawn quarantine-child leg would SKIP and gate nothing (see #248)."
            exit 1
          fi
          if [ -z "${ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON}" ] || [ ! -x "${ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON}" ]; then
            echo "::error::bound py3.14 (ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON) missing or not executable; the gateway real-spawn leg would SKIP and gate nothing (devops-006 / #245)."
            exit 1
          fi
          echo "Preconditions hold on aarch64: euid 0 + bwrap + bound py3.14 (${BOUND_PY}) — the root-gated legs will EXECUTE, not skip."
      - name: Run real-spawn integration + smoke legs as root (arm64)
        if: steps.check.outputs.has_spawn == 'true'
        # Same `sudo env` PATH/child-python threading as the amd64 sibling (sudo
        # strips the environment even with -E, so uv's dir and both child-python
        # vars are carried explicitly). `--cov-fail-under=0`: this lane is about
        # EXECUTION of the arch-sensitive spawn legs, not coverage thresholds
        # (arch-invariant — amd64 stays the single coverage source, ADR-0034).
        env:
          ALFRED_QUARANTINE_CHILD_PYTHON: ${{ steps.bound_py.outputs.bound_py }}
          ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON: ${{ steps.bound_py.outputs.bound_py }}
        run: |
          set -euo pipefail
          UV_BIN="$(command -v uv)"
          UV_DIR="$(dirname "${UV_BIN}")"
          sudo env \
            "PATH=${UV_DIR}:${PATH}" \
            "ALFRED_QUARANTINE_CHILD_PYTHON=${ALFRED_QUARANTINE_CHILD_PYTHON}" \
            "ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON=${ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON}" \
            "${UV_BIN}" run pytest tests/integration tests/smoke -q \
            -p no:cacheprovider --cov-fail-under=0 -m "not real_llm"
      - name: Assert the dual-LLM quarantine-child real-spawn leg RAN (not skipped) — #269 proof
        # THE gate this whole job exists for: the real bwrap dual-LLM child
        # round-trip on aarch64 — now the #340 golive Task 14 REAL-extract proof
        # (`test_quarantine_real_extract.py`) that superseded the deleted
        # deterministic-echo round-trip. It is what the #269 `/lib64` soft-bind
        # fixes, and it `skipif`s on (not bwrap) / (sysname != Linux) /
        # (geteuid != 0) / (not ALFRED_QUARANTINE_CHILD_PYTHON) — so without this
        # runtime assert a provisioning regression would silently skip it and this
        # lane would go green while proving NOTHING about arm64 (the #245 paper-gate
        # failure mode, one level deeper).
        #
        # NO `hashFiles()` GUARD — deliberately (see the amd64 twin): gating the step
        # on the file's existence means a RENAME makes the step evaporate and the
        # required check goes green gating nothing. The existence check lives INSIDE
        # the step and fails LOUD.
        if: steps.check.outputs.has_spawn == 'true'
        env:
          ALFRED_QUARANTINE_CHILD_PYTHON: ${{ steps.bound_py.outputs.bound_py }}
          SPAWN_TEST: tests/integration/test_quarantine_real_extract.py
        run: |
          set -euo pipefail
          if [ ! -f "${SPAWN_TEST}" ]; then
            echo "::error::${SPAWN_TEST} is missing — this lane's raison d'être (the #269 /lib64 arm64 proof) cannot run. If it was RENAMED, update SPAWN_TEST here; do not let this gate disappear silently (#245)."
            exit 1
          fi
          UV_BIN="$(command -v uv)"; UV_DIR="$(dirname "${UV_BIN}")"
          sudo env "PATH=${UV_DIR}:${PATH}" \
            "ALFRED_QUARANTINE_CHILD_PYTHON=${ALFRED_QUARANTINE_CHILD_PYTHON}" \
            "${UV_BIN}" run pytest \
            "${SPAWN_TEST}" \
            -rs -p no:cacheprovider --cov-fail-under=0 | tee /tmp/quarantine_child_spawn_arm64.out
          if grep -qE "(^|[^0-9])[1-9][0-9]* skipped" /tmp/quarantine_child_spawn_arm64.out; then
            echo "::error::dual-LLM quarantine-child real-spawn leg SKIPPED on the arm64 privileged lane — this lane's raison d'être; the #269 /lib64 proof would be vacuous (paper-gate hazard, #245)."
            exit 1
          fi
          grep -qE "(^|[^0-9])[1-9][0-9]* passed" /tmp/quarantine_child_spawn_arm64.out \
            || { echo "::error::dual-LLM quarantine-child real-spawn leg did not report a passing run on arm64."; exit 1; }
      - name: Assert the gateway real-spawn test RUNS (not skipped) — #245 paper-gate guard
        if: steps.check.outputs.has_spawn == 'true' && hashFiles('tests/integration/cli/daemon/test_gateway_real_probe_spawn_forwarded_inbound.py') != ''
        env:
          ALFRED_QUARANTINE_CHILD_PYTHON: ${{ steps.bound_py.outputs.bound_py }}
          ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON: ${{ steps.bound_py.outputs.bound_py }}
        run: |
          set -euo pipefail
          UV_BIN="$(command -v uv)"; UV_DIR="$(dirname "${UV_BIN}")"
          sudo env "PATH=${UV_DIR}:${PATH}" \
            "ALFRED_QUARANTINE_CHILD_PYTHON=${ALFRED_QUARANTINE_CHILD_PYTHON}" \
            "ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON=${ALFRED_GATEWAY_ADAPTER_CHILD_PYTHON}" \
            "${UV_BIN}" run pytest \
            tests/integration/cli/daemon/test_gateway_real_probe_spawn_forwarded_inbound.py \
            -rs -p no:cacheprovider --cov-fail-under=0 | tee /tmp/gw_probe_spawn_arm64.out
          if grep -qE "(^|[^0-9])[1-9][0-9]* skipped" /tmp/gw_probe_spawn_arm64.out; then
            echo "::error::gateway real-spawn test SKIPPED on the arm64 privileged lane — paper-gate hazard (#245)."
            exit 1
          fi
          grep -q "1 passed" /tmp/gw_probe_spawn_arm64.out || { echo "::error::gateway real-spawn test did not report '1 passed' on arm64."; exit 1; }
      - name: Assert the brokered-fd real-spawn leg RAN (not skipped) — #245 paper-gate guard
        if: steps.check.outputs.has_spawn == 'true' && hashFiles('tests/integration/test_quarantine_fd_broker_real_spawn.py') != ''
        env:
          ALFRED_QUARANTINE_CHILD_PYTHON: ${{ steps.bound_py.outputs.bound_py }}
        run: |
          set -euo pipefail
          UV_BIN="$(command -v uv)"; UV_DIR="$(dirname "${UV_BIN}")"
          sudo env "PATH=${UV_DIR}:${PATH}" \
            "ALFRED_QUARANTINE_CHILD_PYTHON=${ALFRED_QUARANTINE_CHILD_PYTHON}" \
            "${UV_BIN}" run pytest \
            tests/integration/test_quarantine_fd_broker_real_spawn.py \
            -rs -p no:cacheprovider --cov-fail-under=0 | tee /tmp/broker_fd_spawn_arm64.out
          if grep -qE "(^|[^0-9])[1-9][0-9]* skipped" /tmp/broker_fd_spawn_arm64.out; then
            echo "::error::brokered-fd real-spawn leg SKIPPED on the arm64 privileged lane — paper-gate hazard (#245)."
            exit 1
          fi
          grep -qE "(^|[^0-9])1 passed([^0-9]|$)" /tmp/broker_fd_spawn_arm64.out || { echo "::error::brokered-fd real-spawn leg did not report exactly '1 passed' on arm64."; exit 1; }
      - name: Run the bwrap-gated sandbox-escape adversarial corpus (arm64, #248)
        if: steps.check.outputs.has_spawn == 'true' && hashFiles('tests/adversarial/sandbox_escape/**/*.py') != ''
        run: |
          set -euo pipefail
          UV_BIN="$(command -v uv)"
          UV_DIR="$(dirname "${UV_BIN}")"
          # ASSERT-RAN (#245 / ops-003): these payloads `@_bwrap_required`-skip wherever
          # bwrap is absent, and this job is their ONLY required gate (the dedicated
          # `adversarial` workflow does not install bwrap). A silent skip here would
          # report green while gating NOTHING. `tee` + `set -o pipefail` keep a FAILED
          # run failing; the skip-parse then fails a green-but-vacuous run.
          sudo env "PATH=${UV_DIR}:${PATH}" "${UV_BIN}" run pytest \
            tests/adversarial/sandbox_escape -v -rs \
            -p no:cacheprovider --cov-fail-under=0 | tee /tmp/sbx_corpus_arm64.out
          # Fail ONLY on the BWRAP gate's skip reason (see the amd64 twin): the corpus
          # has deliberate netns/jq-conditional skips, and failing on those would let a
          # runner-image change block every merge in the repo.
          # POSITIVE floor, by NODE ID. A negative grep on the skip-reason string is
          # single-sourced in the test file and asserted nowhere: rename the tests or
          # reword the reason and the grep silently stops matching, while "N passed"
          # still matches from the OTHER corpus files — the guard then goes green with
          # the bwrap payloads never executed. (Reproduced.) Assert they RAN by name.
          for payload in \
            test_sbx_2026_003_host_etc_passwd_read_contained \
            test_sbx_2026_004_host_bin_sh_exec_contained \
            test_sbx_2026_006_host_proc_environ_read_contained \
            test_sbx_2026_012_quarantine_child_does_not_leak_fd3_key \
            test_sbx_2026_013_live_spawned_child_host_escape_contained; do
            if ! grep -qE "${payload}.*PASSED" /tmp/sbx_corpus_arm64.out; then
              echo "::error::kernel-observable sandbox-escape payload ${payload} did NOT report PASSED on the ARM64 lane — the ONLY aarch64 gate for these payloads. Either it skipped (bwrap provisioning regressed) or it was renamed and this gate silently stopped covering it — both make the containment corpus paper-only (#245 / #248). If renamed, update this list."
              exit 1
            fi
          done
          grep -qE "(^|[^0-9])[1-9][0-9]* passed" /tmp/sbx_corpus_arm64.out \
            || { echo "::error::sandbox-escape corpus did not report a passing run on arm64."; exit 1; }
      - name: Assert the Discord kernel proof RUNS (not skipped) — FIX-7 paper-gate guard (#245)
        if: steps.check.outputs.has_spawn == 'true' && hashFiles('tests/integration/egress/test_discord_policy_kernel_enforced.py') != ''
        run: |
          set -euo pipefail
          UV_BIN="$(command -v uv)"; UV_DIR="$(dirname "${UV_BIN}")"
          sudo env "PATH=${UV_DIR}:${PATH}" \
            "${UV_BIN}" run pytest \
            tests/integration/egress/test_discord_policy_kernel_enforced.py \
            -rs -p no:cacheprovider --cov-fail-under=0 | tee /tmp/discord_kernel_proof_arm64.out
          if grep -qE "(^|[^0-9])[1-9][0-9]* skipped" /tmp/discord_kernel_proof_arm64.out; then
            echo "::error::Discord policy kernel proof SKIPPED on the arm64 privileged lane — paper-gate hazard (#245 / FIX-7)."
            exit 1
          fi
          grep -qE "(^|[^0-9])[1-9][0-9]* passed" /tmp/discord_kernel_proof_arm64.out \
            || { echo "::error::Discord policy kernel proof did not report a passing run on arm64."; exit 1; }


  coverage-gates:
    name: Coverage gates (combined unit + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [python, integration]
    # No job-level `hashFiles()` guard: GitHub Actions rejects `hashFiles()`
    # in job-level `if:` at workflow-parse time. The first-step `check` below
    # probes the corpus and every downstream step short-circuits on
    # `steps.check.outputs.has_coverage_corpus`.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for combined coverage corpus
        id: check
        run: |
          set -euo pipefail
          # See `integration` job's check step for why we use `find … -print -quit`
          # instead of `compgen -G '**/*.py'` (bash `globstar` is off by default
          # and `**` silently collapses to `*`, producing false negatives on
          # nested test files).
          if find tests/unit -type f -name '*.py' -print -quit 2>/dev/null | grep -q . \
            && find tests/integration -type f -name '*.py' -print -quit 2>/dev/null | grep -q .; then
            echo "has_coverage_corpus=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_coverage_corpus=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tests/unit or tests/integration missing — skipping coverage-gates job."
          fi
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        if: steps.check.outputs.has_coverage_corpus == 'true'
      - if: steps.check.outputs.has_coverage_corpus == 'true'
        run: uv python install 3.14
      - if: steps.check.outputs.has_coverage_corpus == 'true'
        run: uv sync --frozen --dev
      - name: Re-run unit tests to seed combined coverage
        if: steps.check.outputs.has_coverage_corpus == 'true'
        # The combined coverage gate needs BOTH unit and integration data.
        # The `python` job's `.coverage` file isn't shared across runners,
        # so we re-run unit with --cov here and append the integration
        # artifact. Two passes is the cheapest correct option; the unit
        # suite is fast enough (~10s) that the duplication doesn't matter,
        # and it keeps the per-job artifact contract simple.
        run: uv run pytest tests/unit -q --cov=src/alfred --cov-branch
      - name: Download integration coverage artifact
        if: steps.check.outputs.has_coverage_corpus == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-integration
          path: .coverage-integration-dir
      - name: Combine unit + integration coverage
        if: steps.check.outputs.has_coverage_corpus == 'true'
        # `coverage combine` consumes a directory of .coverage* files and
        # produces a merged .coverage. Rename the artifact so combine
        # picks it up (it expects `.coverage.*` suffix patterns OR a
        # directory walk; explicit rename is least surprising).
        run: |
          set -euo pipefail
          # ``coverage combine`` treats ``.coverage`` (no suffix) as the
          # OUTPUT file; passing it as an input argument silently drops
          # the unit data (only the ``.coverage.integration`` input
          # actually feeds the merge — log says "Combined 1 file" when
          # we expect 2). Rename the unit data file to ``.coverage.unit``
          # so combine sees two real inputs and writes the merged result
          # to ``.coverage``. This was the actual root cause of the
          # "security/* 100% coverage gap" surfaced on main 2026-06-06
          # — every security/* file is already at 100% on unit data;
          # the gate was reading integration-only data because of this
          # bug.
          mv .coverage .coverage.unit
          mv .coverage-integration-dir/.coverage .coverage.integration
          uv run coverage combine --keep .coverage.unit .coverage.integration
          uv run coverage report --include='src/alfred/security/*' --fail-under=100
      - name: Hooks subsystem 100% line+branch coverage (combined)
        if: steps.check.outputs.has_coverage_corpus == 'true' && hashFiles('src/alfred/hooks/*.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/hooks/__init__.py,src/alfred/hooks/registry.py,src/alfred/hooks/invoke.py,src/alfred/hooks/capability.py,src/alfred/hooks/decorators.py,src/alfred/hooks/context.py,src/alfred/hooks/errors.py,src/alfred/hooks/audit_sink.py,src/alfred/hooks/boot.py' \
            --fail-under=100
      - name: Trust-boundary files 100% line+branch coverage (combined)
        # Mirror of the `python` job's gate, but driven off the merged
        # .coverage so the heartbeat / fail-closed / outage paths in
        # _gate.py that only the integration suite exercises are visible
        # to the gate. Without this, the spec §8.1 / §8.2 / §8.5 +
        # CLAUDE.md hard rule #7 invariants would be paper-only on those
        # paths. Chained `&&` hashFiles guard per CR-138 finding #1 —
        # ANY-match must NOT no-op the gate; ALL files must be present.
        if: steps.check.outputs.has_coverage_corpus == 'true' && hashFiles('src/alfred/security/tiers.py') != '' && hashFiles('src/alfred/security/quarantine.py') != '' && hashFiles('src/alfred/security/quarantine_transport.py') != '' && hashFiles('src/alfred/security/quarantine_child_io.py') != '' && hashFiles('src/alfred/identity/_ingest.py') != '' && hashFiles('src/alfred/bootstrap/nonce_factory.py') != '' && hashFiles('src/alfred/bootstrap/gate_factory.py') != '' && hashFiles('src/alfred/security/capability_gate/__init__.py') != '' && hashFiles('src/alfred/security/capability_gate/_gate.py') != '' && hashFiles('src/alfred/security/capability_gate/backend.py') != '' && hashFiles('src/alfred/security/capability_gate/policy.py') != '' && hashFiles('src/alfred/security/capability_gate/proposals.py') != '' && hashFiles('src/alfred/security/capability_gate/_bootstrap_grants.py') != '' && hashFiles('src/alfred/security/capability_gate/_comms_adapter_grants.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/security/tiers.py,src/alfred/security/quarantine.py,src/alfred/security/quarantine_transport.py,src/alfred/security/quarantine_child_io.py,src/alfred/identity/_ingest.py,src/alfred/bootstrap/nonce_factory.py,src/alfred/bootstrap/gate_factory.py,src/alfred/security/capability_gate/__init__.py,src/alfred/security/capability_gate/_gate.py,src/alfred/security/capability_gate/backend.py,src/alfred/security/capability_gate/policy.py,src/alfred/security/capability_gate/proposals.py,src/alfred/security/capability_gate/_bootstrap_grants.py,src/alfred/security/capability_gate/_comms_adapter_grants.py' \
            --fail-under=100
      - name: Plugins subsystem 100% line+branch coverage (combined)
        if: steps.check.outputs.has_coverage_corpus == 'true' && hashFiles('src/alfred/plugins/errors.py') != '' && hashFiles('src/alfred/plugins/transport.py') != '' && hashFiles('src/alfred/plugins/manifest.py') != '' && hashFiles('src/alfred/plugins/inbound_scanner.py') != '' && hashFiles('src/alfred/plugins/content_store_base.py') != '' && hashFiles('src/alfred/plugins/stdio_transport.py') != '' && hashFiles('src/alfred/plugins/session.py') != '' && hashFiles('src/alfred/plugins/manifest_reader.py') != '' && hashFiles('src/alfred/plugins/_observability.py') != '' && hashFiles('src/alfred/plugins/comms_stdio_transport.py') != '' && hashFiles('src/alfred/plugins/comms_socket_transport.py') != '' && hashFiles('src/alfred/plugins/comms_runner.py') != '' && hashFiles('src/alfred/plugins/inbound_disposition.py') != '' && hashFiles('src/alfred/plugins/_comms_child_env.py') != '' && hashFiles('src/alfred/plugins/comms_wire.py') != '' && hashFiles('src/alfred/plugins/comms_seq_codec.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/plugins/errors.py,src/alfred/plugins/transport.py,src/alfred/plugins/manifest.py,src/alfred/plugins/inbound_scanner.py,src/alfred/plugins/content_store_base.py,src/alfred/plugins/stdio_transport.py,src/alfred/plugins/session.py,src/alfred/plugins/manifest_reader.py,src/alfred/plugins/_observability.py,src/alfred/plugins/comms_stdio_transport.py,src/alfred/plugins/comms_socket_transport.py,src/alfred/plugins/comms_runner.py,src/alfred/plugins/inbound_disposition.py,src/alfred/plugins/_comms_child_env.py,src/alfred/plugins/comms_wire.py,src/alfred/plugins/comms_seq_codec.py' \
            --fail-under=100
      - name: Forwarded-inbound re-parse trust-boundary 100% line+branch coverage (combined)
        # Combined twin of the python-job gate (two-gates pattern, Spec B G6-7-1,
        # #309, ADR-0039). ``inbound_reparse.py`` is the core-side data-layer half
        # of the gateway->core inbound bridge's F3 forgery mitigation; keep the
        # --include in lockstep with the python-job step.
        if: steps.check.outputs.has_coverage_corpus == 'true' && hashFiles('src/alfred/comms_mcp/inbound_reparse.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/comms_mcp/inbound_reparse.py' \
            --fail-under=100
      - name: Forwarded-inbound receive trust-boundary 100% line+branch coverage (combined)
        # Combined twin of the python-job gate (two-gates pattern, Spec B G6-7-4,
        # #309, ADR-0039). ``forwarded_inbound_receiver.py`` is the core-side receive
        # trust boundary of the gateway->core inbound bridge; keep the --include in
        # lockstep with the python-job step.
        if: steps.check.outputs.has_coverage_corpus == 'true' && hashFiles('src/alfred/comms_mcp/forwarded_inbound_receiver.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/comms_mcp/forwarded_inbound_receiver.py' \
            --fail-under=100
      - name: Control-fd broker 100% line+branch coverage (combined)
        # Combined twin of the python-job gate (two-gates pattern, #340 PR2a,
        # ADR-0050). ``control_fd_broker.py`` is the core-side SCM_RIGHTS
        # reachability-broker for the quarantined child; keep the --include in
        # lockstep with the python-job step.
        if: steps.check.outputs.has_coverage_corpus == 'true' && hashFiles('src/alfred/egress/control_fd_broker.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/egress/control_fd_broker.py' \
            --fail-under=100
      - name: Egress-broker audit 100% line+branch coverage (combined)
        # Combined twin of the python-job gate (two-gates pattern, #340,
        # ADR-0050 Decision 7 / ADR-0040 residual (vii)). ``broker_audit.py``
        # is ``EgressBrokerAuditor``, the durable signed core-side per-call
        # egress-audit row for the SCM_RIGHTS broker; keep the --include in
        # lockstep with the python-job step.
        if: steps.check.outputs.has_coverage_corpus == 'true' && hashFiles('src/alfred/egress/broker_audit.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/egress/broker_audit.py' \
            --fail-under=100
      - name: Comms-MCP trust-boundary 100% line+branch coverage (combined)
        # PR-S4-8 (#152) host-side comms-MCP foundations (spec §8). Every file
        # below is a trust-boundary seam: the wire-format owner, the inbound
        # entrypoint enforcing resolution -> burst-gate -> quarantined_extract,
        # the host-owned classifier registry + scanner, the notification
        # handlers, the per-(user, persona) burst limiter, and the seam-bridge
        # bootstrap that assembles the host (the canonical id never crosses the
        # stdio boundary outward). ``session.py``'s ``_on_post_handshake_method``
        # dispatch-arm delta is covered by the Plugins subsystem gate above.
        # ``errors.py`` (the comms-MCP typed exception hierarchy) is included —
        # trivially 100% but a security-relevant typed-error surface that belongs
        # in the gate. ``hookpoints.py`` is deliberately EXCLUDED: its
        # declarations execute at MODULE IMPORT time (the module-bottom
        # ``declare_hookpoints()`` call), which runs before pytest-cov starts
        # tracking — coverage cannot attribute import-time lines to a test, so a
        # per-file 100% gate would be unsatisfiable. Its behaviour is covered by
        # ``tests/unit/hooks/test_comms_hookpoints_registered.py`` instead.
        # ``orchestrator/core.py`` is likewise EXCLUDED from this whole-file gate
        # even though PR-S4-8 adds ``Orchestrator.quarantined_extract`` there: it
        # is an 889-line multi-responsibility orchestrator, not a comms-only seam,
        # and pinning the WHOLE file at 100% from this corpus would be
        # unsatisfiable (it sits at ~93% on the full suite — unrelated orchestrator
        # error paths). The ``quarantined_extract`` funnel itself — the only
        # trust-boundary surface PR-S4-8 touches in that file — IS exercised to
        # 100% by ``tests/unit/comms_mcp/test_inbound_quarantined_extract_source_tier.py``,
        # the inbound-path unit suite, and the comms-identity adversarial corpus;
        # gating it via the whole orchestrator file is the wrong mechanism (a
        # function-scoped coverage gate is tracked as a follow-up).
        # Chained ``&&`` hashFiles guard per the plugins/supervisor precedent so
        # the gate no-ops cleanly on a branch where these files do not exist yet.
        if: steps.check.outputs.has_coverage_corpus == 'true' && hashFiles('src/alfred/comms_mcp/protocol.py') != '' && hashFiles('src/alfred/comms_mcp/inbound.py') != '' && hashFiles('src/alfred/comms_mcp/inbound_scanner.py') != '' && hashFiles('src/alfred/comms_mcp/classifier_registry.py') != '' && hashFiles('src/alfred/comms_mcp/handlers.py') != '' && hashFiles('src/alfred/comms_mcp/bootstrap.py') != '' && hashFiles('src/alfred/comms_mcp/observability.py') != '' && hashFiles('src/alfred/comms_mcp/errors.py') != '' && hashFiles('src/alfred/orchestrator/burst_limiter.py') != '' && hashFiles('src/alfred/comms_mcp/sub_payload_promotion.py') != '' && hashFiles('src/alfred/comms_mcp/audit_hash.py') != '' && hashFiles('src/alfred/comms_mcp/outbound_queue.py') != '' && hashFiles('src/alfred/comms_mcp/discord_hookpoints.py') != '' && hashFiles('src/alfred/comms_mcp/classifiers/discord.py') != '' && hashFiles('src/alfred/comms_mcp/addressing_drift.py') != '' && hashFiles('src/alfred/comms_mcp/thread_conversation_ledger.py') != '' && hashFiles('src/alfred/comms_mcp/daemon_runtime.py') != '' && hashFiles('src/alfred/comms_mcp/adapter_status_observer.py') != '' && hashFiles('src/alfred/comms_mcp/crash_incident_reconciler.py') != '' && hashFiles('src/alfred/comms_mcp/adapter_credential_protocol.py') != '' && hashFiles('src/alfred/comms_mcp/adapter_credential_resolver.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/comms_mcp/protocol.py,src/alfred/comms_mcp/inbound.py,src/alfred/comms_mcp/inbound_scanner.py,src/alfred/comms_mcp/classifier_registry.py,src/alfred/comms_mcp/handlers.py,src/alfred/comms_mcp/bootstrap.py,src/alfred/comms_mcp/observability.py,src/alfred/comms_mcp/errors.py,src/alfred/orchestrator/burst_limiter.py,src/alfred/comms_mcp/sub_payload_promotion.py,src/alfred/comms_mcp/audit_hash.py,src/alfred/comms_mcp/outbound_queue.py,src/alfred/comms_mcp/discord_hookpoints.py,src/alfred/comms_mcp/classifiers/discord.py,src/alfred/comms_mcp/addressing_drift.py,src/alfred/comms_mcp/thread_conversation_ledger.py,src/alfred/comms_mcp/daemon_runtime.py,src/alfred/comms_mcp/adapter_status_observer.py,src/alfred/comms_mcp/crash_incident_reconciler.py,src/alfred/comms_mcp/adapter_credential_protocol.py,src/alfred/comms_mcp/adapter_credential_resolver.py' \
            --fail-under=100
      - name: Gateway kernel trust-boundary 100% line+branch coverage (combined)
        # Spec A G3-3a (#237, ADR-0032): the gateway's stable kernel — the pure
        # link-state machine (``link_state.py``) + the client-facing socket /
        # control-frame emit (``client_listener.py``). The client-facing T1
        # carrier is a trust boundary; a coverage hole could ship an
        # un-exercised transition that breaks the §9 reconnecting/restored
