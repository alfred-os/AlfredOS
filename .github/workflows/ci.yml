        #     capability-branched extractor dispatch (Anthropic tool-use
        #     / OpenAI strict:true / DeepSeek JSON-mode / prompt-embedded
        #     fallback). The branch matrix here is the wire-format
        #     contract for every supported provider; a skipped branch is
        #     a silent fallback to the wrong shape.
        #   * ``src/alfred/security/quarantine_child/__main__.py`` —
        #     the launcher-spawned child entry that hosts ``quarantine.ingest``
        #     / ``quarantine.extract`` (spec §5.1). The fd-3 provider-key read
        #     + the length-prefixed JSON-RPC loop live here; a skipped branch
        #     on the launcher boundary is a CLAUDE.md hard rule #6
        #     (secrets-via-broker) violation candidate.
        #
        # Per-file ``--include`` mirrors the supervisor / plugins precedent
        # so a new quarantined-LLM trust-boundary file gets added to this
        # gate at the same PR it lands rather than silently shipped at
        # < 100% coverage. Chained ``&&`` hashFiles guard per PR-S3-1 R1
        # F1: ANY-match must NOT no-op the gate; ALL files must be
        # present before the coverage report runs.
        if: steps.check.outputs.has_coverage_corpus == 'true' && hashFiles('src/alfred/providers/base.py') != '' && hashFiles('src/alfred/bootstrap/quarantine.py') != '' && hashFiles('src/alfred/security/quarantine_child/__init__.py') != '' && hashFiles('src/alfred/security/quarantine_child/provider_dispatch.py') != '' && hashFiles('src/alfred/security/quarantine_child/__main__.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/providers/base.py,src/alfred/bootstrap/quarantine.py,src/alfred/security/quarantine_child/__init__.py,src/alfred/security/quarantine_child/provider_dispatch.py,src/alfred/security/quarantine_child/__main__.py' \
            --fail-under=100
      - name: Web-fetch trust-boundary 100% line+branch coverage (combined)
        id: web_fetch_cov_combined
        # Combined-data mirror of the ``python`` job's web-fetch gate
        # (see the matching step above for the per-file rationale). The
        # web-fetch trust-boundary files are proven by unit-only data
        # today — no integration test exercises them. The combined-job
        # mirror exists for parity with every other Slice-3 trust
        # boundary so an operator scanning the CI plan sees one gate per
        # subsystem in both contexts; a future integration test that
        # adds to the .coverage data will land here automatically.
        # Chained ``&&`` hashFiles guard per PR-S3-1 R1 F1.
        if: steps.check.outputs.has_coverage_corpus == 'true' && hashFiles('src/alfred/plugins/web_fetch/errors.py') != '' && hashFiles('src/alfred/plugins/web_fetch/allowlist.py') != '' && hashFiles('src/alfred/plugins/web_fetch/tls_policy.py') != '' && hashFiles('src/alfred/plugins/web_fetch/content_store.py') != '' && hashFiles('src/alfred/plugins/web_fetch/rate_limit.py') != '' && hashFiles('src/alfred/plugins/web_fetch/canary_scanner.py') != '' && hashFiles('src/alfred/plugins/web_fetch/fetch_dispatcher.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/plugins/web_fetch/errors.py,src/alfred/plugins/web_fetch/allowlist.py,src/alfred/plugins/web_fetch/tls_policy.py,src/alfred/plugins/web_fetch/content_store.py,src/alfred/plugins/web_fetch/rate_limit.py,src/alfred/plugins/web_fetch/canary_scanner.py,src/alfred/plugins/web_fetch/fetch_dispatcher.py' \
            --fail-under=100
      - name: Web-fetch coverage gate — remediation hint (combined)
        # devex-004 mirror: combined-job gate failure deserves the same
        # actionable remediation card as the per-job gate above. The
        # combined gate reads merged unit + integration coverage data,
        # but the local-reproduction recipe targets the unit suite where
        # web_fetch coverage is actually proven today (no integration
        # test exercises the trust boundary yet).
        if: failure() && steps.check.outputs.has_coverage_corpus == 'true' && steps.web_fetch_cov_combined.outcome == 'failure'
        run: |
          echo "::error::Trust-boundary coverage gate failed for web_fetch."
          echo "Files required at 100% line+branch:"
          echo "  - src/alfred/plugins/web_fetch/{allowlist,tls_policy,fetch_dispatcher,content_store,rate_limit,canary_scanner,errors}.py"
          echo ""
          echo "Local reproduction (matches the CI gate one-for-one):"
          echo "  cd \$(git rev-parse --show-toplevel)"
          echo "  uv run pytest tests/unit/plugins/web_fetch/ \\"
          echo "    --cov=alfred.plugins.web_fetch --cov-branch --cov-report=term-missing"
          echo "  uv run coverage report \\"
          echo "    --include='src/alfred/plugins/web_fetch/errors.py,src/alfred/plugins/web_fetch/allowlist.py,src/alfred/plugins/web_fetch/tls_policy.py,src/alfred/plugins/web_fetch/content_store.py,src/alfred/plugins/web_fetch/rate_limit.py,src/alfred/plugins/web_fetch/canary_scanner.py,src/alfred/plugins/web_fetch/fetch_dispatcher.py,src/alfred/plugins/web_fetch/host_ip_guard.py' \\"
          echo "    --fail-under=100"
          echo ""
          echo "Per-file drill-down (replace <module> with a specific name):"
          echo "  uv run pytest tests/unit/plugins/web_fetch/ \\"
          echo "    --cov=alfred.plugins.web_fetch.<module> --cov-branch --cov-fail-under=100 --cov-report=term-missing"
          echo "  where <module> is one of: allowlist, tls_policy, fetch_dispatcher, content_store, rate_limit, canary_scanner, errors, host_ip_guard."
          echo ""
          echo "Why 100% on these files: trust-boundary code per CLAUDE.md security rule 8."

  smoke:
    name: Smoke (end-to-end)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # No job-level `hashFiles()` guard: GitHub Actions rejects `hashFiles()`
    # in job-level `if:` at workflow-parse time. The first-step `check` below
    # probes the corpus and every downstream step short-circuits on
    # `steps.check.outputs.has_smoke`.
    #
    # No services: block — the smoke test boots its own Postgres testcontainer
    # so the container lifecycle is deterministic and the test owns its data.
    # Docker is available on ubuntu-latest by default; testcontainers uses the
    # host docker socket.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Check for smoke corpus
        id: check
        run: |
          set -euo pipefail
          # See `integration` job's check step for why we use `find … -print -quit`
          # instead of `compgen -G '**/*.py'` (bash `globstar` is off by default
          # and `**` silently collapses to `*`, producing false negatives on
          # nested test files).
          if find tests/smoke -type f -name '*.py' -print -quit 2>/dev/null | grep -q .; then
            echo "has_smoke=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_smoke=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tests/smoke/**/*.py missing — skipping Smoke job."
          fi
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3 latest
        if: steps.check.outputs.has_smoke == 'true'
      - if: steps.check.outputs.has_smoke == 'true'
        run: uv python install 3.14
      - if: steps.check.outputs.has_smoke == 'true'
        run: uv sync --frozen --dev
      - name: Run smoke tests
        if: steps.check.outputs.has_smoke == 'true'
        # Gated smoke env vars: when present, the Discord-gateway smoke
        # and the real-provider TUI smoke run end-to-end; when absent
        # (fork PRs, secrets not yet provisioned), the tests SKIP cleanly
        # — same skip-vs-pass discipline the test files enforce.
        # The values must be set as repo secrets by the operator AFTER
        # this PR merges (PR-E plan Task 1 Step 4 + Task 1b Step 1b.7):
        # * ALFRED_SMOKE_DISCORD_TOKEN — throwaway bot from a private
        #   Discord application the operator/CI owns.
        # * ALFRED_SMOKE_PROVIDER_KEY — throwaway DeepSeek API key (or
        #   Anthropic fallback per ADR-0001).
        # Secrets are scoped via env:, never interpolated into the
        # run: block — the workflow-injection guard in the security
        # reminder hook is satisfied.
        env:
          ALFRED_SMOKE_DISCORD_TOKEN: ${{ secrets.ALFRED_SMOKE_DISCORD_TOKEN }}
          ALFRED_SMOKE_PROVIDER_KEY: ${{ secrets.ALFRED_SMOKE_PROVIDER_KEY }}
        run: uv run pytest tests/smoke -v

  setup-script-smoke:
    name: Setup script smoke (${{ matrix.os }})
    # No job-level `hashFiles()` guard: GitHub Actions rejects `hashFiles()`
    # in job-level `if:` at workflow-parse time. The first-step `check` below
    # probes for the setup script and the dry-run step short-circuits on
    # `steps.check.outputs.has_setup_script`.
    timeout-minutes: 5
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Check for setup script
        id: check
        run: |
          set -euo pipefail
          if [ -f bin/alfred-setup.sh ]; then
            echo "has_setup_script=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_setup_script=false" >> "$GITHUB_OUTPUT"
            echo "::notice::bin/alfred-setup.sh missing — skipping setup-script-smoke job."
          fi
      - name: Stub docker on macOS for --dry-run
        if: matrix.os == 'macos-latest' && steps.check.outputs.has_setup_script == 'true'
        # GitHub-hosted macOS runners do not ship with Docker installed
        # (https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners).
        # ``bin/alfred-setup.sh --dry-run`` only walks the prereq checks
        # (docker + docker compose + jq) and exits BEFORE running any
        # real docker command (line 64 of the setup script). A no-op shim
        # on PATH lets the macOS leg exercise the script's *bash* logic —
        # which IS the macOS portability surface (bash 3.2 vs 5+, BSD vs
        # GNU coreutils, ``[[ ... ]]`` parsing) — without needing a real
        # Docker daemon (which on macos-latest would require ~3 min of
        # colima setup per run). The shim's behaviour is bounded by
        # ``--dry-run``'s early exit; outside CI the script's
        # ``require_cmd docker`` arm runs the real binary. #184 item 5.
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/bin"
          cat > "${RUNNER_TEMP}/bin/docker" <<'STUB'
          #!/bin/sh
          # No-op docker stub. Reached only by alfred-setup.sh --dry-run's
          # prereq checks; never invoked outside CI.
          exit 0
          STUB
          chmod +x "${RUNNER_TEMP}/bin/docker"
          echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"
      - if: steps.check.outputs.has_setup_script == 'true'
        run: bin/alfred-setup.sh --dry-run
