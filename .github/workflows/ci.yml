name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel-in-progress: rapid PR pushes do not queue stale runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}


permissions:
  contents: read  # Minimal: read repo content for lint / type / unit / integration

jobs:
  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: |
            **/*.md
            !LICENSE
            !node_modules/**

  python:
    name: Python (lint, types, unit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: hashFiles('pyproject.toml') != ''
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@887a942a15af3a7626099df99e897a18d9e5ab3a # v3 latest
      - run: uv python install 3.14
      - run: uv sync --frozen --dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        # Replaces the old `black --check .` step. ruff format is the
        # AlfredOS-canonical formatter (see docs/python-conventions.md);
        # black is being removed from dev-deps in the Slice 1 Task 1
        # pyproject.toml fixup.
        run: uv run ruff format --check .
      - name: Mypy (strict)
        if: hashFiles('src/**/*.py') != ''
        run: uv run mypy --strict src/
      - name: Pyright
        if: hashFiles('src/**/*.py') != ''
        run: uv run pyright src/
      - name: Unit tests + coverage gates
        if: hashFiles('tests/unit/**/*.py') != ''
        # Two gates here:
        #   1. Overall coverage >= 75% (matches pyproject.toml [tool.coverage.report]
        #      fail_under). Drift-detection contract — keeps wide modules honest.
        #   2. Security boundaries 100% line+branch. CLAUDE.md hard rule:
        #      every security boundary must have 100% line+branch coverage.
        #      Slice 1's security surface is small (tiers + secret broker), so
        #      100% is achievable today; future slices add canaries, capability
        #      gate, DLP — each must land with its tests at this bar.
        # The follow-up `coverage report` invocation re-uses the .coverage
        # data file written by the pytest --cov run; no second test execution.
        # The hooks-subsystem coverage gate lives in its OWN step below so
        # the `if: hashFiles('src/alfred/hooks/*.py') != ''` guard cleanly
        # no-ops on a branch where the hooks subsystem hasn't landed yet —
        # mirrors the unit-test step's guard discipline.
        run: |
          uv run pytest tests/unit -q --cov=src/alfred --cov-report=term-missing --cov-fail-under=75
          uv run coverage report --include='src/alfred/security/*' --fail-under=100
      - name: Hooks subsystem 100% line+branch coverage
        # Slice 2.5 PR-A's ``src/alfred/hooks/`` is a trust boundary in its
        # own right — the capability gate (sec-007), the re-entry bypass
        # (sec-008), the chain-deadline timer (§6.4) and the
        # refusal-authorization check (§6.5) ALL live in this subsystem;
        # every line must be proven by a test. Per-file ``--include``
        # enumerates the eight ``.py`` modules (including ``__init__.py``
        # so the public-surface lock is gated too) so the list stays
        # unambiguous when new files land — a new module skipped here is a
        # code-review smell, not a silent coverage hole.
        # The hashFiles guard makes the step a clean no-op on a branch where
        # the hooks subsystem hasn't landed yet (mirrors the unit-test step
        # at line 61's guard discipline). Re-uses the .coverage data file
        # written by the unit-test step above; depends on that step running
        # first via implicit step ordering.
        if: hashFiles('src/alfred/hooks/*.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/hooks/__init__.py,src/alfred/hooks/registry.py,src/alfred/hooks/invoke.py,src/alfred/hooks/capability.py,src/alfred/hooks/decorators.py,src/alfred/hooks/context.py,src/alfred/hooks/errors.py,src/alfred/hooks/audit_sink.py' \
            --fail-under=100
      - name: Trust-boundary files 100% line+branch coverage
        # Slice-3 PR-S3-1 + PR-S3-2 trust-boundary surface (spec §11a).
        # The files explicitly enumerated below are the ONLY legitimate
        # construction sites for ``TaggedContent`` instances, the
        # ingress / quarantine / bootstrap boundaries the orchestrator
        # depends on, and the real capability-gate enforcement plane:
        #
        #   * ``src/alfred/security/tiers.py`` — T0/T1/T2/T3 classes,
        #     ``tag()`` overload set, ``CapabilityGateNonce``, and
        #     ``tag_t3_with_nonce`` (§3.1 / §3.2).
        #   * ``src/alfred/security/quarantine.py`` — ``T3DerivedData``
        #     NewType, ``ContentHandle`` single-use carrier, and the
        #     ``quarantined_to_structured`` / ``downgrade_to_orchestrator``
        #     stubs PR-S3-4 will fill in (§3.4 / §3.7 / §7.3).
        #   * ``src/alfred/identity/_ingest.py`` — the role × adapter
        #     T1/T2 derivation hook (§3.6) AND the publisher for the
        #     ``identity.t1_ingress`` + ``identity.t1_downgrade``
        #     hookpoints (§14).
        #   * ``src/alfred/bootstrap/nonce_factory.py`` — the per-process
        #     T3 nonce factory and the module-level lock that backs the
        #     atomic registration invariant (§3.2; CR-138 round-2 #3+#4).
        #   * ``src/alfred/bootstrap/gate_factory.py`` — sanctioned
        #     ``ALFRED_ENV`` read site (sec-007) that selects the
        #     :class:`RealGate` vs deferred-stub bootstrap strategy.
        #   * ``src/alfred/security/capability_gate/__init__.py`` —
        #     public surface re-exports (Protocol + RealGate + factory).
        #   * ``src/alfred/security/capability_gate/_gate.py`` — RealGate
        #     hot-path ``check``/``check_plugin_load``/
        #     ``check_content_clearance``, heartbeat fail-closed loop,
        #     and ``supervisor.capability_gate_unavailable`` audit emit
        #     (spec §8.1 / §8.2 / §8.5; CLAUDE.md hard rule #7).
        #   * ``src/alfred/security/capability_gate/backend.py`` —
        #     ``StorageBackend`` Protocol + ``PostgresBackend`` (the
        #     authoritative grant store).
        #   * ``src/alfred/security/capability_gate/policy.py`` — pure
        #     ``GatePolicy`` + ``GrantRow`` algebra (no I/O).
        #   * ``src/alfred/security/capability_gate/proposals.py`` —
        #     reviewer-gated proposal-branch creation (PRD §6.4 #4).
        #
        # Per-file ``--include`` mirrors the hooks-subsystem precedent
        # above. The list is explicit so a new trust-boundary file gets
        # added to the gate at the same PR it lands, not silently shipped
        # at < 100% coverage. The hashFiles guard makes the step a clean
        # no-op on a branch where any of the files have not yet landed
        # (mirrors the unit-test step's guard discipline).
        #
        # CR-138 finding #1: chain the hashFiles() checks with ``&&``
        # because ``hashFiles('a','b','c') != ''`` is ANY-match, not
        # ALL-match. The gate must require ALL files to be present; if
        # any one is missing the coverage step should no-op.
        if: hashFiles('src/alfred/security/tiers.py') != '' && hashFiles('src/alfred/security/quarantine.py') != '' && hashFiles('src/alfred/identity/_ingest.py') != '' && hashFiles('src/alfred/bootstrap/nonce_factory.py') != '' && hashFiles('src/alfred/bootstrap/gate_factory.py') != '' && hashFiles('src/alfred/security/capability_gate/__init__.py') != '' && hashFiles('src/alfred/security/capability_gate/_gate.py') != '' && hashFiles('src/alfred/security/capability_gate/backend.py') != '' && hashFiles('src/alfred/security/capability_gate/policy.py') != '' && hashFiles('src/alfred/security/capability_gate/proposals.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/security/tiers.py,src/alfred/security/quarantine.py,src/alfred/identity/_ingest.py,src/alfred/bootstrap/nonce_factory.py,src/alfred/bootstrap/gate_factory.py,src/alfred/security/capability_gate/__init__.py,src/alfred/security/capability_gate/_gate.py,src/alfred/security/capability_gate/backend.py,src/alfred/security/capability_gate/policy.py,src/alfred/security/capability_gate/proposals.py' \
            --fail-under=100
      - name: Plugins subsystem 100% line+branch coverage
        # Slice-3 PR-S3-3a's ``src/alfred/plugins/`` is the plugin-host
        # trust boundary (spec §11a, ADR-0017). Every file enumerated
        # below mediates between the privileged orchestrator and an
        # untrusted subprocess; a coverage hole here is a hole at the
        # trust boundary:
        #
        #   * ``src/alfred/plugins/errors.py`` — the error hierarchy the
        #     orchestrator branches on (manifest vs transport vs
        #     invocation vs quarantine-unavailable). A skipped leaf class
        #     means audit consumers cannot disambiguate failure modes
        #     (arch-006 / err-011).
        #   * ``src/alfred/plugins/transport.py`` — ``PluginTransport``
        #     Protocol + ``DispatchResult`` union (core-011). The shape
        #     downstream PRs depend on.
        #   * ``src/alfred/plugins/manifest.py`` — TOML parser with
        #     ``manifest_version=1`` pin (arch-007) and the
        #     ``subscriber_tier != T0..T3`` invariant (tier-laundering
        #     defence).
        #   * ``src/alfred/plugins/inbound_scanner.py`` — canary detection
        #     on plugin output (sec-013 / spec §7.6). A canary trip is a
        #     quarantine trigger, not a recoverable error.
        #   * ``src/alfred/plugins/content_store_base.py`` — the
        #     ``ContentStoreBase`` Protocol that persists the
        #     ``TaggedContent[T3]`` *wrapper* (rvw-004 — persisting raw
        #     bytes would silently downgrade T3 to untagged on retrieval).
        #   * ``src/alfred/plugins/stdio_transport.py`` — the StdioTransport
        #     wire: env-scrub spawn, fd-passed provider key, DLP-then-broker
        #     outbound order (arch-001 / sec-010), inbound canary scan with
        #     SECURITY EVENT disposition, ``kill()`` returning the actual
        #     SIGKILL outcome (CR R3 ``kill_succeeded``).
        #   * ``src/alfred/plugins/session.py`` — manifest-handshake
        #     orchestrator + lifecycle audit + SIGKILL-before-audit
        #     ordering on the post-handshake hook-register attack
        #     (sec-013 / core-007).
        #   * ``src/alfred/plugins/_observability.py`` — the spec §7a.1
        #     Prometheus histograms covering the four p99 budgets
        #     (perf-002 / perf-009). A missed observe point is a missed
        #     budget.
        #
        # Per-file ``--include`` mirrors the hooks-subsystem precedent
        # above so a new plugin trust-boundary file gets added to this
        # gate at the same PR it lands rather than silently shipped at
        # < 100% coverage. Chained ``&&`` hashFiles guard per PR-S3-1 R1
        # F1: ANY-match must NOT no-op the gate; ALL files must be
        # present before the coverage report runs.
        if: hashFiles('src/alfred/plugins/errors.py') != '' && hashFiles('src/alfred/plugins/transport.py') != '' && hashFiles('src/alfred/plugins/manifest.py') != '' && hashFiles('src/alfred/plugins/inbound_scanner.py') != '' && hashFiles('src/alfred/plugins/content_store_base.py') != '' && hashFiles('src/alfred/plugins/stdio_transport.py') != '' && hashFiles('src/alfred/plugins/session.py') != '' && hashFiles('src/alfred/plugins/_observability.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/plugins/errors.py,src/alfred/plugins/transport.py,src/alfred/plugins/manifest.py,src/alfred/plugins/inbound_scanner.py,src/alfred/plugins/content_store_base.py,src/alfred/plugins/stdio_transport.py,src/alfred/plugins/session.py,src/alfred/plugins/_observability.py' \
            --fail-under=100

  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: hashFiles('tests/integration/**/*.py') != ''
    services:
      # Service container images are pinned to major tags. zizmor flags these
      # as unpinned-images (which prefers @sha256:digest); accept it because
      # (a) these are well-known images from official Docker Hub sources,
      # (b) Dependabot's docker ecosystem watches docker-compose.yaml not
      # GHA service blocks, and (c) digest-pinning here would block
      # patch-level postgres/redis updates we want for security.
      postgres:
        image: postgres:16  # zizmor: ignore[unpinned-images]
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports: ["5432:5432"]
      redis:
        image: redis:7  # zizmor: ignore[unpinned-images]
        ports: ["6379:6379"]
      qdrant:
        image: qdrant/qdrant:v1.12.4  # zizmor: ignore[unpinned-images]
        ports: ["6333:6333"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@887a942a15af3a7626099df99e897a18d9e5ab3a # v3 latest
      - run: uv sync --frozen --dev
      - run: uv run pytest tests/integration -q

  smoke:
    name: Smoke (end-to-end)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: hashFiles('tests/smoke/**/*.py') != ''
    # No services: block — the smoke test boots its own Postgres testcontainer
    # so the container lifecycle is deterministic and the test owns its data.
    # Docker is available on ubuntu-latest by default; testcontainers uses the
    # host docker socket.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@887a942a15af3a7626099df99e897a18d9e5ab3a # v3 latest
      - run: uv python install 3.14
      - run: uv sync --frozen --dev
      - name: Run smoke tests
        # Gated smoke env vars: when present, the Discord-gateway smoke
        # and the real-provider TUI smoke run end-to-end; when absent
        # (fork PRs, secrets not yet provisioned), the tests SKIP cleanly
        # — same skip-vs-pass discipline the test files enforce.
        # The values must be set as repo secrets by the operator AFTER
        # this PR merges (PR-E plan Task 1 Step 4 + Task 1b Step 1b.7):
        # * ALFRED_SMOKE_DISCORD_TOKEN — throwaway bot from a private
        #   Discord application the operator/CI owns.
        # * ALFRED_SMOKE_PROVIDER_KEY — throwaway DeepSeek API key (or
        #   Anthropic fallback per ADR-0001).
        # Secrets are scoped via env:, never interpolated into the
        # run: block — the workflow-injection guard in the security
        # reminder hook is satisfied.
        env:
          ALFRED_SMOKE_DISCORD_TOKEN: ${{ secrets.ALFRED_SMOKE_DISCORD_TOKEN }}
          ALFRED_SMOKE_PROVIDER_KEY: ${{ secrets.ALFRED_SMOKE_PROVIDER_KEY }}
        run: uv run pytest tests/smoke -v

  setup-script-smoke:
    name: Setup script smoke (${{ matrix.os }})
    if: hashFiles('bin/alfred-setup.sh') != ''
    timeout-minutes: 5
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: bin/alfred-setup.sh --dry-run
