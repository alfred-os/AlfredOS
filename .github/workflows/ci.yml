name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel-in-progress: rapid PR pushes do not queue stale runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}


permissions:
  contents: read  # Minimal: read repo content for lint / type / unit / integration

jobs:
  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # markdownlint-cli2 is run via npx directly rather than the
      # DavidAnson/markdownlint-cli2-action action because alfred-os org
      # policy restricts third-party actions to GitHub-published or
      # verified-Marketplace entries; that action isn't verified, so the
      # workflow fails to parse (`startup_failure`) regardless of SHA
      # pinning. The CLI itself is a regular npm package and works fine
      # called directly. `actions/setup-node` IS GitHub-published.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
      - name: Run markdownlint-cli2
        run: |
          set -euo pipefail
          npx --yes markdownlint-cli2@0.22.1 \
            "**/*.md" \
            "!LICENSE" \
            "!node_modules/**"

  ops-promtool:
    name: promtool (alert rules)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install promtool
        run: |
          set -euo pipefail
          PROM_VERSION=2.53.0
          curl --fail -sSL -o prometheus.tar.gz \
            "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz"
          echo "d9900a11e3c89261e6416e3c9989858bad7b206af8b6838dfe9a5392d8ddc60d  prometheus.tar.gz" | sha256sum -c -
          tar xzf prometheus.tar.gz
          sudo mv "prometheus-${PROM_VERSION}.linux-amd64/promtool" /usr/local/bin/promtool
      - name: Validate + unit-test the alert rules
        working-directory: ops/alerts
        run: |
          set -euo pipefail
          promtool check rules gateway.yml
          promtool test rules gateway_test.yml
          # #340 PR2b-golive: the quarantine capability-revocation alert. Added to THIS
          # job deliberately — a rule file promtool never runs is a paper-only gate, the
          # exact failure mode the alert itself exists to avoid.
          promtool check rules quarantine.yml
          promtool test rules quarantine_test.yml

  python:
    name: Python (lint, types, unit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Least privilege: this job only checks out + runs local tooling (lint / type /
    # unit / coverage report) — no PR comment, upload, or write. Pin contents:read so
    # it does not inherit the default token's broader scope (matches the arm64 sibling
    # + coverage-gates jobs).
    permissions:
      contents: read
    # No job-level `hashFiles()` guard: GitHub Actions rejects `hashFiles()`
    # in job-level `if:` at workflow-parse time (HTTP 422 "Unrecognized
    # function: 'hashFiles'") — the function is only valid inside step
    # contexts. The first-step `check` below probes for pyproject.toml and
    # every downstream step short-circuits on `steps.check.outputs.has_py`.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for Python project
        id: check
        run: |
          set -euo pipefail
          if [ -f pyproject.toml ]; then
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_py=false" >> "$GITHUB_OUTPUT"
            echo "::notice::pyproject.toml missing — skipping Python job."
          fi
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        if: steps.check.outputs.has_py == 'true'
      - if: steps.check.outputs.has_py == 'true'
        run: uv python install 3.14
      - if: steps.check.outputs.has_py == 'true'
        run: uv sync --frozen --dev
      - name: Ruff lint
        if: steps.check.outputs.has_py == 'true'
        run: uv run ruff check .
      - name: Ruff format check
        # Replaces the old `black --check .` step. ruff format is the
        # AlfredOS-canonical formatter (see docs/python-conventions.md);
        # black is being removed from dev-deps in the Slice 1 Task 1
        # pyproject.toml fixup.
        if: steps.check.outputs.has_py == 'true'
        run: uv run ruff format --check .
      - name: Mypy (strict)
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/**/*.py') != ''
        run: uv run mypy --strict src/
      - name: Pyright
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/**/*.py') != ''
        run: uv run pyright src/
      - name: Unit tests + coverage gates
        if: steps.check.outputs.has_py == 'true' && hashFiles('tests/unit/**/*.py') != ''
        # Two gates here:
        #   1. Overall coverage >= 75% (matches pyproject.toml [tool.coverage.report]
        #      fail_under). Drift-detection contract — keeps wide modules honest.
        #   2. Security boundaries 100% line+branch. CLAUDE.md hard rule:
        #      every security boundary must have 100% line+branch coverage.
        #      Slice 1's security surface is small (tiers + secret broker), so
        #      100% is achievable today; future slices add canaries, capability
        #      gate, DLP — each must land with its tests at this bar.
        # The follow-up `coverage report` invocation re-uses the .coverage
        # data file written by the pytest --cov run; no second test execution.
        # The hooks-subsystem coverage gate lives in its OWN step below so
        # the `if: hashFiles('src/alfred/hooks/*.py') != ''` guard cleanly
        # no-ops on a branch where the hooks subsystem hasn't landed yet —
        # mirrors the unit-test step's guard discipline.
        run: |
          uv run pytest tests/unit -q --cov=src/alfred --cov-report=term-missing --cov-fail-under=75
          uv run coverage report --include='src/alfred/security/*' --fail-under=100
      - name: Hooks subsystem 100% line+branch coverage
        # Slice 2.5 PR-A's ``src/alfred/hooks/`` is a trust boundary in its
        # own right — the capability gate (sec-007), the re-entry bypass
        # (sec-008), the chain-deadline timer (§6.4) and the
        # refusal-authorization check (§6.5) ALL live in this subsystem;
        # every line must be proven by a test. Per-file ``--include``
        # enumerates the eight ``.py`` modules (including ``__init__.py``
        # so the public-surface lock is gated too) so the list stays
        # unambiguous when new files land — a new module skipped here is a
        # code-review smell, not a silent coverage hole.
        # The hashFiles guard makes the step a clean no-op on a branch where
        # the hooks subsystem hasn't landed yet (mirrors the unit-test step
        # at line 61's guard discipline). Re-uses the .coverage data file
        # written by the unit-test step above; depends on that step running
        # first via implicit step ordering. The chained ``has_py`` clause
        # mirrors the Mypy / Pyright / unit-test gates so a pyproject-less
        # branch no-ops cleanly instead of failing on a missing
        # ``uv run`` toolchain (CR-177).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/hooks/*.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/hooks/__init__.py,src/alfred/hooks/registry.py,src/alfred/hooks/invoke.py,src/alfred/hooks/capability.py,src/alfred/hooks/decorators.py,src/alfred/hooks/context.py,src/alfred/hooks/errors.py,src/alfred/hooks/audit_sink.py,src/alfred/hooks/boot.py' \
            --fail-under=100
      - name: First-party bootstrap-grants 100% line+branch coverage
        # N1 (PR-S4-11b0 review): ``_bootstrap_grants.py`` holds the ADR-0026
        # ``FIRST_PARTY_SYSTEM_GRANTS`` constant — the single source of truth
        # for the in-tree defences AlfredOS seeds at boot. It is already
        # caught INCIDENTALLY by the ``security/*`` glob gate above; this
        # explicit per-file gate makes it AUDITABLY named (a reviewer can see
        # the trust-boundary constant is gated by name, not just by glob).
        # Unlike ``_gate.py`` (whose outage paths only the integration suite
        # exercises, so its explicit gate lives in ``coverage-gates``), this
        # module is a pure constant + drift-guard surface fully covered by the
        # unit tier, so gating it on unit-only ``.coverage`` data is sound.
        # The combined-job ``Trust-boundary files`` gate names it too (the
        # two-gates pattern — keep BOTH in sync when this file changes).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/security/capability_gate/_bootstrap_grants.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/security/capability_gate/_bootstrap_grants.py' \
            --fail-under=100
      - name: Comms-adapter load-grants 100% line+branch coverage
        # ADR-0027 (PR-S4-11b): ``_comms_adapter_grants.py`` holds the
        # ``comms_adapter_load_grants`` builder — the config-is-authorization
        # source of truth for the plugin-LOAD grants the daemon seeds per
        # operator-enabled first-party comms adapter. Like ``_bootstrap_grants.py``
        # it is a pure ``Settings -> tuple[GrantRow]`` transform fully covered by
        # the unit tier (reads source-controlled manifests off disk, no Postgres),
        # so gating it on unit-only ``.coverage`` data is sound. Named explicitly
        # (not just glob-caught) so a reviewer sees the trust-boundary builder is
        # gated by name. The combined-job ``Trust-boundary files`` gate names it
        # too (the two-gates pattern — keep BOTH in sync when this file changes).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/security/capability_gate/_comms_adapter_grants.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/security/capability_gate/_comms_adapter_grants.py' \
            --fail-under=100
      - name: Forwarded-inbound re-parse trust-boundary 100% line+branch coverage
        # Spec B G6-7-1 (#309, ADR-0039): ``inbound_reparse.py`` is the core-side
        # data-layer half of the gateway->core inbound bridge's F3 forgery
        # mitigation — it re-parses an opaque body the gateway never validated and
        # enforces the envelope==body adapter_id equality. A coverage hole could
        # ship an un-exercised refusal branch (a forged-body mismatch or a
        # malformed body that is NOT raised loud), so 100% line+branch is the bar.
        # Fully covered by the unit tier (tests/unit/comms/test_inbound_reparse.py)
        # — pure function, no root, no Postgres. Named explicitly (two-gates
        # pattern) so a reviewer sees the boundary; keep the combined gate in sync.
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/comms_mcp/inbound_reparse.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/comms_mcp/inbound_reparse.py' \
            --fail-under=100
      - name: Forwarded-inbound receive trust-boundary 100% line+branch coverage
        # Spec B G6-7-4 (#309, ADR-0039): ``forwarded_inbound_receiver.py`` is the
        # core-side receive trust boundary of the gateway->core inbound bridge — it
        # K4-admits the closed-vocab envelope adapter_id, re-parses the opaque body,
        # acks-to-drain every terminal drop (unknown adapter / envelope-body mismatch
        # / malformed body), and dispatches at the commit-after-dispatch edge. A
        # coverage hole could ship an un-exercised refusal/drain branch (a silent
        # admission of a forged adapter, or a wedged high-water), so 100% line+branch
        # is the bar. Fully covered by the unit tier
        # (tests/unit/comms/test_forwarded_inbound_receiver.py) — no root, no Postgres.
        # Named explicitly (two-gates pattern); keep the combined gate in sync.
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/comms_mcp/forwarded_inbound_receiver.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/comms_mcp/forwarded_inbound_receiver.py' \
            --fail-under=100
      - name: Quarantine transport trust-boundary 100% line+branch coverage
        # PR-S4-11c-2a (ADR-0029): ``quarantine_transport.py`` is the host-side
        # wire that carries a T3 inbound body to the quarantined LLM — the single-
        # use staging map, the ``T3BodyRecorder`` boundary that tags the body T3,
        # and the ``QuarantineStdioTransport`` ingest-then-extract dispatch. A
        # coverage hole here is a hole at the dual-LLM trust boundary. It is
        # already caught INCIDENTALLY by the ``security/*`` glob gate above; this
        # explicit per-file gate makes it AUDITABLY named (a reviewer sees the
        # trust-boundary wire is gated by name, not just by glob). Fully covered
        # by the unit tier (``tests/unit/security/test_quarantine_transport.py``),
        # so gating on unit-only ``.coverage`` data is sound. The combined-job
        # ``Trust-boundary files`` gate names it too (the two-gates pattern — keep
        # BOTH in sync when this file changes).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/security/quarantine_transport.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/security/quarantine_transport.py' \
            --fail-under=100
      - name: Quarantine child-IO trust-boundary 100% line+branch coverage
        # PR-S4-11c-2b0 (ADR-0030): ``quarantine_child_io.py`` is the host-side
        # SPAWN of the real bwrap-sandboxed quarantined-LLM child + the fd-3
        # provider-key delivery — the dual-LLM trust boundary's spawn substrate.
        # The spawn discipline (dup read-end onto fd 3, pass_fds=(3,), scrubbed
        # allowlist env, bound-interpreter override), the bounded ``read_frame``,
        # the fail-closed ``QuarantineChildSpawnError`` on delivery failure, and
        # idempotent ``aclose`` are all trust-boundary code; a coverage hole here
        # is a hole at the boundary. Caught INCIDENTALLY by the ``security/*`` glob
        # gate above; this explicit per-file gate names it for a reviewer. Fully
        # covered by the unit tier
        # (``tests/unit/security/test_quarantine_child_io.py``, fake subprocess),
        # so gating on unit-only ``.coverage`` data is sound. The combined-job
        # ``Trust-boundary files`` gate names it too (the two-gates pattern — keep
        # BOTH in sync when this file changes).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/security/quarantine_child_io.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/security/quarantine_child_io.py' \
            --fail-under=100
      - name: Control-fd broker 100% line+branch coverage
        # #340 PR2a (ADR-0050): ``control_fd_broker.py`` is the core-side SCM_RIGHTS
        # reachability-broker for the quarantined child — the ONE sanctioned
        # raw-socket egress-origination site in the whole codebase. It lives
        # OUTSIDE ``src/alfred/security/``, so the ``security/*`` glob gate above
        # does NOT catch it — this named gate is its ONLY 100% coverage
        # protection. Fully covered by the unit tier
        # (``tests/unit/egress/test_control_fd_broker.py``), so gating on
        # unit-only ``.coverage`` data is sound. The combined ``coverage-gates``
        # job names it too (the two-gates pattern — keep BOTH in sync when this
        # file changes).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/egress/control_fd_broker.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/egress/control_fd_broker.py' \
            --fail-under=100
      - name: Egress-broker audit 100% line+branch coverage
        # #340 (ADR-0050 Decision 7; golive spec §21; ADR-0040 residual (vii)):
        # ``broker_audit.py`` is ``EgressBrokerAuditor`` — the durable, signed,
        # core-side per-call egress-audit row for the SCM_RIGHTS broker (both
        # the connected-success and refused-failure arms). It lives OUTSIDE
        # ``src/alfred/security/``, so the ``security/*`` glob gate above does
        # NOT catch it — this named gate is its ONLY 100% coverage protection
        # (ops-001). Ships dormant (golive's ``broker_sockets`` wiring is the
        # only caller), but the fail-closed T0 hookpoint + bounded hot-path
        # await are trust-boundary code today. Fully covered by the unit tier
        # (``tests/unit/egress/test_broker_audit.py``), so gating on unit-only
        # ``.coverage`` data is sound. The combined ``coverage-gates`` job
        # names it too (the two-gates pattern — keep BOTH in sync when this
        # file changes).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/egress/broker_audit.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/egress/broker_audit.py' \
            --fail-under=100
      - name: Daemon control-plane trust-boundary 100% line+branch coverage
        # G6-2b-2c (#288, ADR-0038): the daemon control plane — a 0600 local-socket
        # request/response introspection RPC. ``_local_socket.py`` is the EXTRACTED
        # shared socket-security primitive (peer-uid auth, owner-only bind); the
        # control server/client/protocol are the new IPC surface the CLI dials. All
        # four are trust-boundary code (a coverage hole could ship an un-exercised
        # auth/bind/error-mapping branch). Fully covered by the unit tier
        # (``tests/unit/plugins/test_local_socket.py`` +
        # ``tests/unit/cli/daemon/test_daemon_control_*.py``), so gating on unit-only
        # ``.coverage`` data is sound. The combined ``coverage-gates`` job names them
        # too (the two-gates pattern — keep BOTH in sync when this file changes).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/plugins/_local_socket.py') != '' && hashFiles('src/alfred/cli/daemon/_daemon_control_server.py') != '' && hashFiles('src/alfred/cli/daemon/_daemon_control_client.py') != '' && hashFiles('src/alfred/cli/daemon/_daemon_control_protocol.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/plugins/_local_socket.py,src/alfred/cli/daemon/_daemon_control_server.py,src/alfred/cli/daemon/_daemon_control_client.py,src/alfred/cli/daemon/_daemon_control_protocol.py' \
            --fail-under=100
      - name: Daemon boot-audit 100% line+branch coverage
        # #256 PR-1: ``_boot_audit.py`` is the extracted daemon audited-refusal +
        # lifecycle-emit leaf (``_refuse_boot`` / ``_emit_or_quarantine`` /
        # ``_emit_ready`` / ``_emit_going_down`` / ``LifecycleBroadcaster``) — the
        # fail-closed refusal MECHANISM. A coverage hole could ship an un-exercised
        # refusal / audit-unwritable-quarantine (exit 3) branch. Fully covered by the
        # unit tier (``tests/unit/cli/daemon/``), no root/Postgres, so gating on
        # unit-only ``.coverage`` is sound. The combined ``coverage-gates`` job names
        # it too (the two-gates pattern — keep BOTH in sync when this file changes).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/cli/daemon/_boot_audit.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/cli/daemon/_boot_audit.py' \
            --fail-under=100
      - name: Daemon gate-boot 100% line+branch coverage
        # #256 PR-2: ``_gate_boot.py`` is the extracted daemon capability-gate boot
        # wiring — the seed-then-load gate build, the Postgres handshake (probe c),
        # the fail-closed first-party grant assertion (``_first_party_grant_live``),
        # the boot HookRegistry install, and the no-getattr-fail-open
        # ``_SupervisorBootGate`` wrapper. A coverage hole could ship an un-exercised
        # fail-open branch. Fully covered by the unit tier (``tests/unit/cli/daemon/``);
        # the real-infra ``build_boot_real_gate_for_daemon`` carries the sole allowed
        # ``# pragma: no cover`` (monkeypatched glue). The combined ``coverage-gates``
        # job names it too (two-gates pattern — keep BOTH in sync).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/cli/daemon/_gate_boot.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/cli/daemon/_gate_boot.py' \
            --fail-under=100
      - name: Daemon comms-boot 100% line+branch coverage
        # #256 PR-3: ``_comms_boot.py`` is the extracted daemon comms-adapter boot
        # cluster — the pre-Supervisor comms graph build, per-adapter spawn/socket-listen
        # wiring, the manifest-derived wire-spec parse (fail-closed
        # ``_CommsAdapterManifestError`` raises), the forwarded-inbound registry, and the
        # fail-closed refuse-boot arms (bad-manifest / misconfigured-promoter). A coverage
        # hole could ship an un-exercised refusal branch. Fully covered by the unit tier
        # (``tests/unit/cli/daemon/``); the only ``# pragma: no cover`` sites are the
        # five post-``_refuse_boot`` ``raise AssertionError("unreachable")`` NoReturn
        # defence-in-depth lines + the one ``expected_epoch is None`` real-infra guard —
        # NONE hides an ``await _refuse_boot(...)`` arm (all are covered + non-pragma'd).
        # The combined ``coverage-gates`` job names it too
        # (two-gates pattern — keep BOTH in sync).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/cli/daemon/_comms_boot.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/cli/daemon/_comms_boot.py' \
            --fail-under=100
      - name: Daemon boot orchestrator + failures 100% line+branch coverage
        # #256 PR-4 (closeout): the two files #256 named. ``_commands.py`` is the thin
        # ~1046-line boot orchestrator that REMAINS after the _boot_audit / _gate_boot /
        # _comms_boot extractions — it holds ``_start_async`` and every fail-closed
        # refuse-DECISION arm (the ``if failure: await _refuse_boot(...)`` /
        # ``except X: await _refuse_boot(...)`` guards that #256 exists to gate). All
        # refuse-decision statements are covered. The pragma sites — NONE of which is
        # an ``await _refuse_boot(...)`` decision arm — are: three ``# pragma: no cover``
        # real-infra constructors (build_boot_session_scope / _build_boot_outbound_dlp /
        # wait_for_shutdown); a ``# pragma: no cover`` on a platform/loop-edge
        # ``except (NotImplementedError, ValueError)`` in wait_for_shutdown; a
        # ``# pragma: no cover`` on a dead ``raise AssertionError("unreachable")`` AFTER
        # a ``NoReturn`` _refuse_boot (the refuse arm itself IS covered); and one
        # ``# pragma: no branch`` on a reap-finally pidfile leak-guard whose not-taken
        # arc is only reached during exception unwinding (coverage.py can't record it).
        # ``_failures.py`` is the ``DaemonBootFailure`` union. Fully covered by the unit
        # tier. Combined job names both too (two-gates pattern — keep BOTH in sync).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/cli/daemon/_commands.py') != '' && hashFiles('src/alfred/cli/daemon/_failures.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/cli/daemon/_commands.py,src/alfred/cli/daemon/_failures.py' \
            --fail-under=100
      - name: Gateway kernel trust-boundary 100% line+branch coverage
        # Spec A G3-3a (#237, ADR-0032): ``src/alfred/gateway/`` is the
        # always-up gateway's stable kernel — the client-facing T1 carrier.
        # ``link_state.py`` is the pure link-state machine enforcing the §9
        # reconnecting/restored invariant (a coverage hole could ship an
        # un-exercised transition that breaks the no-restored-without-
        # reconnecting contract); ``client_listener.py`` is the client-facing
        # socket + control-frame emit (the reused 0600/0700 peer-auth posture +
        # the loud-on-dead-client send seam). Both are trust-boundary kernel,
        # so 100% line+branch is the bar (architect L2 — a new trust-boundary
        # package needs its gate wired, not assumed). Fully covered by the unit
        # tier (``tests/unit/gateway/``, in-process loopback sockets — no root,
        # no Postgres), so gating on unit-only ``.coverage`` data is sound. The
        # combined-job gate names these two files too (the two-gates pattern —
        # keep BOTH in sync when this file changes).
        # G3-3b-1 (#237) extends the kernel with the core-facing half:
        # ``core_link.py`` is the core-leg PEER handshake + the epoch-reconcile
        # forgery defense (a mismatched-epoch ``ready`` is rejected, never fed —
        # a false ``restored`` is an attack surface) + the reconnect/backoff
        # loop; ``metrics.py`` is the core-link Prometheus instrumentation;
        # ``_control_frames.py`` is the control-path bind point (its
        # ``assert_never`` makes a missing mapping a loud failure). All are
        # trust-boundary, so 100% line+branch is the bar.
        # G6-2b-1 (#288, ADR-0036) adds the per-adapter supervision shell:
