name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel-in-progress: rapid PR pushes do not queue stale runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}


permissions:
  contents: read  # Minimal: read repo content for lint / type / unit / integration

jobs:
  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: DavidAnson/markdownlint-cli2-action@b4c9feab76d8025d1e83c653fa3990936df0e6c8 # v16
        with:
          globs: |
            **/*.md
            !LICENSE
            !node_modules/**

  python:
    name: Python (lint, types, unit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: hashFiles('pyproject.toml') != ''
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3 latest
      - run: uv python install 3.12
      - run: uv sync --frozen --dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        # Replaces the old `black --check .` step. ruff format is the
        # AlfredOS-canonical formatter (see docs/python-conventions.md);
        # black is being removed from dev-deps in the Slice 1 Task 1
        # pyproject.toml fixup.
        run: uv run ruff format --check .
      - name: Mypy (strict)
        if: hashFiles('src/**/*.py') != ''
        run: uv run mypy --strict src/
      - name: Pyright
        if: hashFiles('src/**/*.py') != ''
        run: uv run pyright src/
      - name: Unit tests + coverage gates
        if: hashFiles('tests/unit/**/*.py') != ''
        # Two gates so we can enforce different thresholds:
        #   1. Overall coverage >= 75% (matches pyproject.toml [tool.coverage.report]
        #      fail_under). Drift-detection contract — keeps wide modules honest.
        #   2. Security boundaries 100% line+branch. CLAUDE.md hard rule:
        #      every security boundary must have 100% line+branch coverage.
        #      Slice 1's security surface is small (tiers + secret broker), so
        #      100% is achievable today; future slices add canaries, capability
        #      gate, DLP — each must land with its tests at this bar.
        # The second `coverage report` re-uses the .coverage data file written
        # by the pytest --cov run; no second test execution.
        run: |
          uv run pytest tests/unit -q --cov=src/alfred --cov-report=term-missing --cov-fail-under=75
          uv run coverage report --include='src/alfred/security/*' --fail-under=100

  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: hashFiles('tests/integration/**/*.py') != ''
    services:
      # Service container images are pinned to major tags. zizmor flags these
      # as unpinned-images (which prefers @sha256:digest); accept it because
      # (a) these are well-known images from official Docker Hub sources,
      # (b) Dependabot's docker ecosystem watches docker-compose.yaml not
      # GHA service blocks, and (c) digest-pinning here would block
      # patch-level postgres/redis updates we want for security.
      postgres:
        image: postgres:16  # zizmor: ignore[unpinned-images]
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports: ["5432:5432"]
      redis:
        image: redis:7  # zizmor: ignore[unpinned-images]
        ports: ["6379:6379"]
      qdrant:
        image: qdrant/qdrant:v1.12.4  # zizmor: ignore[unpinned-images]
        ports: ["6333:6333"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3 latest
      - run: uv sync --frozen --dev
      - run: uv run pytest tests/integration -q

  smoke:
    name: Smoke (end-to-end)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: hashFiles('tests/smoke/**/*.py') != ''
    # No services: block — the smoke test boots its own Postgres testcontainer
    # so the container lifecycle is deterministic and the test owns its data.
    # Docker is available on ubuntu-latest by default; testcontainers uses the
    # host docker socket.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3 latest
      - run: uv python install 3.12
      - run: uv sync --frozen --dev
      - name: Run smoke tests
        # Gated smoke env vars: when present, the Discord-gateway smoke
        # and the real-provider TUI smoke run end-to-end; when absent
        # (fork PRs, secrets not yet provisioned), the tests SKIP cleanly
        # — same skip-vs-pass discipline the test files enforce.
        # The values must be set as repo secrets by the operator AFTER
        # this PR merges (PR-E plan Task 1 Step 4 + Task 1b Step 1b.7):
        # * ALFRED_SMOKE_DISCORD_TOKEN — throwaway bot from a private
        #   Discord application the operator/CI owns.
        # * ALFRED_SMOKE_PROVIDER_KEY — throwaway DeepSeek API key (or
        #   Anthropic fallback per ADR-0001).
        # Secrets are scoped via env:, never interpolated into the
        # run: block — the workflow-injection guard in the security
        # reminder hook is satisfied.
        env:
          ALFRED_SMOKE_DISCORD_TOKEN: ${{ secrets.ALFRED_SMOKE_DISCORD_TOKEN }}
          ALFRED_SMOKE_PROVIDER_KEY: ${{ secrets.ALFRED_SMOKE_PROVIDER_KEY }}
        run: uv run pytest tests/smoke -v

  setup-script-smoke:
    name: Setup script smoke (${{ matrix.os }})
    if: hashFiles('bin/alfred-setup.sh') != ''
    timeout-minutes: 5
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - run: bin/alfred-setup.sh --dry-run
