name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel-in-progress: rapid PR pushes do not queue stale runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}


permissions:
  contents: read  # Minimal: read repo content for lint / type / unit / integration

jobs:
  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      # markdownlint-cli2 is run via npx directly rather than the
      # DavidAnson/markdownlint-cli2-action action because alfred-os org
      # policy restricts third-party actions to GitHub-published or
      # verified-Marketplace entries; that action isn't verified, so the
      # workflow fails to parse (`startup_failure`) regardless of SHA
      # pinning. The CLI itself is a regular npm package and works fine
      # called directly. `actions/setup-node` IS GitHub-published.
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
      - name: Run markdownlint-cli2
        run: |
          set -euo pipefail
          npx --yes markdownlint-cli2@0.14.0 \
            "**/*.md" \
            "!LICENSE" \
            "!node_modules/**"

  python:
    name: Python (lint, types, unit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # No job-level `hashFiles()` guard: GitHub Actions rejects `hashFiles()`
    # in job-level `if:` at workflow-parse time (HTTP 422 "Unrecognized
    # function: 'hashFiles'") — the function is only valid inside step
    # contexts. The first-step `check` below probes for pyproject.toml and
    # every downstream step short-circuits on `steps.check.outputs.has_py`.
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Check for Python project
        id: check
        run: |
          set -euo pipefail
          if [ -f pyproject.toml ]; then
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_py=false" >> "$GITHUB_OUTPUT"
            echo "::notice::pyproject.toml missing — skipping Python job."
          fi
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3 latest
        if: steps.check.outputs.has_py == 'true'
      - if: steps.check.outputs.has_py == 'true'
        run: uv python install 3.14
      - if: steps.check.outputs.has_py == 'true'
        run: uv sync --frozen --dev
      - name: Ruff lint
        if: steps.check.outputs.has_py == 'true'
        run: uv run ruff check .
      - name: Ruff format check
        # Replaces the old `black --check .` step. ruff format is the
        # AlfredOS-canonical formatter (see docs/python-conventions.md);
        # black is being removed from dev-deps in the Slice 1 Task 1
        # pyproject.toml fixup.
        if: steps.check.outputs.has_py == 'true'
        run: uv run ruff format --check .
      - name: Mypy (strict)
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/**/*.py') != ''
        run: uv run mypy --strict src/
      - name: Pyright
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/**/*.py') != ''
        run: uv run pyright src/
      - name: Unit tests + coverage gates
        if: steps.check.outputs.has_py == 'true' && hashFiles('tests/unit/**/*.py') != ''
        # Two gates here:
        #   1. Overall coverage >= 75% (matches pyproject.toml [tool.coverage.report]
        #      fail_under). Drift-detection contract — keeps wide modules honest.
        #   2. Security boundaries 100% line+branch. CLAUDE.md hard rule:
        #      every security boundary must have 100% line+branch coverage.
        #      Slice 1's security surface is small (tiers + secret broker), so
        #      100% is achievable today; future slices add canaries, capability
        #      gate, DLP — each must land with its tests at this bar.
        # The follow-up `coverage report` invocation re-uses the .coverage
        # data file written by the pytest --cov run; no second test execution.
        # The hooks-subsystem coverage gate lives in its OWN step below so
        # the `if: hashFiles('src/alfred/hooks/*.py') != ''` guard cleanly
        # no-ops on a branch where the hooks subsystem hasn't landed yet —
        # mirrors the unit-test step's guard discipline.
        run: |
          uv run pytest tests/unit -q --cov=src/alfred --cov-report=term-missing --cov-fail-under=75
          uv run coverage report --include='src/alfred/security/*' --fail-under=100
      - name: Hooks subsystem 100% line+branch coverage
        # Slice 2.5 PR-A's ``src/alfred/hooks/`` is a trust boundary in its
        # own right — the capability gate (sec-007), the re-entry bypass
        # (sec-008), the chain-deadline timer (§6.4) and the
        # refusal-authorization check (§6.5) ALL live in this subsystem;
        # every line must be proven by a test. Per-file ``--include``
        # enumerates the eight ``.py`` modules (including ``__init__.py``
        # so the public-surface lock is gated too) so the list stays
        # unambiguous when new files land — a new module skipped here is a
        # code-review smell, not a silent coverage hole.
        # The hashFiles guard makes the step a clean no-op on a branch where
        # the hooks subsystem hasn't landed yet (mirrors the unit-test step
        # at line 61's guard discipline). Re-uses the .coverage data file
        # written by the unit-test step above; depends on that step running
        # first via implicit step ordering. The chained ``has_py`` clause
        # mirrors the Mypy / Pyright / unit-test gates so a pyproject-less
        # branch no-ops cleanly instead of failing on a missing
        # ``uv run`` toolchain (CR-177).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/hooks/*.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/hooks/__init__.py,src/alfred/hooks/registry.py,src/alfred/hooks/invoke.py,src/alfred/hooks/capability.py,src/alfred/hooks/decorators.py,src/alfred/hooks/context.py,src/alfred/hooks/errors.py,src/alfred/hooks/audit_sink.py,src/alfred/hooks/boot.py' \
            --fail-under=100
      - name: First-party bootstrap-grants 100% line+branch coverage
        # N1 (PR-S4-11b0 review): ``_bootstrap_grants.py`` holds the ADR-0026
        # ``FIRST_PARTY_SYSTEM_GRANTS`` constant — the single source of truth
        # for the in-tree defences AlfredOS seeds at boot. It is already
        # caught INCIDENTALLY by the ``security/*`` glob gate above; this
        # explicit per-file gate makes it AUDITABLY named (a reviewer can see
        # the trust-boundary constant is gated by name, not just by glob).
        # Unlike ``_gate.py`` (whose outage paths only the integration suite
        # exercises, so its explicit gate lives in ``coverage-gates``), this
        # module is a pure constant + drift-guard surface fully covered by the
        # unit tier, so gating it on unit-only ``.coverage`` data is sound.
        # The combined-job ``Trust-boundary files`` gate names it too (the
        # two-gates pattern — keep BOTH in sync when this file changes).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/security/capability_gate/_bootstrap_grants.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/security/capability_gate/_bootstrap_grants.py' \
            --fail-under=100
      - name: Comms-adapter load-grants 100% line+branch coverage
        # ADR-0027 (PR-S4-11b): ``_comms_adapter_grants.py`` holds the
        # ``comms_adapter_load_grants`` builder — the config-is-authorization
        # source of truth for the plugin-LOAD grants the daemon seeds per
        # operator-enabled first-party comms adapter. Like ``_bootstrap_grants.py``
        # it is a pure ``Settings -> tuple[GrantRow]`` transform fully covered by
        # the unit tier (reads source-controlled manifests off disk, no Postgres),
        # so gating it on unit-only ``.coverage`` data is sound. Named explicitly
        # (not just glob-caught) so a reviewer sees the trust-boundary builder is
        # gated by name. The combined-job ``Trust-boundary files`` gate names it
        # too (the two-gates pattern — keep BOTH in sync when this file changes).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/security/capability_gate/_comms_adapter_grants.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/security/capability_gate/_comms_adapter_grants.py' \
            --fail-under=100
      - name: Quarantine transport trust-boundary 100% line+branch coverage
        # PR-S4-11c-2a (ADR-0029): ``quarantine_transport.py`` is the host-side
        # wire that carries a T3 inbound body to the quarantined LLM — the single-
        # use staging map, the ``T3BodyRecorder`` boundary that tags the body T3,
        # and the ``QuarantineStdioTransport`` ingest-then-extract dispatch. A
        # coverage hole here is a hole at the dual-LLM trust boundary. It is
        # already caught INCIDENTALLY by the ``security/*`` glob gate above; this
        # explicit per-file gate makes it AUDITABLY named (a reviewer sees the
        # trust-boundary wire is gated by name, not just by glob). Fully covered
        # by the unit tier (``tests/unit/security/test_quarantine_transport.py``),
        # so gating on unit-only ``.coverage`` data is sound. The combined-job
        # ``Trust-boundary files`` gate names it too (the two-gates pattern — keep
        # BOTH in sync when this file changes).
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/security/quarantine_transport.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/security/quarantine_transport.py' \
            --fail-under=100
      # NOTE: the Slice-3 trust-boundary 100% gate moved to the
      # `coverage-gates` job below. The capability-gate heartbeat /
      # fail-closed / outage paths in
      # ``src/alfred/security/capability_gate/_gate.py`` (lines 151,
      # 356-394, 420-437, 452-454) are exercised ONLY by
      # ``tests/integration/security/capability_gate/
      # test_fail_closed_outage.py``. The previous step ran against
      # unit-only ``.coverage`` data and consequently reported
      # ``_gate.py`` at 72% — the 100% bar was paper-only on exactly
      # the path CLAUDE.md hard rule #7 (no silent failures in security
      # paths) is supposed to enforce. ``coverage-gates`` combines unit
      # + integration data via ``coverage combine`` and re-runs the same
      # ``--include`` list against the merged file, restoring the gate.
      - name: Plugins subsystem 100% line+branch coverage
        # Slice-3 PR-S3-3a's ``src/alfred/plugins/`` is the plugin-host
        # trust boundary (spec §11a, ADR-0017). Every file enumerated
        # below mediates between the privileged orchestrator and an
        # untrusted subprocess; a coverage hole here is a hole at the
        # trust boundary:
        #
        #   * ``src/alfred/plugins/errors.py`` — the error hierarchy the
        #     orchestrator branches on (manifest vs transport vs
        #     invocation vs quarantine-unavailable). A skipped leaf class
        #     means audit consumers cannot disambiguate failure modes
        #     (arch-006 / err-011).
        #   * ``src/alfred/plugins/transport.py`` — ``PluginTransport``
        #     Protocol + ``DispatchResult`` union (core-011). The shape
        #     downstream PRs depend on.
        #   * ``src/alfred/plugins/manifest.py`` — TOML parser with
        #     ``manifest_version=1`` pin (arch-007) and the
        #     ``subscriber_tier != T0..T3`` invariant (tier-laundering
        #     defence).
        #   * ``src/alfred/plugins/inbound_scanner.py`` — canary detection
        #     on plugin output (sec-013 / spec §7.6). A canary trip is a
        #     quarantine trigger, not a recoverable error.
        #   * ``src/alfred/plugins/content_store_base.py`` — the
        #     ``ContentStoreBase`` Protocol that persists the
        #     ``TaggedContent[T3]`` *wrapper* (rvw-004 — persisting raw
        #     bytes would silently downgrade T3 to untagged on retrieval).
        #   * ``src/alfred/plugins/stdio_transport.py`` — the StdioTransport
        #     wire: env-scrub spawn, fd-passed provider key, DLP-then-broker
        #     outbound order (arch-001 / sec-010), inbound canary scan with
        #     SECURITY EVENT disposition, ``kill()`` returning the actual
        #     SIGKILL outcome (CR R3 ``kill_succeeded``).
        #   * ``src/alfred/plugins/session.py`` — manifest-handshake
        #     orchestrator + lifecycle audit + SIGKILL-before-audit
        #     ordering on the post-handshake hook-register attack
        #     (sec-013 / core-007).
        #   * ``src/alfred/plugins/manifest_reader.py`` — the pre-launcher
        #     Python helper (spec §7.2, PR-S4-6): policy_ref confinement
        #     (sec-2 ``policy_ref_escapes_root`` / ``policy_ref_unreadable``)
        #     + the closed-vocab bare-key refusals the bash launcher branches
        #     on. A coverage hole here is an unproven confinement branch.
        #   * ``src/alfred/plugins/_observability.py`` — the spec §7a.1
        #     Prometheus histograms covering the four p99 budgets
        #     (perf-002 / perf-009). A missed observe point is a missed
        #     budget.
        #
        # Per-file ``--include`` mirrors the hooks-subsystem precedent
        # above so a new plugin trust-boundary file gets added to this
        # gate at the same PR it lands rather than silently shipped at
        # < 100% coverage. Chained ``&&`` hashFiles guard per PR-S3-1 R1
        # F1: ANY-match must NOT no-op the gate; ALL files must be
        # present before the coverage report runs.
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/plugins/errors.py') != '' && hashFiles('src/alfred/plugins/transport.py') != '' && hashFiles('src/alfred/plugins/manifest.py') != '' && hashFiles('src/alfred/plugins/inbound_scanner.py') != '' && hashFiles('src/alfred/plugins/content_store_base.py') != '' && hashFiles('src/alfred/plugins/stdio_transport.py') != '' && hashFiles('src/alfred/plugins/session.py') != '' && hashFiles('src/alfred/plugins/manifest_reader.py') != '' && hashFiles('src/alfred/plugins/_observability.py') != '' && hashFiles('src/alfred/plugins/comms_stdio_transport.py') != '' && hashFiles('src/alfred/plugins/comms_runner.py') != '' && hashFiles('src/alfred/plugins/_comms_child_env.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/plugins/errors.py,src/alfred/plugins/transport.py,src/alfred/plugins/manifest.py,src/alfred/plugins/inbound_scanner.py,src/alfred/plugins/content_store_base.py,src/alfred/plugins/stdio_transport.py,src/alfred/plugins/session.py,src/alfred/plugins/manifest_reader.py,src/alfred/plugins/_observability.py,src/alfred/plugins/comms_stdio_transport.py,src/alfred/plugins/comms_runner.py,src/alfred/plugins/_comms_child_env.py' \
            --fail-under=100
      - name: Web-fetch trust-boundary 100% line+branch coverage
        id: web_fetch_cov_python
        # Slice-3 PR-S3-5's ``src/alfred/plugins/web_fetch/`` is the
        # web.fetch trust boundary (spec §7, §11a, ADR-0017). Every file
        # enumerated below mediates between the privileged orchestrator
        # and the untrusted-by-construction T3 fetch path — a coverage
        # hole here is a hole at the trust boundary:
        #
        #   * ``src/alfred/plugins/web_fetch/errors.py`` — ``WebFetchError``
        #     hierarchy + the ``WebFetchCanaryTripped`` SECURITY EVENT
        #     (deliberately NOT a ``WebFetchError`` subclass per spec
        #     §7.10 type discipline). A skipped leaf class means the
        #     orchestrator's operational-error arm cannot disambiguate
        #     failure modes or — worse — catches a canary trip as an
        #     operational error.
        #   * ``src/alfred/plugins/web_fetch/allowlist.py`` — the three-way
        #     intersection (manifest ∩ operator ∩ session) + the
        #     segment-aligned path-prefix matcher (CR-145 substring
        #     bypass fix, commit 0ac4232) + the ``..`` traversal refusal.
        #     A missed branch silently widens the allowlist past the
        #     operator's cap.
        #   * ``src/alfred/plugins/web_fetch/tls_policy.py`` — TLS
        #     fail-closed in production with ``ALFRED_ENV=development`` as
        #     the only escape hatch (spec §7.11). A skipped branch makes
        #     the escape hatch always-on.
        #   * ``src/alfred/plugins/web_fetch/content_store.py`` — Redis-
        #     backed ``ContentHandle`` with single-use ``GETDEL`` semantics
        #     (spec §7.5). A missed branch breaks the
        #     dereference-then-delete contract — the same handle could be
        #     dereferenced twice, defeating quarantine after a canary trip.
        #   * ``src/alfred/plugins/web_fetch/rate_limit.py`` — Lua-atomic
        #     three-bucket rate limiter (per_domain / per_user /
        #     daily_budget) with race-condition prevention (spec §7.7).
        #     A skipped branch silently permits over-quota requests.
        #   * ``src/alfred/plugins/web_fetch/canary_scanner.py`` — the
        #     ``InboundCanaryScanner`` registered as a system-tier
        #     subscriber on the ``tool.web.fetch`` hookpoint (spec §7.6).
        #     A missed branch means a canary token in T3 content
        #     propagates through the dual-LLM boundary undetected. This
        #     is CLAUDE.md hard rule #7 (no silent failures in security
        #     paths) territory.
        #   * ``src/alfred/plugins/web_fetch/fetch_dispatcher.py`` — the
        #     dispatcher that composes allowlist + rate-limit + TLS +
        #     scanner + audit row emission (spec §7.4). A skipped branch
        #     skips one of those gates on the audit graph.
        #
        # Per-file ``--include`` mirrors the plugins / hooks / supervisor
        # precedent so a new web-fetch trust-boundary file gets added to
        # this gate at the same PR it lands rather than silently shipped
        # at < 100% coverage. Chained ``&&`` hashFiles guard per
        # PR-S3-1 R1 F1: ANY-match must NOT no-op the gate; ALL files
        # must be present before the coverage report runs.
        if: steps.check.outputs.has_py == 'true' && hashFiles('src/alfred/plugins/web_fetch/errors.py') != '' && hashFiles('src/alfred/plugins/web_fetch/allowlist.py') != '' && hashFiles('src/alfred/plugins/web_fetch/tls_policy.py') != '' && hashFiles('src/alfred/plugins/web_fetch/content_store.py') != '' && hashFiles('src/alfred/plugins/web_fetch/rate_limit.py') != '' && hashFiles('src/alfred/plugins/web_fetch/canary_scanner.py') != '' && hashFiles('src/alfred/plugins/web_fetch/fetch_dispatcher.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/plugins/web_fetch/errors.py,src/alfred/plugins/web_fetch/allowlist.py,src/alfred/plugins/web_fetch/tls_policy.py,src/alfred/plugins/web_fetch/content_store.py,src/alfred/plugins/web_fetch/rate_limit.py,src/alfred/plugins/web_fetch/canary_scanner.py,src/alfred/plugins/web_fetch/fetch_dispatcher.py' \
            --fail-under=100
      - name: Web-fetch coverage gate — remediation hint
        # devex-004: when the 100% trust-boundary gate fails the operator
        # gets a wall of `coverage report` output and no obvious recipe
        # for reproducing the failure locally. This step turns the gate
        # failure into a self-service remediation card pointing at the
        # exact files under contract and the precise pytest invocation
        # that reproduces the failure on a laptop. Mirrors the Slice-2.5
        # hooks-subsystem precedent for actionable CI failure messages.
        if: failure() && steps.check.outputs.has_py == 'true' && steps.web_fetch_cov_python.outcome == 'failure'
        run: |
          echo "::error::Trust-boundary coverage gate failed for web_fetch."
          echo "Files required at 100% line+branch:"
          echo "  - src/alfred/plugins/web_fetch/{allowlist,tls_policy,fetch_dispatcher,content_store,rate_limit,canary_scanner,errors}.py"
          echo ""
          echo "Local reproduction (matches the CI gate one-for-one):"
          echo "  cd \$(git rev-parse --show-toplevel)"
          echo "  uv run pytest tests/unit/plugins/web_fetch/ \\"
          echo "    --cov=alfred.plugins.web_fetch --cov-branch --cov-report=term-missing"
          echo "  uv run coverage report \\"
          echo "    --include='src/alfred/plugins/web_fetch/errors.py,src/alfred/plugins/web_fetch/allowlist.py,src/alfred/plugins/web_fetch/tls_policy.py,src/alfred/plugins/web_fetch/content_store.py,src/alfred/plugins/web_fetch/rate_limit.py,src/alfred/plugins/web_fetch/canary_scanner.py,src/alfred/plugins/web_fetch/fetch_dispatcher.py,src/alfred/plugins/web_fetch/host_ip_guard.py' \\"
          echo "    --fail-under=100"
          echo ""
          echo "Per-file drill-down (replace <module> with a specific name):"
          echo "  uv run pytest tests/unit/plugins/web_fetch/ \\"
          echo "    --cov=alfred.plugins.web_fetch.<module> --cov-branch --cov-fail-under=100 --cov-report=term-missing"
          echo "  where <module> is one of: allowlist, tls_policy, fetch_dispatcher, content_store, rate_limit, canary_scanner, errors, host_ip_guard."
          echo ""
          echo "Why 100% on these files: trust-boundary code per CLAUDE.md security rule 8."

  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # No job-level `hashFiles()` guard: GitHub Actions rejects `hashFiles()`
    # in job-level `if:` at workflow-parse time (HTTP 422 "Unrecognized
    # function: 'hashFiles'") — the function is only valid inside step
    # contexts. The first-step `check` below probes for the corpus and
    # every downstream step short-circuits on `steps.check.outputs.has_integration`.
    services:
      # Service container images are pinned to major tags. zizmor flags these
      # as unpinned-images (which prefers @sha256:digest); accept it because
      # (a) these are well-known images from official Docker Hub sources,
      # (b) Dependabot's docker ecosystem watches docker-compose.yaml not
      # GHA service blocks, and (c) digest-pinning here would block
      # patch-level postgres/redis updates we want for security.
      postgres:
        image: postgres:16  # zizmor: ignore[unpinned-images]
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports: ["5432:5432"]
      redis:
        image: redis:7  # zizmor: ignore[unpinned-images]
        ports: ["6379:6379"]
      qdrant:
        image: qdrant/qdrant:v1.12.4  # zizmor: ignore[unpinned-images]
        ports: ["6333:6333"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Check for integration suite
        id: check
        run: |
          set -euo pipefail
          # `find … -print -quit` is shell-stable: independent of bash `globstar`,
          # which is OFF by default and which `compgen -G '**/*.py'` silently
          # depends on — without it, `**` collapses to a single `*` and the
          # probe false-negatives on tests nested deeper than one directory.
          if find tests/integration -type f -name '*.py' -print -quit 2>/dev/null | grep -q .; then
            echo "has_integration=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_integration=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tests/integration/**/*.py missing — skipping Integration job."
          fi
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3 latest
        if: steps.check.outputs.has_integration == 'true'
      - if: steps.check.outputs.has_integration == 'true'
        run: uv sync --frozen --dev
      - name: Install bubblewrap + jq for the launcher policy-resolver test
        # PR-S4-6: tests/integration/test_launcher_policy_resolver.py is
        # skipif-bwrap-missing locally (macOS dev) but MUST run in CI — it is
        # the merge-blocking proof that the launcher genuinely sandboxes. jq
        # is the launcher's JSON reader. Without these the test silently
        # skips and the gate is paper-only. The alfred-core runtime image
        # (PR-S4-0b) pins bubblewrap 0.8.0; ubuntu-latest's apt bubblewrap is
        # >= 0.6, sufficient for the resolver test.
        #
        # fd-3 delivery needs NO bwrap CLI flag: bwrap inherits open,
        # non-CLOEXEC fds (fd 3 = the provider-key channel) into the sandboxed
        # child by default (#218 / ADR-0015, verified bwrap 0.8.0 + 0.9.0). The
        # translator therefore emits no fd flag, so there is no flag to guard
        # against version drift here — the earlier `--sync-fd` advertise-check
        # is removed (--sync-fd is bwrap's internal sync fd and would CONSUME
        # fd 3 if used). The #228 boot-probe owns the runtime bwrap-presence /
        # version-floor check.
        if: steps.check.outputs.has_integration == 'true'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bubblewrap jq
          bwrap --version
          # Ubuntu 23.10+/24.04 (ubuntu-latest) ships
          # kernel.apparmor_restrict_unprivileged_userns=1, which blocks the
          # unprivileged user-namespace setup bwrap needs — surfacing as
          # `bwrap: setting up uid map: Permission denied` (and RTM_NEWADDR
          # on --unshare-net). Relax it for the runner so the launcher's real
          # bwrap sandbox can spawn. `|| true`: the sysctl is absent on older
          # kernels, which is fine (no restriction to lift there).
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - name: Run integration tests with coverage append
        if: steps.check.outputs.has_integration == 'true'
        # Append integration coverage to the .coverage data file the unit
        # step writes. Trust-boundary per-file gates downstream (see the
        # `python` job's `Trust-boundary files 100% line+branch coverage`
        # step) require the heartbeat / fail-closed paths that ONLY the
        # integration suite exercises (e.g.
        # tests/integration/security/capability_gate/test_fail_closed_outage.py
        # for _gate.py's heartbeat loop + _emit_gate_unavailable_audit +
        # stop_heartbeat). Without --cov-append the gate reads only the
        # unit data file and the 100% bar is paper-only on those paths —
        # the silent-failures-in-security-paths CLAUDE.md hard rule (#7)
        # is meaningless if the gate cannot see the path it's supposed
        # to protect.
        #
        # The combined .coverage file is uploaded as an artifact for the
        # downstream `coverage-gates` job to pick up — GitHub Actions
        # jobs run on different runners so we can't rely on filesystem
        # state crossing the boundary.
        #
        # ``--cov-fail-under=0`` overrides ``[tool.coverage.report]
        # fail_under = 75`` in pyproject.toml. This job runs the
        # integration suite alone (no unit data on this runner — the
        # ``python`` job's .coverage stays on its own runner) and
        # integration-only coverage is ~46% by construction. The 75%
        # threshold is the right gate for the COMBINED unit+integration
        # run that ``coverage-gates`` performs downstream, not for the
        # integration-only data we collect here. Without this override
        # the integration job fails on the 75% threshold and the
        # downstream ``coverage-gates`` job (which carries the real
        # 100% trust-boundary gates) is skipped — leaving the gates
        # paper-only on every push. #184 item 3.
        run: |
          uv run pytest tests/integration -q --cov=src/alfred --cov-append --cov-branch --cov-fail-under=0
      - name: Upload integration coverage artifact
        if: steps.check.outputs.has_integration == 'true'
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage-integration
          path: .coverage
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  coverage-gates:
    name: Coverage gates (combined unit + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [python, integration]
    # No job-level `hashFiles()` guard: GitHub Actions rejects `hashFiles()`
    # in job-level `if:` at workflow-parse time. The first-step `check` below
    # probes the corpus and every downstream step short-circuits on
    # `steps.check.outputs.has_coverage_corpus`.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Check for combined coverage corpus
        id: check
        run: |
          set -euo pipefail
          # See `integration` job's check step for why we use `find … -print -quit`
          # instead of `compgen -G '**/*.py'` (bash `globstar` is off by default
          # and `**` silently collapses to `*`, producing false negatives on
          # nested test files).
          if find tests/unit -type f -name '*.py' -print -quit 2>/dev/null | grep -q . \
            && find tests/integration -type f -name '*.py' -print -quit 2>/dev/null | grep -q .; then
            echo "has_coverage_corpus=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_coverage_corpus=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tests/unit or tests/integration missing — skipping coverage-gates job."
          fi
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3 latest
        if: steps.check.outputs.has_coverage_corpus == 'true'
      - if: steps.check.outputs.has_coverage_corpus == 'true'
        run: uv python install 3.14
      - if: steps.check.outputs.has_coverage_corpus == 'true'
        run: uv sync --frozen --dev
      - name: Re-run unit tests to seed combined coverage
        if: steps.check.outputs.has_coverage_corpus == 'true'
        # The combined coverage gate needs BOTH unit and integration data.
        # The `python` job's `.coverage` file isn't shared across runners,
        # so we re-run unit with --cov here and append the integration
        # artifact. Two passes is the cheapest correct option; the unit
        # suite is fast enough (~10s) that the duplication doesn't matter,
        # and it keeps the per-job artifact contract simple.
        run: uv run pytest tests/unit -q --cov=src/alfred --cov-branch
      - name: Download integration coverage artifact
        if: steps.check.outputs.has_coverage_corpus == 'true'
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: coverage-integration
          path: .coverage-integration-dir
      - name: Combine unit + integration coverage
        if: steps.check.outputs.has_coverage_corpus == 'true'
        # `coverage combine` consumes a directory of .coverage* files and
        # produces a merged .coverage. Rename the artifact so combine
        # picks it up (it expects `.coverage.*` suffix patterns OR a
        # directory walk; explicit rename is least surprising).
        run: |
          set -euo pipefail
          # ``coverage combine`` treats ``.coverage`` (no suffix) as the
          # OUTPUT file; passing it as an input argument silently drops
          # the unit data (only the ``.coverage.integration`` input
          # actually feeds the merge — log says "Combined 1 file" when
          # we expect 2). Rename the unit data file to ``.coverage.unit``
          # so combine sees two real inputs and writes the merged result
          # to ``.coverage``. This was the actual root cause of the
          # "security/* 100% coverage gap" surfaced on main 2026-06-06
          # — every security/* file is already at 100% on unit data;
          # the gate was reading integration-only data because of this
          # bug.
          mv .coverage .coverage.unit
          mv .coverage-integration-dir/.coverage .coverage.integration
          uv run coverage combine --keep .coverage.unit .coverage.integration
          uv run coverage report --include='src/alfred/security/*' --fail-under=100
      - name: Hooks subsystem 100% line+branch coverage (combined)
        if: steps.check.outputs.has_coverage_corpus == 'true' && hashFiles('src/alfred/hooks/*.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/hooks/__init__.py,src/alfred/hooks/registry.py,src/alfred/hooks/invoke.py,src/alfred/hooks/capability.py,src/alfred/hooks/decorators.py,src/alfred/hooks/context.py,src/alfred/hooks/errors.py,src/alfred/hooks/audit_sink.py,src/alfred/hooks/boot.py' \
            --fail-under=100
      - name: Trust-boundary files 100% line+branch coverage (combined)
        # Mirror of the `python` job's gate, but driven off the merged
        # .coverage so the heartbeat / fail-closed / outage paths in
        # _gate.py that only the integration suite exercises are visible
        # to the gate. Without this, the spec §8.1 / §8.2 / §8.5 +
        # CLAUDE.md hard rule #7 invariants would be paper-only on those
        # paths. Chained `&&` hashFiles guard per CR-138 finding #1 —
        # ANY-match must NOT no-op the gate; ALL files must be present.
        if: steps.check.outputs.has_coverage_corpus == 'true' && hashFiles('src/alfred/security/tiers.py') != '' && hashFiles('src/alfred/security/quarantine.py') != '' && hashFiles('src/alfred/security/quarantine_transport.py') != '' && hashFiles('src/alfred/identity/_ingest.py') != '' && hashFiles('src/alfred/bootstrap/nonce_factory.py') != '' && hashFiles('src/alfred/bootstrap/gate_factory.py') != '' && hashFiles('src/alfred/security/capability_gate/__init__.py') != '' && hashFiles('src/alfred/security/capability_gate/_gate.py') != '' && hashFiles('src/alfred/security/capability_gate/backend.py') != '' && hashFiles('src/alfred/security/capability_gate/policy.py') != '' && hashFiles('src/alfred/security/capability_gate/proposals.py') != '' && hashFiles('src/alfred/security/capability_gate/_bootstrap_grants.py') != '' && hashFiles('src/alfred/security/capability_gate/_comms_adapter_grants.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/security/tiers.py,src/alfred/security/quarantine.py,src/alfred/security/quarantine_transport.py,src/alfred/identity/_ingest.py,src/alfred/bootstrap/nonce_factory.py,src/alfred/bootstrap/gate_factory.py,src/alfred/security/capability_gate/__init__.py,src/alfred/security/capability_gate/_gate.py,src/alfred/security/capability_gate/backend.py,src/alfred/security/capability_gate/policy.py,src/alfred/security/capability_gate/proposals.py,src/alfred/security/capability_gate/_bootstrap_grants.py,src/alfred/security/capability_gate/_comms_adapter_grants.py' \
            --fail-under=100
      - name: Plugins subsystem 100% line+branch coverage (combined)
        if: steps.check.outputs.has_coverage_corpus == 'true' && hashFiles('src/alfred/plugins/errors.py') != '' && hashFiles('src/alfred/plugins/transport.py') != '' && hashFiles('src/alfred/plugins/manifest.py') != '' && hashFiles('src/alfred/plugins/inbound_scanner.py') != '' && hashFiles('src/alfred/plugins/content_store_base.py') != '' && hashFiles('src/alfred/plugins/stdio_transport.py') != '' && hashFiles('src/alfred/plugins/session.py') != '' && hashFiles('src/alfred/plugins/_observability.py') != '' && hashFiles('src/alfred/plugins/comms_stdio_transport.py') != '' && hashFiles('src/alfred/plugins/comms_runner.py') != '' && hashFiles('src/alfred/plugins/_comms_child_env.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/plugins/errors.py,src/alfred/plugins/transport.py,src/alfred/plugins/manifest.py,src/alfred/plugins/inbound_scanner.py,src/alfred/plugins/content_store_base.py,src/alfred/plugins/stdio_transport.py,src/alfred/plugins/session.py,src/alfred/plugins/_observability.py,src/alfred/plugins/comms_stdio_transport.py,src/alfred/plugins/comms_runner.py,src/alfred/plugins/_comms_child_env.py' \
            --fail-under=100
      - name: Comms-MCP trust-boundary 100% line+branch coverage (combined)
        # PR-S4-8 (#152) host-side comms-MCP foundations (spec §8). Every file
        # below is a trust-boundary seam: the wire-format owner, the inbound
        # entrypoint enforcing resolution -> burst-gate -> quarantined_extract,
        # the host-owned classifier registry + scanner, the notification
        # handlers, the per-(user, persona) burst limiter, and the seam-bridge
        # bootstrap that assembles the host (the canonical id never crosses the
        # stdio boundary outward). ``session.py``'s ``_on_post_handshake_method``
        # dispatch-arm delta is covered by the Plugins subsystem gate above.
        # ``errors.py`` (the comms-MCP typed exception hierarchy) is included —
        # trivially 100% but a security-relevant typed-error surface that belongs
        # in the gate. ``hookpoints.py`` is deliberately EXCLUDED: its
        # declarations execute at MODULE IMPORT time (the module-bottom
        # ``declare_hookpoints()`` call), which runs before pytest-cov starts
        # tracking — coverage cannot attribute import-time lines to a test, so a
        # per-file 100% gate would be unsatisfiable. Its behaviour is covered by
        # ``tests/unit/hooks/test_comms_hookpoints_registered.py`` instead.
        # ``orchestrator/core.py`` is likewise EXCLUDED from this whole-file gate
        # even though PR-S4-8 adds ``Orchestrator.quarantined_extract`` there: it
        # is an 889-line multi-responsibility orchestrator, not a comms-only seam,
        # and pinning the WHOLE file at 100% from this corpus would be
        # unsatisfiable (it sits at ~93% on the full suite — unrelated orchestrator
        # error paths). The ``quarantined_extract`` funnel itself — the only
        # trust-boundary surface PR-S4-8 touches in that file — IS exercised to
        # 100% by ``tests/unit/comms_mcp/test_inbound_quarantined_extract_source_tier.py``,
        # the inbound-path unit suite, and the comms-identity adversarial corpus;
        # gating it via the whole orchestrator file is the wrong mechanism (a
        # function-scoped coverage gate is tracked as a follow-up).
        # Chained ``&&`` hashFiles guard per the plugins/supervisor precedent so
        # the gate no-ops cleanly on a branch where these files do not exist yet.
        if: steps.check.outputs.has_coverage_corpus == 'true' && hashFiles('src/alfred/comms_mcp/protocol.py') != '' && hashFiles('src/alfred/comms_mcp/inbound.py') != '' && hashFiles('src/alfred/comms_mcp/inbound_scanner.py') != '' && hashFiles('src/alfred/comms_mcp/classifier_registry.py') != '' && hashFiles('src/alfred/comms_mcp/handlers.py') != '' && hashFiles('src/alfred/comms_mcp/bootstrap.py') != '' && hashFiles('src/alfred/comms_mcp/observability.py') != '' && hashFiles('src/alfred/comms_mcp/errors.py') != '' && hashFiles('src/alfred/orchestrator/burst_limiter.py') != '' && hashFiles('src/alfred/comms_mcp/sub_payload_promotion.py') != '' && hashFiles('src/alfred/comms_mcp/audit_hash.py') != '' && hashFiles('src/alfred/comms_mcp/outbound_queue.py') != '' && hashFiles('src/alfred/comms_mcp/discord_hookpoints.py') != '' && hashFiles('src/alfred/comms_mcp/classifiers/discord.py') != '' && hashFiles('src/alfred/comms_mcp/addressing_drift.py') != '' && hashFiles('src/alfred/comms_mcp/thread_conversation_ledger.py') != '' && hashFiles('src/alfred/comms_mcp/daemon_runtime.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/comms_mcp/protocol.py,src/alfred/comms_mcp/inbound.py,src/alfred/comms_mcp/inbound_scanner.py,src/alfred/comms_mcp/classifier_registry.py,src/alfred/comms_mcp/handlers.py,src/alfred/comms_mcp/bootstrap.py,src/alfred/comms_mcp/observability.py,src/alfred/comms_mcp/errors.py,src/alfred/orchestrator/burst_limiter.py,src/alfred/comms_mcp/sub_payload_promotion.py,src/alfred/comms_mcp/audit_hash.py,src/alfred/comms_mcp/outbound_queue.py,src/alfred/comms_mcp/discord_hookpoints.py,src/alfred/comms_mcp/classifiers/discord.py,src/alfred/comms_mcp/addressing_drift.py,src/alfred/comms_mcp/thread_conversation_ledger.py,src/alfred/comms_mcp/daemon_runtime.py' \
            --fail-under=100
      - name: Supervisor subsystem 100% line+branch coverage (combined)
        # Slice-3 PR-S3-3b's ``src/alfred/supervisor/`` is the supervisor
        # surface (spec §10). Every file enumerated below is either a
        # state machine or an audit-emit seam the orchestrator depends on;
        # a coverage hole here would be a hole at the supervisor contract:
        #
        #   * ``src/alfred/supervisor/__init__.py`` — public re-export
        #     surface. The package-import lock is the contract every
        #     ``from alfred.supervisor import ...`` site codes against
        #     (spec §10.1).
        #   * ``src/alfred/supervisor/errors.py`` — the supervisor error
        #     hierarchy rooted at :class:`SupervisorError`. A skipped
        #     leaf class means the CLI top-level dispatch cannot
        #     disambiguate the failure mode (spec §10.8).
        #   * ``src/alfred/supervisor/breaker.py`` — three-state
        #     :class:`CircuitBreaker` + Postgres persistence (spec §10.2,
        #     §10.6). The breaker is the quarantined-LLM trip seam; a
        #     missed branch here is a missed trip / missed reset.
        #   * ``src/alfred/supervisor/plugin_lifecycle.py`` — start_plugin
        #     + on_crash with the ``plugin.lifecycle.*`` audit family
        #     (spec §10.3). A missed audit row breaks the operator's
        #     quarantine timeline.
        #   * ``src/alfred/supervisor/deadline.py`` — ``DeadlineWrapper``
        #     for the 30s per-action ``asyncio.timeout`` (spec §10.5).
        #     A skipped branch silently disables the deadline.
        #   * ``src/alfred/supervisor/observability.py`` — Prometheus
        #     histograms covering supervisor action-duration buckets
        #     (spec §7a.1). A missed observe point is a missed budget.
        #   * ``src/alfred/supervisor/capability_monitor.py`` — gate
        #     fail-closed state-transition monitor (spec §10.4). The
        #     heartbeat loop lives ONLY in the integration suite
        #     (``test_capability_gate_outage_fail_closed.py``), which is
        #     why this gate is in the combined ``coverage-gates`` job
        #     rather than the per-job python step (the unit-only data
        #     reports it at ~45%, mirroring the security/capability_gate
        #     precedent at lines 99-111 above).
        #   * ``src/alfred/supervisor/core.py`` — :class:`Supervisor`
        #     top-level coordinator: TaskGroup lifecycle, breaker map,
        #     ``reset_breaker``, ``load_all_breakers``, spec §14
        #     hookpoint registration table (core-010).
        #
        # Per-file ``--include`` mirrors the plugins / hooks precedent
        # so a new supervisor file gets added to this gate at the same
        # PR it lands rather than silently shipped at < 100% coverage.
        # Chained ``&&`` hashFiles guard per PR-S3-1 R1 F1: ANY-match
        # must NOT no-op the gate; ALL files must be present before the
        # coverage report runs.
        if: steps.check.outputs.has_coverage_corpus == 'true' && hashFiles('src/alfred/supervisor/__init__.py') != '' && hashFiles('src/alfred/supervisor/errors.py') != '' && hashFiles('src/alfred/supervisor/breaker.py') != '' && hashFiles('src/alfred/supervisor/plugin_lifecycle.py') != '' && hashFiles('src/alfred/supervisor/deadline.py') != '' && hashFiles('src/alfred/supervisor/observability.py') != '' && hashFiles('src/alfred/supervisor/capability_monitor.py') != '' && hashFiles('src/alfred/supervisor/core.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/supervisor/__init__.py,src/alfred/supervisor/errors.py,src/alfred/supervisor/breaker.py,src/alfred/supervisor/plugin_lifecycle.py,src/alfred/supervisor/deadline.py,src/alfred/supervisor/observability.py,src/alfred/supervisor/capability_monitor.py,src/alfred/supervisor/core.py' \
            --fail-under=100
      - name: Quarantined-LLM trust-boundary 100% line+branch coverage (combined)
        # Slice-3 PR-S3-4 introduces the quarantined-LLM extractor seam
        # (spec §6.1-§6.8, ADR-0017). Every file enumerated below either
        # carries the privileged orchestrator's trust contract or runs
        # inside the `alfred-quarantine` UID subprocess that must NEVER
        # see plaintext orchestrator secrets — a coverage hole here is a
        # hole at the trust boundary:
        #
        #   * ``src/alfred/providers/base.py`` — the
        #     :class:`ProviderCapability` enum + ``Provider`` Protocol +
        #     ``register_provider`` registry (spec §6.1, prov-001/
        #     arch-002). The capability set drives Anthropic tool-use
        #     vs OpenAI strict:true vs DeepSeek JSON-mode branching in
        #     the extractor; a missed branch silently downgrades a
        #     constrained-generation provider to prompt-embedded.
        #   * ``src/alfred/bootstrap/quarantine.py`` — provider-separation
        #     bootstrap helper (PRD §7.1). Enforces the orchestrator vs
        #     quarantined-LLM provider-distinct-instance invariant at
        #     process start; a skipped branch here lets a misconfigured
        #     deployment ship with shared providers across the dual-LLM
        #     split, collapsing the trust boundary.
        #   * ``plugins/alfred_quarantined_llm/__init__.py`` — public
        #     re-export surface. The package-import lock is the contract
        #     every ``from plugins.alfred_quarantined_llm import ...``
        #     site codes against.
        #   * ``plugins/alfred_quarantined_llm/provider_dispatch.py`` —
        #     capability-branched extractor dispatch (Anthropic tool-use
        #     / OpenAI strict:true / DeepSeek JSON-mode / prompt-embedded
        #     fallback). The branch matrix here is the wire-format
        #     contract for every supported provider; a skipped branch is
        #     a silent fallback to the wrong shape.
        #   * ``plugins/alfred_quarantined_llm/quarantine_plugin.py`` —
        #     the in-process plugin shell that hosts ``quarantine.ingest``
        #     / ``quarantine.extract`` (spec §5.1). The handshake +
        #     manifest validation + fd-3 provider-key path lives here;
        #     a skipped branch on the launcher boundary is a CLAUDE.md
        #     hard rule #6 (secrets-via-broker) violation candidate.
        #
        # Per-file ``--include`` mirrors the supervisor / plugins precedent
        # so a new quarantined-LLM trust-boundary file gets added to this
        # gate at the same PR it lands rather than silently shipped at
        # < 100% coverage. Chained ``&&`` hashFiles guard per PR-S3-1 R1
        # F1: ANY-match must NOT no-op the gate; ALL files must be
        # present before the coverage report runs.
        if: steps.check.outputs.has_coverage_corpus == 'true' && hashFiles('src/alfred/providers/base.py') != '' && hashFiles('src/alfred/bootstrap/quarantine.py') != '' && hashFiles('plugins/alfred_quarantined_llm/__init__.py') != '' && hashFiles('plugins/alfred_quarantined_llm/provider_dispatch.py') != '' && hashFiles('plugins/alfred_quarantined_llm/quarantine_plugin.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/providers/base.py,src/alfred/bootstrap/quarantine.py,plugins/alfred_quarantined_llm/__init__.py,plugins/alfred_quarantined_llm/provider_dispatch.py,plugins/alfred_quarantined_llm/quarantine_plugin.py' \
            --fail-under=100
      - name: Web-fetch trust-boundary 100% line+branch coverage (combined)
        id: web_fetch_cov_combined
        # Combined-data mirror of the ``python`` job's web-fetch gate
        # (see the matching step above for the per-file rationale). The
        # web-fetch trust-boundary files are proven by unit-only data
        # today — no integration test exercises them. The combined-job
        # mirror exists for parity with every other Slice-3 trust
        # boundary so an operator scanning the CI plan sees one gate per
        # subsystem in both contexts; a future integration test that
        # adds to the .coverage data will land here automatically.
        # Chained ``&&`` hashFiles guard per PR-S3-1 R1 F1.
        if: steps.check.outputs.has_coverage_corpus == 'true' && hashFiles('src/alfred/plugins/web_fetch/errors.py') != '' && hashFiles('src/alfred/plugins/web_fetch/allowlist.py') != '' && hashFiles('src/alfred/plugins/web_fetch/tls_policy.py') != '' && hashFiles('src/alfred/plugins/web_fetch/content_store.py') != '' && hashFiles('src/alfred/plugins/web_fetch/rate_limit.py') != '' && hashFiles('src/alfred/plugins/web_fetch/canary_scanner.py') != '' && hashFiles('src/alfred/plugins/web_fetch/fetch_dispatcher.py') != ''
        run: |
          uv run coverage report \
            --include='src/alfred/plugins/web_fetch/errors.py,src/alfred/plugins/web_fetch/allowlist.py,src/alfred/plugins/web_fetch/tls_policy.py,src/alfred/plugins/web_fetch/content_store.py,src/alfred/plugins/web_fetch/rate_limit.py,src/alfred/plugins/web_fetch/canary_scanner.py,src/alfred/plugins/web_fetch/fetch_dispatcher.py' \
            --fail-under=100
      - name: Web-fetch coverage gate — remediation hint (combined)
        # devex-004 mirror: combined-job gate failure deserves the same
        # actionable remediation card as the per-job gate above. The
        # combined gate reads merged unit + integration coverage data,
        # but the local-reproduction recipe targets the unit suite where
        # web_fetch coverage is actually proven today (no integration
        # test exercises the trust boundary yet).
        if: failure() && steps.check.outputs.has_coverage_corpus == 'true' && steps.web_fetch_cov_combined.outcome == 'failure'
        run: |
          echo "::error::Trust-boundary coverage gate failed for web_fetch."
          echo "Files required at 100% line+branch:"
          echo "  - src/alfred/plugins/web_fetch/{allowlist,tls_policy,fetch_dispatcher,content_store,rate_limit,canary_scanner,errors}.py"
          echo ""
          echo "Local reproduction (matches the CI gate one-for-one):"
          echo "  cd \$(git rev-parse --show-toplevel)"
          echo "  uv run pytest tests/unit/plugins/web_fetch/ \\"
          echo "    --cov=alfred.plugins.web_fetch --cov-branch --cov-report=term-missing"
          echo "  uv run coverage report \\"
          echo "    --include='src/alfred/plugins/web_fetch/errors.py,src/alfred/plugins/web_fetch/allowlist.py,src/alfred/plugins/web_fetch/tls_policy.py,src/alfred/plugins/web_fetch/content_store.py,src/alfred/plugins/web_fetch/rate_limit.py,src/alfred/plugins/web_fetch/canary_scanner.py,src/alfred/plugins/web_fetch/fetch_dispatcher.py,src/alfred/plugins/web_fetch/host_ip_guard.py' \\"
          echo "    --fail-under=100"
          echo ""
          echo "Per-file drill-down (replace <module> with a specific name):"
          echo "  uv run pytest tests/unit/plugins/web_fetch/ \\"
          echo "    --cov=alfred.plugins.web_fetch.<module> --cov-branch --cov-fail-under=100 --cov-report=term-missing"
          echo "  where <module> is one of: allowlist, tls_policy, fetch_dispatcher, content_store, rate_limit, canary_scanner, errors, host_ip_guard."
          echo ""
          echo "Why 100% on these files: trust-boundary code per CLAUDE.md security rule 8."

  smoke:
    name: Smoke (end-to-end)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # No job-level `hashFiles()` guard: GitHub Actions rejects `hashFiles()`
    # in job-level `if:` at workflow-parse time. The first-step `check` below
    # probes the corpus and every downstream step short-circuits on
    # `steps.check.outputs.has_smoke`.
    #
    # No services: block — the smoke test boots its own Postgres testcontainer
    # so the container lifecycle is deterministic and the test owns its data.
    # Docker is available on ubuntu-latest by default; testcontainers uses the
    # host docker socket.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Check for smoke corpus
        id: check
        run: |
          set -euo pipefail
          # See `integration` job's check step for why we use `find … -print -quit`
          # instead of `compgen -G '**/*.py'` (bash `globstar` is off by default
          # and `**` silently collapses to `*`, producing false negatives on
          # nested test files).
          if find tests/smoke -type f -name '*.py' -print -quit 2>/dev/null | grep -q .; then
            echo "has_smoke=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_smoke=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tests/smoke/**/*.py missing — skipping Smoke job."
          fi
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3 latest
        if: steps.check.outputs.has_smoke == 'true'
      - if: steps.check.outputs.has_smoke == 'true'
        run: uv python install 3.14
      - if: steps.check.outputs.has_smoke == 'true'
        run: uv sync --frozen --dev
      - name: Run smoke tests
        if: steps.check.outputs.has_smoke == 'true'
        # Gated smoke env vars: when present, the Discord-gateway smoke
        # and the real-provider TUI smoke run end-to-end; when absent
        # (fork PRs, secrets not yet provisioned), the tests SKIP cleanly
        # — same skip-vs-pass discipline the test files enforce.
        # The values must be set as repo secrets by the operator AFTER
        # this PR merges (PR-E plan Task 1 Step 4 + Task 1b Step 1b.7):
        # * ALFRED_SMOKE_DISCORD_TOKEN — throwaway bot from a private
        #   Discord application the operator/CI owns.
        # * ALFRED_SMOKE_PROVIDER_KEY — throwaway DeepSeek API key (or
        #   Anthropic fallback per ADR-0001).
        # Secrets are scoped via env:, never interpolated into the
        # run: block — the workflow-injection guard in the security
        # reminder hook is satisfied.
        env:
          ALFRED_SMOKE_DISCORD_TOKEN: ${{ secrets.ALFRED_SMOKE_DISCORD_TOKEN }}
          ALFRED_SMOKE_PROVIDER_KEY: ${{ secrets.ALFRED_SMOKE_PROVIDER_KEY }}
        run: uv run pytest tests/smoke -v

  setup-script-smoke:
    name: Setup script smoke (${{ matrix.os }})
    # No job-level `hashFiles()` guard: GitHub Actions rejects `hashFiles()`
    # in job-level `if:` at workflow-parse time. The first-step `check` below
    # probes for the setup script and the dry-run step short-circuits on
    # `steps.check.outputs.has_setup_script`.
    timeout-minutes: 5
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Check for setup script
        id: check
        run: |
          set -euo pipefail
          if [ -f bin/alfred-setup.sh ]; then
            echo "has_setup_script=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_setup_script=false" >> "$GITHUB_OUTPUT"
            echo "::notice::bin/alfred-setup.sh missing — skipping setup-script-smoke job."
          fi
      - name: Stub docker on macOS for --dry-run
        if: matrix.os == 'macos-latest' && steps.check.outputs.has_setup_script == 'true'
        # GitHub-hosted macOS runners do not ship with Docker installed
        # (https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners).
        # ``bin/alfred-setup.sh --dry-run`` only walks the prereq checks
        # (docker + docker compose + jq) and exits BEFORE running any
        # real docker command (line 64 of the setup script). A no-op shim
        # on PATH lets the macOS leg exercise the script's *bash* logic —
        # which IS the macOS portability surface (bash 3.2 vs 5+, BSD vs
        # GNU coreutils, ``[[ ... ]]`` parsing) — without needing a real
        # Docker daemon (which on macos-latest would require ~3 min of
        # colima setup per run). The shim's behaviour is bounded by
        # ``--dry-run``'s early exit; outside CI the script's
        # ``require_cmd docker`` arm runs the real binary. #184 item 5.
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/bin"
          cat > "${RUNNER_TEMP}/bin/docker" <<'STUB'
          #!/bin/sh
          # No-op docker stub. Reached only by alfred-setup.sh --dry-run's
          # prereq checks; never invoked outside CI.
          exit 0
          STUB
          chmod +x "${RUNNER_TEMP}/bin/docker"
          echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"
      - if: steps.check.outputs.has_setup_script == 'true'
        run: bin/alfred-setup.sh --dry-run
