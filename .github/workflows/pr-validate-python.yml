name: PR Python validation

# Standalone PR validation that runs the Python quality bar (format,
# lint, type-check, tests) and gates the merge button on each. Authored
# per .rulesync/skills/author-gating-workflow/SKILL.md.
#
# Each gate is a separate job so it surfaces as its own checkbox in the
# PR checks panel and can be promoted to a required status individually.
#
# Pre-Slice-1 state has no Python source files. Each job's first step is
# a srccheck guard that detects this and short-circuits with success so
# the gate exists from day 1 but never blocks PRs that don't touch
# Python. Once Slice 1 lands src/alfred/**/*.py the steps activate.
#
# Convention reference: docs/python-conventions.md.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

# Shared environment: pin uv and Python version once so all jobs agree.
env:
  PYTHON_VERSION: "3.14"
  UV_VERSION: "0.5.14"

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: ruff format --check
  # Enforces the formatter is a no-op (i.e. the author ran it).
  # ─────────────────────────────────────────────────────────────
  ruff-format:
    name: Ruff format
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Check for Python source files
        id: srccheck
        run: |
          set -euo pipefail
          # Probe each path independently so a missing src/ or tests/ doesn't
          # cause `find` (under set -euo pipefail) to fail the whole guard and
          # produce a false-negative "has_source=false" when the other path
          # does contain code.
          has_src=false
          has_tests=false
          [ -d src ] && find src -name '*.py' 2>/dev/null | grep -q . && has_src=true
          [ -d tests ] && find tests -name '*.py' 2>/dev/null | grep -q . && has_tests=true
          if [ "$has_src" = "true" ] || [ "$has_tests" = "true" ]; then
            echo "has_source=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_source=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Python source — skipping ruff format check (expected pre-Slice-1)."
          fi
      - name: Install uv
        if: steps.srccheck.outputs.has_source == 'true'
        uses: astral-sh/setup-uv@887a942a15af3a7626099df99e897a18d9e5ab3a # v5.1.0
        with:
          version: ${{ env.UV_VERSION }}
          # Cache `~/.cache/uv` keyed on the lock file so the 5 jobs share
          # the resolver result across the matrix instead of each re-resolving
          # + re-downloading dev deps on every PR push.
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        if: steps.srccheck.outputs.has_source == 'true'
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Sync dependencies
        if: steps.srccheck.outputs.has_source == 'true'
        run: uv sync --dev
      - name: Run ruff format --check
        if: steps.srccheck.outputs.has_source == 'true'
        run: |
          targets=()
          [ -d src ] && targets+=(src)
          [ -d tests ] && targets+=(tests)
          uv run ruff format --check "${targets[@]}"

  # ─────────────────────────────────────────────────────────────
  # Job 2: ruff check (lint)
  # ─────────────────────────────────────────────────────────────
  ruff-lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Check for Python source files
        id: srccheck
        run: |
          set -euo pipefail
          # Probe each path independently so a missing src/ or tests/ doesn't
          # cause `find` (under set -euo pipefail) to fail the whole guard and
          # produce a false-negative "has_source=false" when the other path
          # does contain code.
          has_src=false
          has_tests=false
          [ -d src ] && find src -name '*.py' 2>/dev/null | grep -q . && has_src=true
          [ -d tests ] && find tests -name '*.py' 2>/dev/null | grep -q . && has_tests=true
          if [ "$has_src" = "true" ] || [ "$has_tests" = "true" ]; then
            echo "has_source=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_source=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Python source — skipping ruff check (expected pre-Slice-1)."
          fi
      - name: Install uv
        if: steps.srccheck.outputs.has_source == 'true'
        uses: astral-sh/setup-uv@887a942a15af3a7626099df99e897a18d9e5ab3a # v5.1.0
        with:
          version: ${{ env.UV_VERSION }}
          # Cache `~/.cache/uv` keyed on the lock file so the 5 jobs share
          # the resolver result across the matrix instead of each re-resolving
          # + re-downloading dev deps on every PR push.
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        if: steps.srccheck.outputs.has_source == 'true'
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Sync dependencies
        if: steps.srccheck.outputs.has_source == 'true'
        run: uv sync --dev
      - name: Run ruff check
        if: steps.srccheck.outputs.has_source == 'true'
        run: |
          targets=()
          [ -d src ] && targets+=(src)
          [ -d tests ] && targets+=(tests)
          uv run ruff check "${targets[@]}"

  # ─────────────────────────────────────────────────────────────
  # Job 3: mypy strict
  # Primary type-checker.
  # ─────────────────────────────────────────────────────────────
  mypy:
    name: Mypy (strict)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Check for Python source files
        id: srccheck
        run: |
          set -euo pipefail
          # Probe src/ defensively: under `set -euo pipefail` a missing src/
          # would otherwise abort the guard before the else-branch.
          if [ -d src ] && find src -name '*.py' 2>/dev/null | grep -q .; then
            echo "has_source=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_source=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Python source in src/ — skipping mypy (expected pre-Slice-1)."
          fi
      - name: Install uv
        if: steps.srccheck.outputs.has_source == 'true'
        uses: astral-sh/setup-uv@887a942a15af3a7626099df99e897a18d9e5ab3a # v5.1.0
        with:
          version: ${{ env.UV_VERSION }}
          # Cache `~/.cache/uv` keyed on the lock file so the 5 jobs share
          # the resolver result across the matrix instead of each re-resolving
          # + re-downloading dev deps on every PR push.
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        if: steps.srccheck.outputs.has_source == 'true'
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Sync dependencies
        if: steps.srccheck.outputs.has_source == 'true'
        run: uv sync --dev
      - name: Run mypy --strict
        if: steps.srccheck.outputs.has_source == 'true'
        run: uv run mypy --strict src

  # ─────────────────────────────────────────────────────────────
  # Job 4: pyright
  # Secondary type-checker; catches what mypy misses.
  # ─────────────────────────────────────────────────────────────
  pyright:
    name: Pyright
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Check for Python source files
        id: srccheck
        run: |
          set -euo pipefail
          # Probe src/ defensively: under `set -euo pipefail` a missing src/
          # would otherwise abort the guard before the else-branch.
          if [ -d src ] && find src -name '*.py' 2>/dev/null | grep -q .; then
            echo "has_source=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_source=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Python source in src/ — skipping pyright (expected pre-Slice-1)."
          fi
      - name: Install uv
        if: steps.srccheck.outputs.has_source == 'true'
        uses: astral-sh/setup-uv@887a942a15af3a7626099df99e897a18d9e5ab3a # v5.1.0
        with:
          version: ${{ env.UV_VERSION }}
          # Cache `~/.cache/uv` keyed on the lock file so the 5 jobs share
          # the resolver result across the matrix instead of each re-resolving
          # + re-downloading dev deps on every PR push.
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        if: steps.srccheck.outputs.has_source == 'true'
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Sync dependencies
        if: steps.srccheck.outputs.has_source == 'true'
        run: uv sync --dev
      - name: Run pyright
        if: steps.srccheck.outputs.has_source == 'true'
        run: uv run pyright src

  # ─────────────────────────────────────────────────────────────
  # Job 5: pytest
  # Unit + integration test suite. Integration tests run by directory
  # (tests/integration) because the @pytest.mark.integration marker is
  # informational, not selection-driving — `pytest tests/integration` runs
  # everything in that directory regardless of marker. Tests there require
  # Docker (testcontainers). Smoke and adversarial suites are excluded
  # from PR CI — smoke runs on main per the nightly schedule; adversarial
  # is release-blocking and runs nightly + before tags.
  # ─────────────────────────────────────────────────────────────
  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    # Docker daemon is available on ubuntu-latest by default; testcontainers
    # uses the host docker socket. No services: block needed.
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Check for Python tests
        id: srccheck
        run: |
          set -euo pipefail
          # Probe tests/ defensively (same rationale as the src/ guards above).
          if [ -d tests ] && find tests -name 'test_*.py' 2>/dev/null | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No test_*.py files — skipping pytest (expected pre-Slice-1)."
          fi
      - name: Install uv
        if: steps.srccheck.outputs.has_tests == 'true'
        uses: astral-sh/setup-uv@887a942a15af3a7626099df99e897a18d9e5ab3a # v5.1.0
        with:
          version: ${{ env.UV_VERSION }}
          # Cache `~/.cache/uv` keyed on the lock file so the 5 jobs share
          # the resolver result across the matrix instead of each re-resolving
          # + re-downloading dev deps on every PR push.
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        if: steps.srccheck.outputs.has_tests == 'true'
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Sync dependencies
        if: steps.srccheck.outputs.has_tests == 'true'
        run: uv sync --dev
      - name: Run unit + integration tests
        if: steps.srccheck.outputs.has_tests == 'true'
        env:
          # Deliberately-fake placeholder so Settings() can instantiate during
          # unit-test bootstrap. NOT a real secret — gitleaks recognises this
          # exact value and the substring `not-a-real-secret` keeps any future
          # scanner from mis-flagging.
          # TODO(slice-1): once Settings() unit tests use explicit env mocking
          # via monkeypatch (conftest.py fixture), remove this env block.
          # SecretBroker contract tests MUST run without a default value or
          # they silently pass when the missing-key path breaks. Tracked with
          # the Slice 1 Task 1 pyproject.toml toolchain fixup.
          ALFRED_DEEPSEEK_API_KEY: not-a-real-secret-ci-bootstrap-placeholder
        run: |
          test_targets=()
          [ -d tests/unit ] && test_targets+=(tests/unit)
          [ -d tests/integration ] && test_targets+=(tests/integration)
          uv run pytest "${test_targets[@]}" -q

  # -----------------------------------------------------------------
  # Job 6: tag(T3, ...) grep gate (Slice-3 spec §3.7-3.8)
  # CLAUDE.md hard rule (security #3 + #5): the privileged orchestrator
  # never sees raw T3 content; tagging is the boundary primitive. The
  # grep gate is release-blocking — only `security/tiers.py` and
  # `security/quarantine.py` may call `tag(T3, ...)`, and `cast(
  # TaggedContent[...]` is a type-erasure bypass that discards provenance.
  # `scripts/check_tag_t3.py` is the AST-based implementation; this job
  # wires it into CI as a standalone gating check so it can be promoted
  # to a required status independently of the other Python jobs.
  # -----------------------------------------------------------------
  tag-t3-grep:
    name: tag(T3) grep gate
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Check for Python source files
        id: srccheck
        run: |
          set -euo pipefail
          # Same guard pattern as the other Python jobs: pre-Slice-3 main
          # may have no src/alfred/, in which case the gate is a no-op.
          # The script is stdlib-only so no uv/python provisioning is
          # needed when src/ is absent.
          if [ -d src/alfred ] && find src/alfred -name '*.py' 2>/dev/null | grep -q .; then
            echo "has_source=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_source=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Python source in src/alfred/ - skipping tag(T3) grep gate."
          fi
      - name: Set up Python
        if: steps.srccheck.outputs.has_source == 'true'
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run check_tag_t3.py against src/alfred
        if: steps.srccheck.outputs.has_source == 'true'
        # stdlib-only script; no uv sync required. Releases-blocking per
        # spec §3.7-3.8 — only `security/tiers.py` and `security/
        # quarantine.py` may call `tag(T3, ...)`, and `cast(
        # TaggedContent[...]` is a type-erasure bypass that discards
        # provenance. The script exits 1 with violation messages on any
        # non-approved file containing those patterns.
        run: python3 scripts/check_tag_t3.py src/alfred

  # -----------------------------------------------------------------
  # Job 7: i18n catalog drift
  # CLAUDE.md hard rule (i18n #4): `pybabel extract` runs in pre-commit;
  # `pybabel compile --check` runs in CI. Catalog drift fails the build.
  # Splitting into its own gating job lets it be promoted to a required
  # status independently of the other Python jobs.
  # -----------------------------------------------------------------
  i18n-catalog:
    name: i18n catalog drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Check for Python source files
        id: srccheck
        run: |
          set -euo pipefail
          # Same guard pattern as the other Python jobs: pre-Slice-1 main has
          # no src/, so the catalog check is a no-op until Slice 1 lands.
          if [ -d src ] && find src -name '*.py' 2>/dev/null | grep -q .; then
            echo "has_source=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_source=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Python source in src/ - skipping i18n drift (expected pre-Slice-1)."
          fi
      - name: Install uv
        if: steps.srccheck.outputs.has_source == 'true'
        uses: astral-sh/setup-uv@887a942a15af3a7626099df99e897a18d9e5ab3a # v5.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        if: steps.srccheck.outputs.has_source == 'true'
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Sync dependencies
        if: steps.srccheck.outputs.has_source == 'true'
        run: uv sync --dev
      - name: Extract + check + compile
        if: steps.srccheck.outputs.has_source == 'true'
        # Three steps, in order:
        #   1. Extract to /tmp (never pollute the working tree — only real
        #      msgid drift should fail the gate, not the pot-creation-date
        #      artefact of the check itself).
        #   2. `pybabel update --check` exits non-zero on drift WITHOUT
        #      mutating the catalog. --ignore-pot-creation-date is critical:
        #      every extract embeds the current timestamp in the .pot, and
        #      that timestamp would otherwise propagate into the .po every
        #      run and produce eternal drift. --no-fuzzy-matching keeps a
        #      renamed string surfaced as drift rather than auto-mapped to a
        #      similar old translation.
        #   3. Compile so the CI log shows translation-coverage stats per
        #      locale (and so .mo files would be generated if we publish).
        run: |
          uv run pybabel extract -F babel.cfg -o /tmp/alfred.pot src/alfred
          if ! uv run pybabel update --check -i /tmp/alfred.pot -d locale -D alfred --no-fuzzy-matching --ignore-pot-creation-date; then
            echo "::error::i18n catalog drift detected. Run 'uv run pybabel extract -F babel.cfg -o /tmp/alfred.pot src/alfred && uv run pybabel update -i /tmp/alfred.pot -d locale -D alfred --no-fuzzy-matching' locally and commit the diff."
            exit 1
          fi
          uv run pybabel compile -d locale -D alfred --statistics
