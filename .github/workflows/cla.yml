name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    if: |
      (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
      (github.event_name == 'pull_request_target')
    runs-on: ubuntu-latest
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: '.github/cla-signatures.json'
          path-to-document: 'https://github.com/alfred-os/AlfredOS/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'dependabot[bot]'
          custom-notsigned-prcomment: |
            Thanks for your pull request. Before we can merge, we need every contributor to sign the [Contributor License Agreement](https://github.com/alfred-os/AlfredOS/blob/main/CLA.md).
            Please reply to this PR with the following text to sign:

            > I have read the CLA Document and I hereby sign the CLA

            You only need to sign once across all AlfredOS contributions.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All committers have signed the CLA.'
