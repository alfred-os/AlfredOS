name: PR security scans

# Standalone PR validation that runs fast security scanners and gates the
# merge button on their findings. Authored per the author-gating-workflow
# skill (.rulesync/skills/author-gating-workflow/SKILL.md).
#
# Separate from pr-validate-commits.yml so each scanner's pass/fail surfaces
# as its own checkbox in the PR checks panel.
#
# This file follows AlfredOS workflow conventions: deny-all baseline
# permissions, env-pass-then-quote for any github.event.* value, pinned
# action SHAs, concurrency cap, explicit timeouts.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Gitleaks — secret / credential scanner.
  #
  # Scans the PR diff (BASE..HEAD) for known secret formats (AWS, GCP, GitHub
  # PAT, Stripe, Slack, OpenAI, Anthropic, DeepSeek, ...) plus any custom
  # patterns added to a .gitleaks.toml at the repo root.
  # ──────────────────────────────────────────────────────────────
  gitleaks:
    name: Gitleaks (secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    env:
      GITLEAKS_VERSION: "8.30.1"
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          rm -f gitleaks
          gitleaks version
      - name: Scan PR diff for secrets
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # --log-opts restricts the scan to commits added by this PR.
          # --redact hides secret values from any output the runner produces.
          gitleaks detect \
            --source . \
            --log-opts "$BASE_SHA..$HEAD_SHA" \
            --redact \
            --no-banner \
            --verbose

  # ──────────────────────────────────────────────────────────────
  # Job 2: Zizmor — GitHub Actions workflow security auditor.
  #
  # Catches workflow-injection, unpinned-uses, artipacked credentials,
  # excessive token permissions, and the rest of the classes catalogued
  # in https://woodruffw.github.io/zizmor/audits/.
  # ──────────────────────────────────────────────────────────────
  zizmor:
    name: Zizmor (workflow security)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.14"
      - name: Install zizmor
        run: |
          set -euo pipefail
          pip install --no-cache-dir zizmor==1.25.2
          zizmor --version
      - name: Audit workflows
        run: |
          set -euo pipefail
          # --pedantic raises borderline findings too (e.g. anything that COULD
          # be tightened, not only blatant CVE-shape patterns).
          # --format plain keeps output readable in the Actions log.
          zizmor --pedantic --format plain .github/workflows/

  # ──────────────────────────────────────────────────────────────
  # Job 3: Semgrep — broad static analysis (SAST).
  #
  # Runs the three rulesets that matter most for AlfredOS's current state:
  #   - p/security-audit: general OWASP-shaped findings
  #   - p/secrets: catches secret patterns Semgrep knows that gitleaks
  #     might miss (overlap is deliberate — they're cheap)
  #   - p/github-actions: workflow-shaped findings (overlaps with zizmor;
  #     different ruleset, different blind spots)
  # ──────────────────────────────────────────────────────────────
  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.14"
      - name: Install Semgrep
        run: |
          set -euo pipefail
          pip install --no-cache-dir "semgrep>=1.160,<2"
          semgrep --version
      - name: Run Semgrep scan
        run: |
          set -euo pipefail
          semgrep scan \
            --config p/security-audit \
            --config p/secrets \
            --config p/github-actions \
            --error \
            --metrics off

  # ──────────────────────────────────────────────────────────────
  # Job 4: Trivy — IaC + filesystem scanner.
  #
  # Today scans the filesystem (catches secrets, license issues, dep vulns
  # if pyproject.toml/uv.lock present). Once Slice 1 lands docker-compose.yaml
  # and docker/alfred-core.Dockerfile, it'll also IaC-scan those for known
  # misconfigurations (no-root user, exposed ports, unpinned image tags).
  # ──────────────────────────────────────────────────────────────
  trivy:
    name: Trivy (IaC + filesystem)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          # CRITICAL and HIGH fail the build; LOW/MEDIUM are reported as
          # informational. Once we have more deps and a more mature scanning
          # discipline, can tighten to MEDIUM+.
          severity: CRITICAL,HIGH
          exit-code: "1"
          # Don't scan generated/external content that we don't ship.
          skip-dirs: .claude,.gemini,.cursor,docs/superpowers/plans
      - name: Run Trivy config (IaC) scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          skip-dirs: .claude,.gemini,.cursor
