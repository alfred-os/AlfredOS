version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      pydantic:
        patterns: ["pydantic*"]
      mcp:
        patterns: ["mcp*"]
      python-default:
        patterns: ["*"]
        exclude-patterns: ["pydantic*", "mcp*"]

  - package-ecosystem: docker
    # "/" catches docker-compose.yaml (postgres/redis); "/docker" catches
    # alfred-core.Dockerfile's `FROM debian:bookworm-slim` base — previously
    # untracked because the Dockerfile lives under docker/, not the repo root.
    directories:
      - "/"
      - "/docker"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      docker:
        patterns: ["*"]
    ignore:
      # Datastore MAJOR bumps are operator data-migration events (pg_upgrade /
      # dump+restore; PGDATA-layout changes — see the postgres 16->18 runbook),
      # not auto-mergeable. Keep them manual + runbook-gated. Patch/minor still
      # flow through the weekly PR for security pickup.
      - dependency-name: "postgres"
        update-types: ["version-update:semver-major"]
      - dependency-name: "redis"
        update-types: ["version-update:semver-major"]
