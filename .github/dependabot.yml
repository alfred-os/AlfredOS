version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      pydantic:
        patterns: ["pydantic*"]
      mcp:
        patterns: ["mcp*"]
      python-default:
        patterns: ["*"]
        exclude-patterns: ["pydantic*", "mcp*"]

  - package-ecosystem: docker
    # "/" catches docker-compose.yaml (postgres/redis); "/docker" catches
    # alfred-core.Dockerfile's `FROM debian:bookworm-slim` base — previously
    # untracked because the Dockerfile lives under docker/, not the repo root.
    directories:
      - "/"
      - "/docker"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      docker:
        patterns: ["*"]
